<!DOCTYPE html>
<html dir="rtl">
<head>
    <title>پێشکەشکار - یاری پرسیار و وەڵام</title>
    <meta charset="UTF-8">
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #1e3c72, #2a5298); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-container { background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); border-radius: 30px; padding: 40px; width: 90%; max-width: 500px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
        h1 { text-align: center; color: white; margin-bottom: 30px; }
        .glass-box { background: rgba(255,255,255,0.2); border-radius: 20px; padding: 20px; margin-bottom: 20px; backdrop-filter: blur(5px); }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 15px; font-size: 16px; }
        button { background: #4CAF50; color: white; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #45a049; transform: scale(1.02); }
        .error { color: #ff6b6b; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>
<div class="login-container">
    <h1>🎮 پێشکەشکاری یاری 🎮</h1>
    <div class="glass-box">
        <input type="password" id="adminPass" placeholder="وشەی نهێنی پێشکەشکار" autocomplete="off">
        <button onclick="login()">چوونە ژوورەوە</button>
        <div id="errorMsg" class="error"></div>
    </div>
</div>

<script>
    const ADMIN_PASSWORD = "admin123"; // دەتوانیت وشەی نهێنی بگۆڕیت
    
    function login() {
        const pass = document.getElementById("adminPass").value;
        if(pass === ADMIN_PASSWORD) {
            localStorage.setItem("isAdmin", "true");
            window.location.href = "admin.html";
        } else {
            document.getElementById("errorMsg").innerText = "وشەی نهێنی هەڵەیە!";
        }
    }
</script>
</body>
</html>
