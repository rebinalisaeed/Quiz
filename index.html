<!DOCTYPE html>
<html dir="rtl">
<head>
    <title>چوونە ژوورەوە - یاری پرسیار و وەڵام</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @font-face { font-family: 'K24Kurdish'; src: url('K24KurdishBold-Bold.ttf') format('truetype'); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'K24Kurdish', 'Segoe UI', Tahoma, sans-serif; }
        body { background: linear-gradient(135deg, #1e3c72, #2a5298); width: 100%; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .login-container { background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); border-radius: 30px; padding: 40px; width: 90%; max-width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
        h1 { text-align: center; color: white; margin-bottom: 30px; font-size: 28px; }
        .glass-box { background: rgba(255,255,255,0.2); border-radius: 20px; padding: 25px; }
        .glass-box label { color: white; display: block; margin-bottom: 8px; font-size: 14px; text-align: right; }
        input { width: 100%; padding: 12px; margin: 8px 0 15px 0; border: none; border-radius: 15px; font-size: 16px; text-align: right; background: rgba(255,255,255,0.9); }
        button { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 15px; font-size: 18px; cursor: pointer; font-weight: bold; background: #4CAF50; color: white; transition: 0.3s; }
        button:hover { background: #45a049; transform: scale(1.02); }
        .error { color: #ff6b6b; text-align: center; margin-top: 15px; font-size: 14px; }
        .room-id { font-size: 12px; color: rgba(255,255,255,0.5); text-align: center; margin-top: 10px; }
    </style>
</head>
<body>
<div class="login-container">
    <h1>🎮 یاری پرسیار و وەڵام 🎮</h1>
    <div class="glass-box">
        <label>👤 ناوی بەکارهێنەر</label>
        <input type="text" id="username" placeholder="ناوی بەکارهێنەر" autocomplete="off">
        <label>🔐 وشەی نهێنی</label>
        <input type="password" id="password" placeholder="وشەی نهێنی" autocomplete="off">
        <button onclick="login()">🚪 چوونە ژوورەوە</button>
        <div id="errorMsg" class="error"></div>
        <div class="room-id" id="roomIdDisplay"></div>
    </div>
</div>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAaKPSq0gBKaFG7Pfe-bGOpgEkz2TLnBS8",
        authDomain: "quizinrebin.firebaseapp.com",
        databaseURL: "https://quizinrebin-default-rtdb.firebaseio.com",
        projectId: "quizinrebin",
        storageBucket: "quizinrebin.firebasestorage.app",
        messagingSenderId: "40466121073",
        appId: "1:40466121073:web:766379012a8846c9d836d0",
        measurementId: "G-1TT4ZDJYCM"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    const ROOM_ID = "quiz_room_main";
    document.getElementById("roomIdDisplay").innerText = `ژوور: ${ROOM_ID}`;
    
    document.addEventListener('contextmenu', e => e.preventDefault());
    window.addEventListener('keydown', e => {
        if(e.key === 'F5' || (e.ctrlKey && e.key === 'r') || (e.metaKey && e.key === 'r')) e.preventDefault();
    });
    
    async function login() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();
        
        if(!username || !password) {
            document.getElementById("errorMsg").innerText = "❌ تکایە ناوی بەکارهێنەر و وشەی نهێنی پڕ بکەوە!";
            return;
        }
        
        const snapshot = await database.ref(`${ROOM_ID}/users/${username}`).once('value');
        const user = snapshot.val();
        
        if(user && user.password === password) {
            localStorage.setItem("loggedInUser", JSON.stringify({ username: username, role: user.role }));
            localStorage.setItem("roomId", ROOM_ID);
            
            if(user.role === "super_admin") window.location.href = "user_management.html";
            else if(user.role === "admin") window.location.href = "presenter.html";
            else if(user.role === "question_creator") window.location.href = "add_question.html";
            else window.location.href = "play.html";
        } else {
            document.getElementById("errorMsg").innerText = "❌ ناوی بەکارهێنەر یان وشەی نهێنی هەڵەیە!";
            document.getElementById("password").value = "";
        }
    }
    
    document.getElementById("password").addEventListener("keypress", function(e) { if(e.key === "Enter") login(); });
</script>
</body>
</html>
