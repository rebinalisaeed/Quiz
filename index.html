<!DOCTYPE html>
<html dir="rtl">
<head>
    <title>چوونە ژوورەوە - یاری پرسیار و وەڵام</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        @font-face {
            font-family: 'K24Kurdish';
            src: url('K24KurdishBold-Bold.ttf') format('truetype');
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'K24Kurdish', 'Segoe UI', Tahoma, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            width: 100%;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .login-container {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .glass-box {
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 25px;
        }
        
        .glass-box label {
            color: white;
            display: block;
            margin-bottom: 15px;
            font-size: 16px;
            text-align: center;
        }
        
        input {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-family: 'K24Kurdish', 'Segoe UI', Tahoma, sans-serif;
            text-align: center;
            background: rgba(255,255,255,0.9);
        }
        
        button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-family: 'K24Kurdish', 'Segoe UI', Tahoma, sans-serif;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
            background: #4CAF50;
            color: white;
        }
        
        button:hover {
            background: #45a049;
            transform: scale(1.02);
        }
        
        .error {
            color: #ff6b6b;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }
        
        .info {
            color: rgba(255,255,255,0.6);
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
        }
        
        hr {
            border-color: rgba(255,255,255,0.2);
            margin: 20px 0;
        }
    </style>
</head>
<body>
<div class="login-container">
    <h1>🎮 یاری پرسیار و وەڵام 🎮</h1>
    
    <div class="glass-box">
        <label>🔐 تکایە وشەی نهێنی بنووسە</label>
        <input type="password" id="password" placeholder="وشەی نهێنی" autocomplete="off">
        <button onclick="checkLogin()">🚪 چوونە ژوورەوە</button>
        <div id="errorMsg" class="error"></div>
        <hr>
        <div class="info">
            💡 وشەی نهێنی بەڕێوەبەر: <strong>admin123</strong><br>
            🎮 وشەی نهێنی یاری: <strong>adminplay</strong>
        </div>
    </div>
</div>

<script>
    const ADMIN_PASS = "admin123";
    const PLAY_PASS = "adminplay";
    
    function checkLogin() {
        const pass = document.getElementById("password").value;
        
        if(pass === ADMIN_PASS) {
            localStorage.setItem("isAdmin", "true");
            window.location.href = "admin.html";
        }
        else if(pass === PLAY_PASS) {
            window.location.href = "play.html";
        }
        else {
            document.getElementById("errorMsg").innerText = "❌ وشەی نهێنی هەڵەیە! تکایە هەوڵبدەرەوە.";
            document.getElementById("password").value = "";
            document.getElementById("password").focus();
        }
    }
    
    // ڕێگەدان بە کردنەوەی کلیکی Enter
    document.getElementById("password").addEventListener("keypress", function(e) {
        if(e.key === "Enter") {
            checkLogin();
        }
    });
</script>
</body>
</html>
