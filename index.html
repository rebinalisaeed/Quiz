<!DOCTYPE html>
<html dir="rtl">
<head>
    <title>چوونە ژوورەوە - یاری پرسیار و وەڵام</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        @font-face {
            font-family: 'K24Kurdish';
            src: url('K24KurdishBold-Bold.ttf') format('truetype');
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'K24Kurdish', 'Segoe UI', Tahoma, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            width: 100%;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .login-container {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .glass-box {
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .glass-box label {
            color: white;
            display: block;
            margin-bottom: 10px;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-family: 'K24Kurdish', 'Segoe UI', Tahoma, sans-serif;
            text-align: center;
        }
        
        button {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-family: 'K24Kurdish', 'Segoe UI', Tahoma, sans-serif;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }
        
        .btn-admin {
            background: #4CAF50;
            color: white;
        }
        
        .btn-admin:hover {
            background: #45a049;
            transform: scale(1.02);
        }
        
        .btn-play {
            background: #ff9800;
            color: white;
        }
        
        .btn-play:hover {
            background: #e68900;
            transform: scale(1.02);
        }
        
        .error {
            color: #ff6b6b;
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
        }
        
        hr {
            border-color: rgba(255,255,255,0.3);
            margin: 20px 0;
        }
    </style>
</head>
<body>
<div class="login-container">
    <h1>🎮 یاری پرسیار و وەڵام 🎮</h1>
    
    <div class="glass-box">
        <label>👑 چوونە ژوورەوەی بەڕێوەبەر (زیادکردنی پرسیار)</label>
        <input type="password" id="adminPass" placeholder="وشەی نهێنی بەڕێوەبەر" autocomplete="off">
        <button class="btn-admin" onclick="login('admin')">📝 چوونە ژوورەوە بۆ بەڕێوەبردنی پرسیارەکان</button>
    </div>
    
    <hr>
    
    <div class="glass-box">
        <label>🎯 چوونە ژوورەوەی یاری (ڕاستەوخۆ بۆ کەتەگۆری)</label>
        <input type="password" id="playPass" placeholder="وشەی نهێنی یاری" autocomplete="off">
        <button class="btn-play" onclick="login('play')">🎮 چوونە ژوورەوە بۆ یاریکردن</button>
    </div>
    
    <div id="errorMsg" class="error"></div>
</div>

<script>
    const ADMIN_PASS = "admin123";
    const PLAY_PASS = "adminplay";
    
    function login(type) {
        let pass;
        if(type === 'admin') {
            pass = document.getElementById("adminPass").value;
        } else {
            pass = document.getElementById("playPass").value;
        }
        
        if(type === 'admin' && pass === ADMIN_PASS) {
            localStorage.setItem("isAdmin", "true");
            window.location.href = "admin.html";
        }
        else if(type === 'play' && pass === PLAY_PASS) {
            window.location.href = "play.html";
        }
        else {
            document.getElementById("errorMsg").innerText = "❌ وشەی نهێنی هەڵەیە!";
        }
    }
</script>
</body>
</html>
