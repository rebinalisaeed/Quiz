<!DOCTYPE html>
<html dir="rtl" lang="ckb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>پێشکەشکار - یاری پرسیار و وەڵام</title>
    <style>
        @font-face {
            font-family: 'K24KurdishBold';
            src: url('K24KurdishBold-Bold.ttf') format('truetype');
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'K24KurdishBold', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* Mode Buttons */
        .mode-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .mode-btn {
            padding: 15px 40px;
            font-size: 20px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            background: white;
            color: #4a5568;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .mode-btn.online {
            background: linear-gradient(135deg, #48bb78, #38a169);
            color: white;
        }
        
        .mode-btn.offline {
            background: linear-gradient(135deg, #a0aec0, #718096);
            color: white;
        }
        
        .mode-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        
        /* Categories Grid */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .category-box {
            background: white;
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            font-size: 20px;
            font-weight: bold;
            color: #4a5568;
        }
        
        .category-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        
        .category-box.used {
            background: #e53e3e;
            color: white;
            cursor: not-allowed;
            opacity: 0.6;
        }
        
        /* Questions Grid */
        .questions-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .question-box {
            background: #48bb78;
            color: white;
            padding: 15px 10px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 18px;
            font-weight: bold;
        }
        
        .question-box:hover {
            transform: scale(1.05);
            background: #38a169;
        }
        
        .question-box.used {
            background: #e53e3e;
            cursor: not-allowed;
            opacity: 0.6;
        }
        
        .question-box.used:hover {
            transform: none;
        }
        
        /* Question Display */
        .question-display {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-top: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: none;
        }
        
        .timer {
            font-size: 48px;
            text-align: center;
            color: #e53e3e;
            margin-bottom: 20px;
            font-weight: bold;
        }
        
        .question-text {
            font-size: 24px;
            text-align: center;
            margin-bottom: 30px;
            color: #2d3748;
            line-height: 1.4;
        }
        
        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .option {
            background: #f7fafc;
            padding: 15px;
            border-radius: 10px;
            font-size: 16px;
            color: #2d3748;
        }
        
        .correct-answer {
            text-align: center;
            padding: 15px;
            background: #48bb78;
            color: white;
            border-radius: 10px;
            font-size: 18px;
            margin-top: 20px;
        }
        
        /* Groups Display */
        .groups-container {
            display: none;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 30px;
        }
        
        .group-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .group-title {
            text-align: center;
            font-size: 24px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
            color: #2d3748;
        }
        
        .player-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #e2e8f0;
            font-size: 16px;
        }
        
        .player-name {
            color: #4a5568;
        }
        
        .player-score {
            color: #667eea;
            font-weight: bold;
        }
        
        .player-eliminated {
            color: #e53e3e;
            text-decoration: line-through;
        }
        
        .back-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #718096;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .reset-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #ed8936;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .reset-btn:hover, .back-btn:hover {
            transform: translateY(-2px);
        }
        
        .next-hint {
            text-align: center;
            margin-top: 20px;
            color: #718096;
            font-size: 14px;
        }
        
        @media (max-width: 768px) {
            .categories-grid {
                gap: 10px;
            }
            
            .category-box {
                padding: 15px 10px;
                font-size: 14px;
            }
            
            .questions-grid {
                gap: 5px;
                padding: 15px;
            }
            
            .question-box {
                padding: 10px 5px;
                font-size: 12px;
            }
            
            .question-text {
                font-size: 18px;
            }
            
            .options {
                grid-template-columns: 1fr;
            }
            
            .option {
                font-size: 14px;
            }
            
            .mode-btn {
                padding: 10px 20px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="mode-buttons" id="modeButtons">
            <button class="mode-btn offline" onclick="setMode('offline')">📱 ئۆفلاین</button>
            <button class="mode-btn online" onclick="setMode('online')">🌐 ئۆنلاین</button>
        </div>
        
        <div id="categoriesView" style="display: none;">
            <div class="categories-grid" id="categoriesGrid"></div>
        </div>
        
        <div id="questionsView" style="display: none;">
            <div class="questions-grid" id="questionsGrid"></div>
        </div>
        
        <div id="questionDisplay" class="question-display"></div>
        <div id="groupsDisplay" class="groups-container"></div>
    </div>
    
    <button class="back-btn" onclick="goBack()" style="display: none;">🔙 گەڕانەوە</button>
    <button class="reset-btn" onclick="resetGame()" style="display: none;">🔄 ریسێت</button>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCtiW-RBMY0emCOFZdQCA7ynPESraUknxI",
            authDomain: "quizgamerebin.firebaseapp.com",
            databaseURL: "https://quizgamerebin-default-rtdb.firebaseio.com",
            projectId: "quizgamerebin",
            storageBucket: "quizgamerebin.firebasestorage.app",
            messagingSenderId: "312376681830",
            appId: "1:312376681830:web:11262fa62cc9246bac14a7",
            measurementId: "G-BJM04Q5X44"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        let currentMode = null;
        let currentCategory = null;
        let currentQuestion = null;
        let timerInterval = null;
        let currentUser = null;
        
        const categories = {
            'history': 'مێژوو',
            'science': 'زانست',
            'literature': 'ئەدەبییات',
            'art': 'هونەر',
            'sports': 'وەرزش',
            'technology': 'تەکنەلۆژیا',
            'health': 'تەندروستی',
            'geography': 'جوگرافیا',
            'religion': 'ئایینی'
        };
        
        function checkAuth() {
            const loggedInUser = localStorage.getItem('loggedInUser');
            if (!loggedInUser) {
                window.location.href = 'login.html';
                return false;
            }
            currentUser = JSON.parse(loggedInUser);
            if (currentUser.role !== 'presenter' && currentUser.role !== 'admin') {
                alert('تەنها پێشکەشکار دەتوانێت ئەم پەڕەیە بەکاربهێنێت!');
                window.location.href = 'play.html';
                return false;
            }
            return true;
        }
        
        function setMode(mode) {
            currentMode = mode;
            currentCategory = null;
            document.getElementById('modeButtons').style.display = 'none';
            document.getElementById('categoriesView').style.display = 'block';
            document.querySelector('.back-btn').style.display = 'block';
            document.querySelector('.reset-btn').style.display = 'block';
            loadCategories();
        }
        
        function loadCategories() {
            const grid = document.getElementById('categoriesGrid');
            let html = '';
            
            for (let key in categories) {
                database.ref(`gameState/usedCategories/${key}`).once('value')
                    .then(snapshot => {
                        const isUsed = snapshot.val();
                        // This needs to be handled differently
                    });
                html += `<div class="category-box" onclick="selectCategory('${key}')">${categories[key]}</div>`;
            }
            grid.innerHTML = html;
            
            // Check which categories are fully used
            for (let key in categories) {
                checkCategoryStatus(key);
            }
        }
        
        function checkCategoryStatus(categoryKey) {
            database.ref(`categories/${categoryKey}/questions`).once('value')
                .then(snapshot => {
                    const questions = snapshot.val();
                    if (questions) {
                        let allUsed = true;
                        for (let qId in questions) {
                            if (!questions[qId].isUsed) {
                                allUsed = false;
                                break;
                            }
                        }
                        if (allUsed) {
                            document.querySelector(`[onclick="selectCategory('${categoryKey}')"]`).classList.add('used');
                        }
                    }
                });
        }
        
        function selectCategory(categoryKey) {
            currentCategory = categoryKey;
            document.getElementById('categoriesView').style.display = 'none';
            document.getElementById('questionsView').style.display = 'block';
            loadQuestions();
        }
        
        function loadQuestions() {
            database.ref(`categories/${currentCategory}/questions`).once('value')
                .then(snapshot => {
                    const questions = snapshot.val();
                    const grid = document.getElementById('questionsGrid');
                    
                    if (!questions) {
                        grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;">هیچ پرسیارێک نییە</div>';
                        return;
                    }
                    
                    let html = '';
                    let index = 1;
                    for (let qId in questions) {
                        const isUsed = questions[qId].isUsed;
                        html += `<div class="question-box ${isUsed ? 'used' : ''}" onclick="${!isUsed ? `selectQuestion('${qId}')` : ''}">${index}</div>`;
                        index++;
                    }
                    grid.innerHTML = html;
                });
        }
        
        function selectQuestion(questionId) {
            database.ref(`categories/${currentCategory}/questions/${questionId}`).once('value')
                .then(snapshot => {
                    currentQuestion = {
                        id: questionId,
                        data: snapshot.val()
                    };
                    startQuestion();
                });
        }
        
        function startQuestion() {
            const display = document.getElementById('questionDisplay');
            display.style.display = 'block';
            
            let timeLeft = 30;
            
            display.innerHTML = `
                <div class="timer" id="timer">${timeLeft}</div>
                <div class="question-text">${currentQuestion.data.text}</div>
                <div class="options">
                    <div class="option">🅰 ${currentQuestion.data.options.A}</div>
                    <div class="option">🅱 ${currentQuestion.data.options.B}</div>
                    <div class="option">🅲 ${currentQuestion.data.options.C}</div>
                    <div class="option">🅳 ${currentQuestion.data.options.D}</div>
                </div>
                <div class="next-hint">⏎ Enter بۆ ئاشکراکردنی وەڵام</div>
            `;
            
            setTimeout(() => {
                timerInterval = setInterval(() => {
                    timeLeft--;
                    const timerDiv = document.getElementById('timer');
                    if (timerDiv) timerDiv.textContent = timeLeft;
                    
                    if (timeLeft <= 0) {
                        clearInterval(timerInterval);
                        showAnswer();
                    }
                }, 1000);
            }, 3000);
            
            // Send to players if online mode
            if (currentMode === 'online') {
                database.ref('gameState/currentQuestion').set({
                    question: currentQuestion.data,
                    category: currentCategory,
                    startTime: Date.now()
                });
            }
            
            // Wait for Enter key
            document.addEventListener('keydown', onEnterPress);
        }
        
        function onEnterPress(e) {
            if (e.key === 'Enter') {
                clearInterval(timerInterval);
                showAnswer();
                document.removeEventListener('keydown', onEnterPress);
            }
        }
        
        function showAnswer() {
            const display = document.getElementById('questionDisplay');
            const correctLetter = currentQuestion.data.correct;
            const correctText = currentQuestion.data.options[correctLetter];
            
            display.innerHTML = `
                <div class="question-text">${currentQuestion.data.text}</div>
                <div class="options">
                    <div class="option">🅰 ${currentQuestion.data.options.A}</div>
                    <div class="option">🅱 ${currentQuestion.data.options.B}</div>
                    <div class="option">🅲 ${currentQuestion.data.options.C}</div>
                    <div class="option">🅳 ${currentQuestion.data.options.D}</div>
                </div>
                <div class="correct-answer">✅ وەڵامی ڕاست: ${correctLetter} - ${correctText}</div>
                <div class="next-hint">⏎ Enter بۆ بینینی خاڵەکان</div>
            `;
            
            // Mark question as used
            database.ref(`categories/${currentCategory}/questions/${currentQuestion.id}/isUsed`).set(true);
            
            document.addEventListener('keydown', onScoreEnter);
        }
        
        function onScoreEnter(e) {
            if (e.key === 'Enter') {
                showGroupsAndScores();
                document.removeEventListener('keydown', onScoreEnter);
            }
        }
        
        function showGroupsAndScores() {
            document.getElementById('questionDisplay').style.display = 'none';
            document.getElementById('groupsDisplay').style.display = 'grid';
            
            database.ref('users').once('value')
                .then(snapshot => {
                    const users = snapshot.val();
                    const group1 = [];
                    const group2 = [];
                    
                    for (let id in users) {
                        const user = users[id];
                        if (user.role === 'player' && user.isActive) {
                            if (user.group === 'group1') {
                                group1.push(user);
                            } else {
                                group2.push(user);
                            }
                        }
                    }
                    
                    document.getElementById('groupsDisplay').innerHTML = `
                        <div class="group-card">
                            <div class="group-title">👥 گروپی یەکەم</div>
                            ${group1.map(p => `
                                <div class="player-item">
                                    <span class="player-name ${p.eliminated ? 'player-eliminated' : ''}">${p.displayName}</span>
                                    <span class="player-score">${p.score || 0} خاڵ</span>
                                </div>
                            `).join('')}
                        </div>
                        <div class="group-card">
                            <div class="group-title">👥 گروپی دووەم</div>
                            ${group2.map(p => `
                                <div class="player-item">
                                    <span class="player-name ${p.eliminated ? 'player-eliminated' : ''}">${p.displayName}</span>
                                    <span class="player-score">${p.score || 0} خاڵ</span>
                                </div>
                            `).join('')}
                        </div>
                    `;
                });
        }
        
        function goBack() {
            if (document.getElementById('questionsView').style.display === 'block') {
                document.getElementById('questionsView').style.display = 'none';
                document.getElementById('categoriesView').style.display = 'block';
                currentCategory = null;
            } else if (document.getElementById('groupsDisplay').style.display === 'grid') {
                document.getElementById('groupsDisplay').style.display = 'none';
                document.getElementById('categoriesView').style.display = 'block';
                document.getElementById('questionDisplay').style.display = 'none';
            } else {
                document.getElementById('categoriesView').style.display = 'none';
                document.getElementById('modeButtons').style.display = 'flex';
                document.querySelector('.back-btn').style.display = 'none';
                document.querySelector('.reset-btn').style.display = 'none';
                currentMode = null;
            }
        }
        
        function resetGame() {
            if (confirm('دڵنیایت کە دەتەوێت هەموو یاریەکە ریسێت بکەیت؟ هەموو پرسیارە بەکارهاتووەکان دەگەڕێنەوە باری ئاسایی')) {
                // Reset all questions
                for (let cat in categories) {
                    database.ref(`categories/${cat}/questions`).once('value')
                        .then(snapshot => {
                            const questions = snapshot.val();
                            if (questions) {
                                for (let qId in questions) {
                                    database.ref(`categories/${cat}/questions/${qId}/isUsed`).set(false);
                                }
                            }
                        });
                }
                
                // Reset all players scores to 5
                database.ref('users').once('value')
                    .then(snapshot => {
                        const users = snapshot.val();
                        for (let id in users) {
                            if (users[id].role === 'player') {
                                database.ref(`users/${id}/score`).set(5);
                                database.ref(`users/${id}/isActive`).set(true);
                                database.ref(`users/${id}/eliminated`).set(false);
                            }
                        }
                    });
                
                alert('یاریەکە ریسێت کرا!');
                location.reload();
            }
        }
        
        // Listen for keydown for Backspace
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Backspace') {
                e.preventDefault();
                goBack();
            }
        });
        
        if (checkAuth()) {
            // Initial load
        }
    </script>
</body>
</html>
