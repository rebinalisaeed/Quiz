<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>پێشکەشکار - یاری پرسیار و وەڵام</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        
        body {
            font-family: 'K24KurdishBold-Bold', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* Mode Selection */
        .mode-selection {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 50px 0;
        }
        
        .mode-btn {
            padding: 20px 50px;
            font-size: 24px;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }
        
        .mode-btn.online {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .mode-btn.offline {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        
        .mode-btn.reset {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            color: white;
        }
        
        .mode-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        /* Category Grid */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 30px;
        }
        
        .category-card {
            background: white;
            border-radius: 15px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 20px;
            font-weight: bold;
            color: #333;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        
        .category-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        
        .category-card.selected {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
        }
        
        .category-card.used {
            background: linear-gradient(135deg, #f44336 0%, #da190b 100%);
            color: white;
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        /* Question Grid (6x6) */
        .question-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            margin-top: 30px;
        }
        
        .question-number {
            background: white;
            border-radius: 12px;
            padding: 20px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 18px;
            font-weight: bold;
            color: #333;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }
        
        .question-number:hover {
            transform: scale(1.05);
            background: #f0f0f0;
        }
        
        .question-number.selected {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
        }
        
        .question-number.used {
            background: linear-gradient(135deg, #f44336 0%, #da190b 100%);
            color: white;
            cursor: not-allowed;
            opacity: 0.7;
        }
        
        /* Question Display */
        .question-display {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-top: 30px;
            text-align: center;
        }
        
        .timer {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 20px;
        }
        
        .question-text {
            font-size: 24px;
            color: #333;
            margin-bottom: 30px;
            line-height: 1.4;
        }
        
        .options-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .option-item {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 10px;
            font-size: 18px;
            transition: all 0.3s;
        }
        
        .option-item.correct {
            background: #4CAF50;
            color: white;
        }
        
        /* Groups Display */
        .groups-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 30px;
        }
        
        .group-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
        }
        
        .group-title {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        
        .players-list {
            list-style: none;
        }
        
        .player-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin: 5px 0;
            background: #f9f9f9;
            border-radius: 8px;
        }
        
        .player-name {
            font-size: 16px;
        }
        
        .player-score {
            font-weight: bold;
            color: #667eea;
            font-size: 18px;
        }
        
        .player-eliminated {
            opacity: 0.5;
            text-decoration: line-through;
        }
        
        .back-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-family: inherit;
        }
        
        .hidden {
            display: none;
        }
        
        @media (max-width: 768px) {
            .question-grid {
                gap: 8px;
            }
            
            .question-number {
                padding: 12px 5px;
                font-size: 14px;
            }
            
            .category-card {
                padding: 25px 10px;
                font-size: 16px;
            }
            
            .question-text {
                font-size: 18px;
            }
            
            .options-list {
                grid-template-columns: 1fr;
            }
            
            .groups-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- Mode Selection -->
        <div id="modeSelection" class="mode-selection">
            <button class="mode-btn online" onclick="selectMode('online')">🌐 ئۆنلاین</button>
            <button class="mode-btn offline" onclick="selectMode('offline')">📱 ئۆفلاین</button>
            <button class="mode-btn reset" onclick="resetGame()">🔄 ریسێت</button>
        </div>
        
        <!-- Category Grid -->
        <div id="categoryView" class="hidden">
            <div class="category-grid" id="categoryGrid"></div>
        </div>
        
        <!-- Question Grid -->
        <div id="questionGridView" class="hidden">
            <button class="back-button" onclick="goBackToCategories()">🔙 گەڕانەوە (Backspace)</button>
            <div class="question-grid" id="questionGrid"></div>
        </div>
        
        <!-- Question Display -->
        <div id="questionDisplayView" class="hidden">
            <button class="back-button" onclick="goBackToQuestions()">🔙 گەڕانەوە</button>
            <div class="question-display">
                <div class="timer" id="timer">30</div>
                <div class="question-text" id="displayQuestion"></div>
                <div class="options-list" id="displayOptions"></div>
            </div>
        </div>
        
        <!-- Groups Display -->
        <div id="groupsView" class="hidden">
            <button class="back-button" onclick="showQuestionGrid()">🔙 گەڕانەوە بۆ پرسیارەکان</button>
            <div class="groups-container" id="groupsContainer"></div>
        </div>
    </div>
    
    <script type="module">
        import { db, ref, get, set, update, onValue } from './firebase-config.js';
        
        let currentMode = null;
        let currentCategory = null;
        let currentQuestionId = null;
        let timerInterval = null;
        let timerSeconds = 30;
        let isWaitingForEnter = false;
        
        const categories = [
            { key: 'history', name: 'مێژوو' },
            { key: 'science', name: 'زانست' },
            { key: 'literature', name: 'ئەدەبییات' },
            { key: 'art', name: 'هونەر' },
            { key: 'sports', name: 'وەرزش' },
            { key: 'technology', name: 'تەکنەلۆژیا' },
            { key: 'health', name: 'تەندروستی' },
            { key: 'geography', name: 'جوگرافیا' },
            { key: 'religion', name: 'ئایینی' }
        ];
        
        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' || e.key === 'Escape') {
                e.preventDefault();
                if (!document.getElementById('categoryView').classList.contains('hidden')) {
                    // Already in category view
                } else if (!document.getElementById('questionGridView').classList.contains('hidden')) {
                    goBackToCategories();
                } else if (!document.getElementById('questionDisplayView').classList.contains('hidden')) {
                    goBackToQuestions();
                } else if (!document.getElementById('groupsView').classList.contains('hidden')) {
                    showQuestionGrid();
                }
            } else if (e.key === 'Enter' && isWaitingForEnter) {
                e.preventDefault();
                showGroupsAndPlayers();
            }
        });
        
        window.selectMode = function(mode) {
            currentMode = mode;
            document.getElementById('modeSelection').classList.add('hidden');
            document.getElementById('categoryView').classList.remove('hidden');
            
            if (mode === 'online') {
                // Set presenter online in Firebase
                set(ref(db, 'game/presenterOnline'), true);
                set(ref(db, 'game/gameActive'), true);
            }
            
            loadCategories();
        };
        
        async function loadCategories() {
            const container = document.getElementById('categoryGrid');
            container.innerHTML = '';
            
            for (let cat of categories) {
                // Check if all questions in this category are used
                const questionsRef = ref(db, `categories/${cat.key}/questions`);
                const snapshot = await get(questionsRef);
                let allUsed = false;
                let hasQuestions = false;
                
                if (snapshot.exists()) {
                    hasQuestions = true;
                    const questions = snapshot.val();
                    const total = Object.keys(questions).length;
                    let usedCount = 0;
                    
                    for (let qId in questions) {
                        if (questions[qId].used === true) usedCount++;
                    }
                    allUsed = (usedCount === total && total > 0);
                }
                
                const card = document.createElement('div');
                card.className = `category-card ${allUsed ? 'used' : ''}`;
                card.textContent = `${cat.name} ${hasQuestions ? '' : '(پرسیار نییە)'}`;
                
                if (!allUsed && hasQuestions) {
                    card.onclick = () => selectCategory(cat.key);
                } else if (!hasQuestions) {
                    card.style.opacity = '0.5';
                    card.style.cursor = 'not-allowed';
                }
                
                container.appendChild(card);
            }
        }
        
        async function selectCategory(categoryKey) {
            currentCategory = categoryKey;
            document.getElementById('categoryView').classList.add('hidden');
            document.getElementById('questionGridView').classList.remove('hidden');
            await loadQuestionsForCategory(categoryKey);
        }
        
        async function loadQuestionsForCategory(categoryKey) {
            const questionsRef = ref(db, `categories/${categoryKey}/questions`);
            const snapshot = await get(questionsRef);
            const container = document.getElementById('questionGrid');
            container.innerHTML = '';
            
            if (snapshot.exists()) {
                const questions = snapshot.val();
                const questionIds = Object.keys(questions);
                
                for (let i = 1; i <= 36; i++) {
                    const qId = questionIds[i-1];
                    const question = questions[qId];
                    const isUsed = question?.used === true;
                    const exists = qId !== undefined;
                    
                    const box = document.createElement('div');
                    box.className = `question-number ${isUsed ? 'used' : ''}`;
                    box.textContent = i;
                    
                    if (exists && !isUsed) {
                        box.onclick = () => selectQuestion(qId, question);
                    }
                    
                    container.appendChild(box);
                }
            } else {
                for (let i = 1; i <= 36; i++) {
                    const box = document.createElement('div');
                    box.className = 'question-number';
                    box.textContent = i;
                    box.style.opacity = '0.3';
                    container.appendChild(box);
                }
            }
        }
        
        async function selectQuestion(questionId, question) {
            currentQuestionId = questionId;
            
            // Mark as used
            await update(ref(db, `categories/${currentCategory}/questions/${questionId}`), { used: true });
            
            // Send question to players if online
            if (currentMode === 'online') {
                await set(ref(db, 'game/currentQuestion'), {
                    id: questionId,
                    category: currentCategory,
                    text: question.text,
                    options: question.options,
                    correct: question.correct,
                    timestamp: Date.now()
                });
                await set(ref(db, 'game/questionActive'), true);
                await set(ref(db, 'game/timerStart'), Date.now());
            }
            
            // Show question display
            document.getElementById('questionGridView').classList.add('hidden');
            document.getElementById('questionDisplayView').classList.remove('hidden');
            
            // Display question
            document.getElementById('displayQuestion').textContent = question.text;
            const optionsContainer = document.getElementById('displayOptions');
            optionsContainer.innerHTML = '';
            
            question.options.forEach((opt, idx) => {
                const div = document.createElement('div');
                div.className = 'option-item';
                div.textContent = `${idx+1}. ${opt}`;
                optionsContainer.appendChild(div);
            });
            
            // Start timer
            startTimer(question);
        }
        
        function startTimer(question) {
            timerSeconds = 30;
            const timerElement = document.getElementById('timer');
            timerElement.textContent = timerSeconds;
            
            if (timerInterval) clearInterval(timerInterval);
            
            // Wait 3 seconds before starting timer
            setTimeout(() => {
                timerInterval = setInterval(() => {
                    timerSeconds--;
                    timerElement.textContent = timerSeconds;
                    
                    if (timerSeconds <= 0) {
                        clearInterval(timerInterval);
                        // Show correct answer
                        const options = document.querySelectorAll('.option-item');
                        options.forEach((opt, idx) => {
                            if (idx === question.correct) {
                                opt.classList.add('correct');
                            }
                        });
                        isWaitingForEnter = true;
                        
                        if (currentMode === 'online') {
                            set(ref(db, 'game/questionActive'), false);
                            set(ref(db, 'game/showAnswer'), true);
                        }
                    }
                }, 1000);
            }, 3000);
        }
        
        function showGroupsAndPlayers() {
            clearInterval(timerInterval);
            document.getElementById('questionDisplayView').classList.add('hidden');
            document.getElementById('groupsView').classList.remove('hidden');
            isWaitingForEnter = false;
            loadPlayersAndGroups();
        }
        
        async function loadPlayersAndGroups() {
            const usersRef = ref(db, 'users');
            const snapshot = await get(usersRef);
            const group1 = [];
            const group2 = [];
            
            if (snapshot.exists()) {
                const users = snapshot.val();
                for (let userId in users) {
                    const user = users[userId];
                    if (user.role === 'player' && user.isActive !== false) {
                        if (user.group === 'group1') {
                            group1.push({ id: userId, ...user });
                        } else if (user.group === 'group2') {
                            group2.push({ id: userId, ...user });
                        }
                    }
                }
            }
            
            const container = document.getElementById('groupsContainer');
            container.innerHTML = `
                <div class="group-card">
                    <div class="group-title">👥 گروپی یەکەم</div>
                    <div class="players-list" id="group1List"></div>
                </div>
                <div class="group-card">
                    <div class="group-title">👥 گروپی دووەم</div>
                    <div class="players-list" id="group2List"></div>
                </div>
            `;
            
            const group1List = document.getElementById('group1List');
            const group2List = document.getElementById('group2List');
            
            group1.forEach(p => {
                const li = document.createElement('li');
                li.className = `player-item ${p.isEliminated ? 'player-eliminated' : ''}`;
                li.innerHTML = `<span class="player-name">${p.name || p.username}</span><span class="player-score">⭐ ${p.score || 5}</span>`;
                group1List.appendChild(li);
            });
            
            group2.forEach(p => {
                const li = document.createElement('li');
                li.className = `player-item ${p.isEliminated ? 'player-eliminated' : ''}`;
                li.innerHTML = `<span class="player-name">${p.name || p.username}</span><span class="player-score">⭐ ${p.score || 5}</span>`;
                group2List.appendChild(li);
            });
        }
        
        window.goBackToCategories = function() {
            document.getElementById('questionGridView').classList.add('hidden');
            document.getElementById('categoryView').classList.remove('hidden');
            loadCategories();
        };
        
        window.goBackToQuestions = function() {
            if (timerInterval) clearInterval(timerInterval);
            document.getElementById('questionDisplayView').classList.add('hidden');
            document.getElementById('questionGridView').classList.remove('hidden');
            loadQuestionsForCategory(currentCategory);
        };
        
        window.showQuestionGrid = function() {
            document.getElementById('groupsView').classList.add('hidden');
            document.getElementById('questionGridView').classList.remove('hidden');
        };
        
        window.resetGame = async function() {
            if (confirm('دڵنیایت دەتەوێت هەموو یاریەکە ریسێت بکەیت؟ هەموو پێشکەوتنەکان دەسڕێنەوە!')) {
                // Reset used questions
                for (let cat of categories) {
                    const questionsRef = ref(db, `categories/${cat.key}/questions`);
                    const snapshot = await get(questionsRef);
                    if (snapshot.exists()) {
                        const questions = snapshot.val();
                        for (let qId in questions) {
                            await update(ref(db, `categories/${cat.key}/questions/${qId}`), { used: false });
                        }
                    }
                }
                
                // Reset players scores
                const usersRef = ref(db, 'users');
                const snapshot = await get(usersRef);
                if (snapshot.exists()) {
                    const users = snapshot.val();
                    for (let userId in users) {
                        if (users[userId].role === 'player') {
                            await update(ref(db, `users/${userId}`), { 
                                score: 5, 
                                isEliminated: false,
                                isActive: true 
                            });
                        }
                    }
                }
                
                // Reset game state
                await set(ref(db, 'game/currentQuestion'), null);
                await set(ref(db, 'game/questionActive'), false);
                await set(ref(db, 'game/showAnswer'), false);
                
                showMessage('یاریەکە بە سەرکەوتوویی ریسێت کرا', 'success');
                
                // Reload categories
                if (currentMode) {
                    loadCategories();
                }
            }
        };
        
        function showMessage(msg, type) {
            const messageDiv = document.createElement('div');
            messageDiv.style.cssText = `position:fixed;top:20px;right:20px;padding:15px 25px;border-radius:10px;color:white;font-weight:bold;z-index:1000;background:${type === 'success' ? '#4CAF50' : '#f44336'};animation:slideIn 0.3s ease`;
            messageDiv.textContent = msg;
            document.body.appendChild(messageDiv);
            setTimeout(() => messageDiv.remove(), 3000);
        }
        
        // Check permission
        const currentUser = JSON.parse(localStorage.getItem('currentUser') || '{}');
        if (currentUser.role !== 'presenter' && currentUser.role !== 'admin') {
            alert('تەنها پێشکەشکار دەتوانێت ئەم پەڕەیە ببینێت!');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
