<!DOCTYPE html>
<html dir="rtl">
<head>
    <title>پێشکەشکار - هەڵبژاردنی پرسیار</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @font-face { font-family: 'K24Kurdish'; src: url('K24KurdishBold-Bold.ttf') format('truetype'); }
        * { font-family: 'K24Kurdish', 'Segoe UI', sans-serif; box-sizing: border-box; }
        body { background: #1e1e2f; margin: 0; padding: 20px; min-height: 100vh; }
        .main-container { display: flex; gap: 20px; max-width: 1600px; margin: auto; }
        .left-panel { flex: 3; }
        .right-panel { width: 300px; background: rgba(0,0,0,0.3); border-radius: 25px; padding: 20px; height: fit-content; }
        h1 { color: white; text-align: center; margin-bottom: 20px; font-size: 24px; }
        .info-bar { background: rgba(255,255,255,0.1); border-radius: 20px; padding: 15px; margin-bottom: 20px; text-align: center; color: white; }
        .category-tabs { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-bottom: 30px; }
        .tab-btn { background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.2); border-radius: 40px; padding: 10px 20px; font-size: 16px; color: white; cursor: pointer; }
        .tab-btn.active { background: #4CAF50; }
        .glass-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 25px; padding: 25px; margin-bottom: 30px; }
        .glass-card h3 { color: white; text-align: center; margin-bottom: 20px; }
        .questions-grid { display: grid; grid-template-columns: repeat(9, 1fr); gap: 10px; margin: 20px 0; }
        .question-box { background: rgba(255,255,255,0.15); border-radius: 12px; padding: 15px 5px; text-align: center; font-size: 18px; color: white; cursor: pointer; border: 2px solid rgba(255,255,255,0.2); transition: all 0.2s; }
        .question-box:hover { background: rgba(255,255,255,0.3); transform: scale(1.02); }
        .question-box-empty { background: rgba(255,255,255,0.05); opacity: 0.5; cursor: not-allowed; }
        .selected-info { background: #4CAF50; border-radius: 20px; padding: 15px; margin-top: 15px; text-align: center; color: white; }
        .btn-logout { background: #ff6b6b; color: white; display: block; width: 200px; margin: 20px auto 0; padding: 12px 25px; border: none; border-radius: 30px; font-size: 16px; cursor: pointer; }
        
        /* ستایلەکانی پانێلی ڕاست */
        .right-panel h3 { color: white; text-align: center; margin-bottom: 15px; }
        .players-list { list-style: none; padding: 0; }
        .player-item { background: rgba(255,255,255,0.1); border-radius: 15px; padding: 12px; margin-bottom: 10px; color: white; display: flex; justify-content: space-between; align-items: center; }
        .player-name { font-weight: bold; }
        .player-answer { background: rgba(255,255,255,0.2); border-radius: 20px; padding: 3px 10px; font-size: 14px; }
        .player-item-orange { background: #ff9800 !important; color: white; }
        .waiting-text { color: rgba(255,255,255,0.5); text-align: center; padding: 20px; }
        
        @media (max-width: 900px) { .questions-grid { grid-template-columns: repeat(6, 1fr); } .main-container { flex-direction: column; } .right-panel { width: 100%; } }
        @media (max-width: 600px) { .questions-grid { grid-template-columns: repeat(5, 1fr); } .question-box { font-size: 14px; padding: 10px 3px; } }
    </style>
</head>
<body>
<div class="main-container">
    <div class="left-panel">
        <h1>🎯 پێشکەشکار - هەڵبژاردنی پرسیار بۆ یاریکەران</h1>
        <div class="info-bar">
            📢 کەتەگۆری و ژمارەی پرسیار هەڵبژێرە، پرسیارەکە ڕاستەوخۆ بۆ هەموو یاریکەران دەنێردرێت
        </div>
        
        <div class="category-tabs" id="categoryTabs"></div>
        
        <div class="glass-card">
            <h3>📋 پرسیارەکان</h3>
            <div id="selectedInfo" class="selected-info" style="display:none;"></div>
            <div class="questions-grid" id="questionsGrid"></div>
        </div>
        
        <button class="btn-logout" onclick="logout()">🚪 دەرچوون</button>
    </div>
    
    <div class="right-panel">
        <h3>👥 یاریکەران</h3>
        <div id="playersList" class="players-list">
            <div class="waiting-text">بارکردن...</div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCtiW-RBMY0emCOFZdQCA7ynPESraUknxI",
        authDomain: "quizgamerebin.firebaseapp.com",
        databaseURL: "https://quizgamerebin-default-rtdb.firebaseio.com",
        projectId: "quizgamerebin",
        storageBucket: "quizgamerebin.firebasestorage.app",
        messagingSenderId: "312376681830",
        appId: "1:312376681830:web:11262fa62cc9246bac14a7"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    const MAX_QS = 45;
    const categoriesList = ["مێژوو", "زانست", "ئەدەبیات", "هونەر", "وەرزش", "تەکنەلۆژیا", "تەندروستی", "جوگرافیا", "ئاینی"];
    let categories = {};
    let currentCategory = "";
    let roomId = localStorage.getItem("roomId") || "quiz_room_main";
    let currentUser = JSON.parse(localStorage.getItem("loggedInUser") || "{}");
    let activePlayers = {}; // بۆ هەڵگرتنی زانیاری یاریکەران
    
    if(currentUser.role !== "admin" && currentUser.role !== "super_admin") {
        alert("⚠️ تۆ مافی پێشکەشکاریت نییە!");
        window.location.href = "play.html";
    }
    
    // گوێگرتن لە یاریکەران
    database.ref(`${roomId}/activePlayers`).on('value', (snapshot) => {
        activePlayers = snapshot.val() || {};
        renderPlayersList();
    });
    
    function renderPlayersList() {
        const container = document.getElementById("playersList");
        const players = Object.values(activePlayers);
        
        if(players.length === 0) {
            container.innerHTML = "<div class='waiting-text'>هیچ یاریکەرێک نییە</div>";
            return;
        }
        
        let html = "";
        players.forEach(player => {
            const answerClass = player.currentAnswer ? "player-item-orange" : "";
            html += `
                <div class="player-item ${answerClass}">
                    <span class="player-name">👤 ${player.username}</span>
                    ${player.currentAnswer ? `<span class="player-answer">${player.currentAnswer}</span>` : '<span class="player-answer">چاوەڕوان</span>'}
                </div>
            `;
        });
        container.innerHTML = html;
    }
    
    database.ref(`${roomId}/categories`).on('value', (snapshot) => {
        categories = snapshot.val() || {};
        categoriesList.forEach(c => { if(!categories[c]) categories[c] = []; });
        if(!currentCategory && categoriesList.length) currentCategory = categoriesList[0];
        renderTabs();
        renderQuestions();
    });
    
    function renderTabs() {
        const container = document.getElementById("categoryTabs");
        container.innerHTML = "";
        categoriesList.forEach(cat => {
            const btn = document.createElement("button");
            btn.textContent = `${cat} (${categories[cat]?.length || 0}/${MAX_QS})`;
            btn.className = "tab-btn" + (cat === currentCategory ? " active" : "");
            btn.onclick = () => {
                currentCategory = cat;
                renderTabs();
                renderQuestions();
                document.getElementById("selectedInfo").style.display = "none";
            };
            container.appendChild(btn);
        });
    }
    
    function renderQuestions() {
        const container = document.getElementById("questionsGrid");
        const questions = categories[currentCategory] || [];
        let html = "";
        for(let i = 0; i < MAX_QS; i++) {
            if(i < questions.length) {
                html += `<div class="question-box" onclick="selectQuestion(${i})">${i+1}</div>`;
            } else {
                html += `<div class="question-box question-box-empty">${i+1}</div>`;
            }
        }
        container.innerHTML = html;
    }
    
    function selectQuestion(index) {
        const questions = categories[currentCategory];
        if(!questions || index >= questions.length) {
            alert("⚠️ ئەم پرسیارە بوونی نییە! تکایە یەکەم پرسیار زیاد بکە.");
            return;
        }
        
        const selectedQuestion = questions[index];
        
        // پاککردنەوەی وەڵامەکانی پێشووی یاریکەران
        database.ref(`${roomId}/activePlayers`).once('value', (snapshot) => {
            const players = snapshot.val() || {};
            Object.keys(players).forEach(playerId => {
                database.ref(`${roomId}/activePlayers/${playerId}/currentAnswer`).remove();
            });
        });
        
        const infoDiv = document.getElementById("selectedInfo");
        infoDiv.style.display = "block";
        infoDiv.innerHTML = `✅ پرسیار ${index+1} نێردرا: "${selectedQuestion.text.substring(0, 50)}..."`;
        
        database.ref(`${roomId}/activeQuestion`).set({
            question: selectedQuestion,
            correct: selectedQuestion.correct,
            category: currentCategory,
            index: index,
            timestamp: Date.now()
        });
        
        setTimeout(() => {
            infoDiv.style.opacity = "0.5";
            setTimeout(() => {
                infoDiv.style.display = "none";
                infoDiv.style.opacity = "1";
            }, 1000);
        }, 2000);
    }
    
    function logout() {
        localStorage.clear();
        window.location.href = "index.html";
    }
</script>
</body>
</html>
