<!DOCTYPE html>
<html dir="rtl">
<head>
    <title>پێشکەشکار - هەڵبژاردنی پرسیار</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @font-face { font-family: 'K24Kurdish'; src: url('K24KurdishBold-Bold.ttf') format('truetype'); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'K24Kurdish', 'Segoe UI', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: linear-gradient(135deg, #1e3c72, #2a5298); min-height: 100vh; padding: 20px; }
        .main-container { max-width: 900px; width: 100%; margin: auto; }
        
        /* کەتەگۆرییەکان - تۆڕی 3x3 */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .category-card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .category-card:hover {
            background: rgba(255,255,255,0.25);
            transform: translateY(-5px);
        }
        .category-card:active {
            transform: scale(0.98);
        }
        .category-card span {
            font-size: 20px;
            color: white;
        }
        
        /* پرسیارەکان - تۆڕی 6x6 */
        .questions-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            margin-top: 20px;
        }
        .question-box {
            background: rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 15px 5px;
            text-align: center;
            font-size: 18px;
            color: white;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.2);
            transition: all 0.2s;
        }
        .question-box:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.02);
        }
        .question-box:active {
            transform: scale(0.95);
        }
        .question-box-empty {
            background: rgba(255,255,255,0.05);
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* شاشەی پرسیار */
        .question-screen {
            text-align: center;
            animation: fadeIn 0.3s ease;
        }
        .timer {
            font-size: 52px;
            color: #ff6b6b;
            background: rgba(0,0,0,0.6);
            display: inline-block;
            padding: 10px 35px;
            border-radius: 60px;
            margin: 20px 0;
            font-family: monospace;
            animation: slideDown 0.3s ease;
        }
        .question-text {
            font-size: 26px;
            color: white;
            margin: 20px 0;
            padding: 25px;
            background: rgba(0,0,0,0.4);
            border-radius: 25px;
            line-height: 1.5;
            animation: slideUp 0.3s ease;
        }
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
            animation: slideUp 0.5s ease;
        }
        .option-box {
            background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 20px;
            padding: 15px;
            font-size: 18px;
            color: white;
            text-align: center;
            transition: all 0.3s;
        }
        .option-correct {
            background: #4CAF50 !important;
            border-color: #2e7d32 !important;
            animation: pulse 0.5s ease;
        }
        
        /* گروپەکانی یاریکەران */
        .groups-container {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        .group-box {
            flex: 1;
            min-width: 280px;
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            padding: 20px;
        }
        .group-box h3 {
            color: white;
            text-align: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(255,255,255,0.3);
            font-size: 20px;
        }
        .players-list {
            list-style: none;
            padding: 0;
            max-height: 400px;
            overflow-y: auto;
        }
        .player-item {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 10px 15px;
            margin-bottom: 8px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
            font-size: 14px;
        }
        .player-eliminated {
            background: rgba(255,0,0,0.3);
            opacity: 0.6;
        }
        .player-name {
            flex: 2;
            font-weight: bold;
        }
        .player-score {
            flex: 1;
            text-align: center;
            font-weight: bold;
            color: #ff9800;
        }
        .player-answer {
            flex: 1;
            text-align: center;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 13px;
        }
        
        /* ئەنیمەیشنەکان */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        @media (max-width: 900px) {
            .questions-grid { grid-template-columns: repeat(5, 1fr); }
            .groups-container { flex-direction: column; }
            .group-box { min-width: auto; }
        }
        @media (max-width: 700px) {
            .categories-grid { gap: 15px; }
            .category-card { padding: 20px 10px; }
            .category-card span { font-size: 16px; }
            .questions-grid { grid-template-columns: repeat(4, 1fr); }
            .question-box { font-size: 14px; padding: 10px 3px; }
            .question-text { font-size: 20px; }
            .option-box { font-size: 14px; padding: 12px; }
            .timer { font-size: 40px; padding: 8px 25px; }
        }
        @media (max-width: 500px) {
            .questions-grid { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>
<div class="main-container">
    <div id="categoriesSection">
        <div class="categories-grid" id="categoriesGrid"></div>
    </div>
    
    <div id="questionsSection" style="display:none;">
        <div class="questions-grid" id="questionsGrid"></div>
    </div>
    
    <div id="questionScreenSection" style="display:none;">
        <div id="questionDisplay" class="question-screen"></div>
    </div>
    
    <div id="groupsSection" style="display:none;">
        <div class="groups-container" id="groupsContainer"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAaKPSq0gBKaFG7Pfe-bGOpgEkz2TLnBS8",
        authDomain: "quizinrebin.firebaseapp.com",
        databaseURL: "https://quizinrebin-default-rtdb.firebaseio.com",
        projectId: "quizinrebin",
        storageBucket: "quizinrebin.firebasestorage.app",
        messagingSenderId: "40466121073",
        appId: "1:40466121073:web:766379012a8846c9d836d0",
        measurementId: "G-1TT4ZDJYCM"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    const MAX_QS = 36;
    const categoriesList = ["مێژوو", "زانست", "ئەدەبیات", "هونەر", "وەرزش", "تەکنەلۆژیا", "تەندروستی", "جوگرافیا", "ئاینی"];
    let categories = {};
    let currentCategory = "";
    let currentSelectedQuestion = null;
    let roomId = localStorage.getItem("roomId") || "quiz_room_main";
    let currentUser = JSON.parse(localStorage.getItem("loggedInUser") || "{}");
    let timerInterval = null;
    let timeLeft = 30;
    let isEvaluating = false;
    let activePlayers = {};
    
    // ناچالاککردنی reload و refresh
    document.addEventListener('contextmenu', e => e.preventDefault());
    window.addEventListener('keydown', e => {
        if(e.key === 'F5' || (e.ctrlKey && e.key === 'r') || (e.metaKey && e.key === 'r')) {
            e.preventDefault();
            return false;
        }
        if(e.key === 'Backspace') {
            e.preventDefault();
            backToCategories();
        }
        if(e.key === 'Enter' && document.getElementById("questionScreenSection").style.display === "block") {
            e.preventDefault();
            endQuestionAndShowScores();
        }
    });
    
    if(currentUser.role !== "admin" && currentUser.role !== "super_admin") {
        alert("⚠️ تۆ مافی پێشکەشکاریت نییە!");
        window.location.href = "play.html";
    }
    
    // گوێگرتن لە یاریکەران
    database.ref(`${roomId}/activePlayers`).on('value', (snapshot) => {
        activePlayers = snapshot.val() || {};
    });
    
    // بارکردنی کەتەگۆرییەکان
    database.ref(`${roomId}/categories`).on('value', (snapshot) => {
        categories = snapshot.val() || {};
        categoriesList.forEach(c => { if(!categories[c]) categories[c] = []; });
        renderCategories();
    });
    
    function renderCategories() {
        const container = document.getElementById("categoriesGrid");
        container.innerHTML = "";
        categoriesList.forEach(cat => {
            const card = document.createElement("div");
            card.className = "category-card";
            card.innerHTML = `<span>${cat}</span>`;
            card.onclick = () => {
                currentCategory = cat;
                document.getElementById("categoriesSection").style.display = "none";
                document.getElementById("questionsSection").style.display = "block";
                renderQuestions();
            };
            container.appendChild(card);
        });
    }
    
    function renderQuestions() {
        const container = document.getElementById("questionsGrid");
        const questions = categories[currentCategory] || [];
        let html = "";
        for(let i = 0; i < MAX_QS; i++) {
            if(i < questions.length) {
                html += `<div class="question-box" onclick="selectQuestion(${i})">${i+1}</div>`;
            } else {
                html += `<div class="question-box question-box-empty">${i+1}</div>`;
            }
        }
        container.innerHTML = html;
    }
    
    function selectQuestion(index) {
        const questions = categories[currentCategory];
        if(!questions || index >= questions.length) {
            alert("⚠️ ئەم پرسیارە بوونی نییە! تکایە یەکەم پرسیار زیاد بکە.");
            return;
        }
        
        currentSelectedQuestion = questions[index];
        isEvaluating = false;
        
        // پاککردنەوەی وەڵامەکانی پێشووی یاریکەران
        database.ref(`${roomId}/activePlayers`).once('value', (snapshot) => {
            const players = snapshot.val() || {};
            Object.keys(players).forEach(playerId => {
                database.ref(`${roomId}/activePlayers/${playerId}/currentAnswer`).remove();
            });
        });
        
        // ناردنی پرسیار بۆ یاریکەران
        database.ref(`${roomId}/activeQuestion`).set({
            question: currentSelectedQuestion,
            correct: currentSelectedQuestion.correct,
            category: currentCategory,
            index: index,
            timestamp: Date.now()
        });
        
        document.getElementById("questionsSection").style.display = "none";
        document.getElementById("questionScreenSection").style.display = "block";
        
        displayQuestionWithAnimation(currentSelectedQuestion);
    }
    
    function displayQuestionWithAnimation(question) {
        const letters = ["A", "B", "C", "D"];
        const container = document.getElementById("questionDisplay");
        
        // ئەنیمەیشنی پرسیار (0.3 چرکە)
        container.innerHTML = `<div class="question-text" style="animation: slideUp 0.3s ease;">${question.text}</div>`;
        
        // دوای 0.3 چرکە، هەڵبژاردنەکان زیاد بکە (0.5 چرکە)
        setTimeout(() => {
            const optionsHtml = `
                <div class="options-grid" style="animation: slideUp 0.5s ease;">
                    ${question.options.map((opt, idx) => `
                        <div class="option-box" data-opt="${letters[idx]}">${letters[idx]}. ${opt}</div>
                    `).join('')}
                </div>
            `;
            container.innerHTML = `<div class="question-text" style="animation: slideUp 0.3s ease;">${question.text}</div>${optionsHtml}`;
        }, 300);
        
        // دوای 0.5 چرکە، چرکەکە زیاد بکە و دەست پێ بکات
        setTimeout(() => {
            const timerHtml = `<div class="timer" id="presenterTimer" style="animation: slideDown 0.3s ease;">30</div>`;
            container.innerHTML = timerHtml + container.innerHTML;
            startTimer();
        }, 800);
    }
    
    function startTimer() {
        timeLeft = 30;
        if(timerInterval) clearInterval(timerInterval);
        
        timerInterval = setInterval(() => {
            if(timeLeft > 0) {
                timeLeft--;
                const timerDiv = document.getElementById("presenterTimer");
                if(timerDiv) timerDiv.innerText = `${timeLeft}`;
                
                if(timeLeft === 0 && !isEvaluating) {
                    clearInterval(timerInterval);
                    evaluateAnswersAndShowCorrect();
                }
            }
        }, 1000);
    }
    
    function evaluateAnswersAndShowCorrect() {
        if(isEvaluating) return;
        isEvaluating = true;
        
        // وەڵامی ڕاست پیشان بدە
        const letters = ["A", "B", "C", "D"];
        const correctLetter = currentSelectedQuestion.correct;
        const correctIndex = letters.indexOf(correctLetter);
        const optionBoxes = document.querySelectorAll(".option-box");
        if(optionBoxes[correctIndex]) {
            optionBoxes[correctIndex].classList.add("option-correct");
        }
        
        // هەڵسەنگاندنی وەڵامەکان و دیاریکردنی خاڵ
        database.ref(`${roomId}/activePlayers`).once('value', (snapshot) => {
            const players = snapshot.val() || {};
            
            Object.entries(players).forEach(([playerId, player]) => {
                if(player.eliminated) return;
                
                const userAnswer = player.currentAnswer;
                let scoreChange = 0;
                let answerStatus = "";
                
                if(userAnswer === currentSelectedQuestion.correct) {
                    scoreChange = 3;
                    answerStatus = "✅ ڕاست";
                } else if(userAnswer === "NO_ANSWER" || userAnswer === null || userAnswer === undefined) {
                    scoreChange = -1;
                    answerStatus = "⏰ بێ وەڵام";
                } else {
                    scoreChange = -1;
                    answerStatus = "❌ هەڵە";
                }
                
                const currentScore = player.score !== undefined ? player.score : 5;
                let newScore = currentScore + scoreChange;
                if(newScore < 0) newScore = 0;
                
                console.log(`📊 ${player.username}: ${answerStatus} | وەڵام: ${userAnswer} | خاڵ: ${currentScore} → ${newScore}`);
                
                database.ref(`${roomId}/activePlayers/${playerId}/score`).set(newScore);
                
                // ئەگەر خاڵ 0 بوو، یاریکەر دەربکە
                if(newScore === 0 && !player.eliminated) {
                    database.ref(`${roomId}/activePlayers/${playerId}/eliminated`).set(true);
                    
                    // سزای گروپی (2 خاڵ کەم دەکات لە یاریکەرانی تر)
                    database.ref(`${roomId}/activePlayers`).once('value', (snapshot2) => {
                        const allPlayers = snapshot2.val() || {};
                        Object.entries(allPlayers).forEach(([otherId, otherPlayer]) => {
                            if(otherPlayer.group === player.group && !otherPlayer.eliminated && otherId !== playerId) {
                                const otherScore = otherPlayer.score !== undefined ? otherPlayer.score : 5;
                                let newOtherScore = otherScore - 2;
                                if(newOtherScore < 0) newOtherScore = 0;
                                database.ref(`${roomId}/activePlayers/${otherId}/score`).set(newOtherScore);
                                if(newOtherScore === 0) {
                                    database.ref(`${roomId}/activePlayers/${otherId}/eliminated`).set(true);
                                }
                            }
                        });
                    });
                }
            });
        });
    }
    
    function endQuestionAndShowScores() {
        if(timerInterval) clearInterval(timerInterval);
        
        if(!isEvaluating) {
            evaluateAnswersAndShowCorrect();
        }
        
        document.getElementById("questionScreenSection").style.display = "none";
        
        database.ref(`${roomId}/activePlayers`).once('value', (snapshot) => {
            const players = snapshot.val() || {};
            const playersList = Object.values(players);
            const group1Players = playersList.filter(p => p.group === "group1");
            const group2Players = playersList.filter(p => p.group === "group2");
            
            const groupsContainer = document.getElementById("groupsContainer");
            groupsContainer.innerHTML = `
                <div class="group-box">
                    <h3>🏆 گروپی یەکەم</h3>
                    <div class="players-list" id="group1List"></div>
                </div>
                <div class="group-box">
                    <h3>🏆 گروپی دووەم</h3>
                    <div class="players-list" id="group2List"></div>
                </div>
            `;
            
            const group1List = document.getElementById("group1List");
            const group2List = document.getElementById("group2List");
            
            group1Players.forEach(player => {
                const eliminatedClass = player.eliminated ? "player-eliminated" : "";
                group1List.innerHTML += `
                    <div class="player-item ${eliminatedClass}">
                        <span class="player-name">👤 ${player.username}</span>
                        <span class="player-score">🏆 ${player.score || 5} خاڵ</span>
                        <span class="player-answer">${player.currentAnswer || 'چاوەڕوان'}</span>
                    </div>
                `;
            });
            
            group2Players.forEach(player => {
                const eliminatedClass = player.eliminated ? "player-eliminated" : "";
                group2List.innerHTML += `
                    <div class="player-item ${eliminatedClass}">
                        <span class="player-name">👤 ${player.username}</span>
                        <span class="player-score">🏆 ${player.score || 5} خاڵ</span>
                        <span class="player-answer">${player.currentAnswer || 'چاوەڕوان'}</span>
                    </div>
                `;
            });
            
            document.getElementById("groupsSection").style.display = "block";
        });
    }
    
    function backToCategories() {
        if(timerInterval) clearInterval(timerInterval);
        isEvaluating = false;
        document.getElementById("questionsSection").style.display = "none";
        document.getElementById("questionScreenSection").style.display = "none";
        document.getElementById("groupsSection").style.display = "none";
        document.getElementById("categoriesSection").style.display = "block";
        currentSelectedQuestion = null;
    }
    
    window.selectQuestion = selectQuestion;
    window.backToCategories = backToCategories;
</script>
</body>
</html>
