<!DOCTYPE html>
<html dir="rtl">
<head>
    <title>پێشکەشکار - هەڵبژاردنی پرسیار</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @font-face { font-family: 'K24Kurdish'; src: url('K24KurdishBold-Bold.ttf') format('truetype'); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'K24Kurdish', 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #1e3c72, #2a5298); min-height: 100vh; padding: 20px; }
        .main-container { max-width: 900px; width: 100%; margin: auto; }
        .categories-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .category-card { background: rgba(255,255,255,0.15); border-radius: 20px; padding: 20px; text-align: center; cursor: pointer; }
        .category-card span { font-size: 18px; color: white; }
        .questions-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-top: 20px; }
        .question-box { background: rgba(255,255,255,0.15); border-radius: 12px; padding: 12px; text-align: center; font-size: 16px; color: white; cursor: pointer; }
        .question-screen { text-align: center; }
        .timer { font-size: 48px; color: #ff6b6b; background: rgba(0,0,0,0.6); display: inline-block; padding: 10px 30px; border-radius: 50px; margin: 15px 0; }
        .question-text { font-size: 22px; color: white; margin: 20px 0; padding: 20px; background: rgba(0,0,0,0.4); border-radius: 20px; }
        .options-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .option-box { background: rgba(255,255,255,0.15); border-radius: 15px; padding: 14px; font-size: 16px; color: white; text-align: center; }
        .option-correct { background: #4CAF50 !important; }
        .group-box { background: rgba(0,0,0,0.4); border-radius: 20px; padding: 15px; margin-bottom: 20px; }
        .group-box h3 { color: white; text-align: center; margin-bottom: 12px; }
        .player-item { background: rgba(255,255,255,0.1); border-radius: 12px; padding: 10px; margin-bottom: 8px; color: white; display: flex; justify-content: space-between; }
        @media (min-width: 700px) { .category-card span { font-size: 22px; } .question-text { font-size: 28px; } }
    </style>
</head>
<body>
<div class="main-container">
    <div id="categoriesSection"><div class="categories-grid" id="categoriesGrid"></div></div>
    <div id="questionsSection" style="display:none;"><div class="questions-grid" id="questionsGrid"></div></div>
    <div id="questionScreenSection" style="display:none;"><div id="questionDisplay" class="question-screen"></div></div>
    <div id="groupsSection" style="display:none;"><div id="groupsContainer"></div></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCtiW-RBMY0emCOFZdQCA7ynPESraUknxI",
        authDomain: "quizgamerebin.firebaseapp.com",
        databaseURL: "https://quizgamerebin-default-rtdb.firebaseio.com",
        projectId: "quizgamerebin",
        storageBucket: "quizgamerebin.firebasestorage.app",
        messagingSenderId: "312376681830",
        appId: "1:312376681830:web:11262fa62cc9246bac14a7"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    const ROOM_ID = "quiz_room_main";
    const categoriesList = ["مێژوو", "زانست", "ئەدەبیات", "هونەر", "وەرزش", "تەکنەلۆژیا", "تەندروستی", "جوگرافیا", "ئاینی"];
    let categories = {};
    let currentCategory = "";
    let currentQuestion = null;
    let timerInterval = null;
    let timeLeft = 30;
    
    document.addEventListener('contextmenu', e => e.preventDefault());
    window.addEventListener('keydown', e => {
        if(e.key === 'F5' || (e.ctrlKey && e.key === 'r')) e.preventDefault();
        if(e.key === 'Backspace') backToCategories();
        if(e.key === 'Enter' && document.getElementById("questionScreenSection").style.display === "block") showScores();
    });
    
    database.ref(`${ROOM_ID}/categories`).on('value', (s) => {
        categories = s.val() || {};
        categoriesList.forEach(c => { if(!categories[c]) categories[c] = []; });
        renderCategories();
    });
    
    function renderCategories() {
        const container = document.getElementById("categoriesGrid");
        container.innerHTML = "";
        categoriesList.forEach(cat => {
            const card = document.createElement("div");
            card.className = "category-card";
            card.innerHTML = `<span>${cat}</span>`;
            card.onclick = () => {
                currentCategory = cat;
                document.getElementById("categoriesSection").style.display = "none";
                document.getElementById("questionsSection").style.display = "block";
                renderQuestions();
            };
            container.appendChild(card);
        });
    }
    
    function renderQuestions() {
        const container = document.getElementById("questionsGrid");
        const questions = categories[currentCategory] || [];
        let html = "";
        for(let i = 0; i < 36; i++) {
            if(i < questions.length) {
                html += `<div class="question-box" onclick="selectQuestion(${i})">${i+1}</div>`;
            } else {
                html += `<div class="question-box" style="opacity:0.3;">${i+1}</div>`;
            }
        }
        container.innerHTML = html;
    }
    
    function selectQuestion(index) {
        currentQuestion = categories[currentCategory][index];
        if(!currentQuestion) return;
        
        database.ref(`${ROOM_ID}/activePlayers`).once('value', (s) => {
            Object.keys(s.val() || {}).forEach(pid => {
                database.ref(`${ROOM_ID}/activePlayers/${pid}/currentAnswer`).remove();
            });
        });
        
        database.ref(`${ROOM_ID}/activeQuestion`).set({
            question: currentQuestion,
            correct: currentQuestion.correct,
            timestamp: Date.now()
        });
        
        document.getElementById("questionsSection").style.display = "none";
        document.getElementById("questionScreenSection").style.display = "block";
        
        document.getElementById("questionDisplay").innerHTML = `
            <div class="timer" id="presenterTimer">30</div>
            <div class="question-text">${currentQuestion.text}</div>
            <div class="options-grid">
                <div class="option-box">A. ${currentQuestion.options[0]}</div>
                <div class="option-box">B. ${currentQuestion.options[1]}</div>
                <div class="option-box">C. ${currentQuestion.options[2]}</div>
                <div class="option-box">D. ${currentQuestion.options[3]}</div>
            </div>
        `;
        startTimer();
    }
    
    function startTimer() {
        timeLeft = 30;
        timerInterval = setInterval(() => {
            if(timeLeft > 0) {
                timeLeft--;
                let td = document.getElementById("presenterTimer");
                if(td) td.innerText = timeLeft;
                if(timeLeft === 0) {
                    clearInterval(timerInterval);
                    evaluateAndShowCorrect();
                }
            }
        }, 1000);
    }
    
    function evaluateAndShowCorrect() {
        // وەڵامی ڕاست پیشان بدە
        const letters = ["A", "B", "C", "D"];
        const correctIndex = letters.indexOf(currentQuestion.correct);
        const boxes = document.querySelectorAll(".option-box");
        if(boxes[correctIndex]) boxes[correctIndex].classList.add("option-correct");
        
        // خاڵەکان هەڵبسەنگێنە
        database.ref(`${ROOM_ID}/activePlayers`).once('value', (snap) => {
            const players = snap.val() || {};
            Object.entries(players).forEach(([pid, p]) => {
                if(p.eliminated) return;
                let change = 0;
                if(p.currentAnswer === currentQuestion.correct) change = 3;
                else change = -1;
                let newScore = (p.score || 5) + change;
                if(newScore < 0) newScore = 0;
                database.ref(`${ROOM_ID}/activePlayers/${pid}/score`).set(newScore);
                if(newScore === 0) database.ref(`${ROOM_ID}/activePlayers/${pid}/eliminated`).set(true);
            });
        });
    }
    
    function showScores() {
        clearInterval(timerInterval);
        document.getElementById("questionScreenSection").style.display = "none";
        
        database.ref(`${ROOM_ID}/activePlayers`).once('value', (snap) => {
            const players = Object.values(snap.val() || {});
            const g1 = players.filter(p => p.group === "group1");
            const g2 = players.filter(p => p.group === "group2");
            
            document.getElementById("groupsContainer").innerHTML = `
                <div class="group-box"><h3>🏆 گروپی یەکەم</h3>${g1.map(p => `<div class="player-item"><span>${p.username}</span><span>${p.score||5} خاڵ</span><span>${p.currentAnswer||'—'}</span></div>`).join('')}</div>
                <div class="group-box"><h3>🏆 گروپی دووەم</h3>${g2.map(p => `<div class="player-item"><span>${p.username}</span><span>${p.score||5} خاڵ</span><span>${p.currentAnswer||'—'}</span></div>`).join('')}</div>
            `;
            document.getElementById("groupsSection").style.display = "block";
        });
    }
    
    function backToCategories() {
        clearInterval(timerInterval);
        document.getElementById("questionsSection").style.display = "none";
        document.getElementById("questionScreenSection").style.display = "none";
        document.getElementById("groupsSection").style.display = "none";
        document.getElementById("categoriesSection").style.display = "block";
    }
    
    window.selectQuestion = selectQuestion;
</script>
</body>
</html>
