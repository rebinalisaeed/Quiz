<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, shrink-to-fit=no">
    <title>پێشکەشکار - یاری پرسیار و وەڵام</title>
    <style>
        @font-face {
            font-family: 'K24KurdishBold-Bold';
            src: url('fonts/K24KurdishBold-Bold.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        
        @font-face {
            font-family: 'K24KurdishLight-Light';
            src: url('fonts/K24KurdishLight-Light.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }
        
        body {
            font-family: 'K24KurdishBold-Bold', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            font-size: 18px;
        }
        
        .container {
            width: 100%;
            max-width: 1400px;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        
        /* Mode Selection */
        .mode-selection {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 0 auto;
            flex-wrap: wrap;
        }
        
        .mode-btn {
            padding: 15px 35px;
            font-size: 24px;
            font-weight: bold;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'K24KurdishBold-Bold', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }
        
        .mode-btn.online {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .mode-btn.offline {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        
        .mode-btn.reset {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            color: white;
        }
        
        .mode-btn.import {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
        }
        
        .mode-btn.delete-all {
            background: linear-gradient(135deg, #f44336 0%, #da190b 100%);
            color: white;
        }
        
        .mode-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.3);
        }
        
        .mode-btn:active {
            transform: translateY(0);
        }
        
        /* Category Grid - No Animation */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 0 auto;
            max-width: 900px;
            width: 100%;
        }
        
        .category-card {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            border-radius: 20px;
            padding: 35px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 24px;
            font-weight: bold;
            color: white;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            font-family: 'K24KurdishBold-Bold', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            opacity: 1;
            transform: scale(1);
        }
        
        .category-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .category-card.selected {
            background: #4CAF50;
            animation: blinkGreen 0.4s 2;
        }
        
        .category-card.used {
            background: #555;
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        @keyframes blinkGreen {
            0% { background: #4CAF50; }
            50% { background: #81C784; }
            100% { background: #4CAF50; }
        }
        
        /* Question Grid */
        .question-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            margin: 0 auto;
            max-width: 800px;
            width: 100%;
        }
        
        .question-number {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            border-radius: 12px;
            padding: 18px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 22px;
            font-weight: bold;
            color: white;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            font-family: 'K24KurdishBold-Bold', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .question-number:hover {
            transform: scale(1.05);
        }
        
        .question-number.selected {
            background: #4CAF50;
            animation: blinkGreen 0.4s 2;
        }
        
        .question-number.used {
            background: #B3B3B3;
            cursor: not-allowed;
            opacity: 0.7;
        }
        
        /* Question Display */
        .question-display {
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            text-align: center;
        }
        
        .timer-circle {
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px auto;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }
        
        .timer {
            font-size: 54px;
            font-weight: bold;
            color: #667eea;
            font-family: 'K24KurdishBold-Bold', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .question-text {
            font-size: 32px;
            color: #333;
            line-height: 1.5;
            text-align: center;
            background: #FFB56B;
            padding: 40px 25px;
            border-radius: 24px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            backdrop-filter: blur(5px);
            font-family: 'K24KurdishBold-Bold', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
        }
        
        .options-grid .option-card:nth-child(1) { order: 2; }
        .options-grid .option-card:nth-child(2) { order: 1; }
        .options-grid .option-card:nth-child(3) { order: 4; }
        .options-grid .option-card:nth-child(4) { order: 3; }
        
        .option-card {
            background: #FFB56B;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            backdrop-filter: blur(5px);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .option-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        
        .option-card:nth-child(1) .option-letter,
        .option-card:nth-child(3) .option-letter {
            position: absolute;
            top: -12px;
            left: 15px;
            right: auto;
            background: #2196F3;
            color: white;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            font-family: 'K24KurdishBold-Bold', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .option-card:nth-child(2) .option-letter,
        .option-card:nth-child(4) .option-letter {
            position: absolute;
            top: -12px;
            right: 15px;
            left: auto;
            background: #2196F3;
            color: white;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            font-family: 'K24KurdishBold-Bold', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .option-text {
            font-size: 24px;
            color: #333;
            padding: 12px;
            font-family: 'K24KurdishLight-Light', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .option-card.correct {
            background: #4CAF50;
        }
        
        .option-card.correct .option-text {
            color: white;
        }
        
        .option-card.correct .option-letter {
            background: white;
            color: #4CAF50;
        }
        
        .groups-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            max-width: 1000px;
            width: 100%;
            margin: 0 auto;
        }
        
        .group-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .group-title {
            font-size: 32px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
            color: #333;
            font-family: 'K24KurdishBold-Bold', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .players-list {
            list-style: none;
        }
        
        .player-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            margin: 8px 0;
            background: #f5f5f5;
            border-radius: 12px;
        }
        
        .player-name {
            font-size: 22px;
            color: #333;
            font-family: 'K24KurdishLight-Light', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .player-score {
            font-weight: bold;
            color: #667eea;
            font-size: 26px;
            font-family: 'K24KurdishBold-Bold', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .player-eliminated {
            opacity: 0.5;
            text-decoration: line-through;
        }
        
        .question-number.waiting-for-enter {
            background: #4CAF50;
            animation: pulse 0.8s infinite;
        }
        
        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.08);
                opacity: 0.8;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        .hidden {
            display: none !important;
        }
        
        .view {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        
        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background: white;
            border-radius: 25px;
            padding: 35px;
            max-width: 500px;
            width: 90%;
            text-align: center;
        }
        
        .modal-content h3 {
            font-size: 28px;
            margin-bottom: 20px;
            font-family: 'K24KurdishBold-Bold', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .modal-content input {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 16px;
            font-family: inherit;
        }
        
        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        
        .modal-buttons button {
            padding: 12px 25px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
            font-family: 'K24KurdishBold-Bold', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .confirm-btn {
            background: #4CAF50;
            color: white;
        }
        
        .cancel-btn {
            background: #f44336;
            color: white;
        }
        
        @media (max-width: 768px) {
            .mode-selection {
                gap: 12px;
            }
            
            .mode-btn {
                padding: 12px 20px;
                font-size: 16px;
            }
            
            .category-grid {
                gap: 12px;
            }
            
            .category-card {
                padding: 25px 10px;
                font-size: 18px;
            }
            
            .question-grid {
                gap: 8px;
                max-width: 100%;
            }
            
            .question-number {
                padding: 12px 5px;
                font-size: 16px;
            }
            
            .question-text {
                font-size: 24px;
                padding: 25px 15px;
            }
            
            .option-text {
                font-size: 18px;
            }
            
            .timer-circle {
                width: 85px;
                height: 85px;
            }
            
            .timer {
                font-size: 40px;
            }
            
            .groups-container {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            .options-grid {
                gap: 12px;
            }
            
            .option-card {
                padding: 14px;
            }
            
            .option-letter {
                width: 30px !important;
                height: 30px !important;
                font-size: 16px !important;
            }
            
            .group-title {
                font-size: 24px;
            }
            
            .player-name {
                font-size: 16px;
            }
            
            .player-score {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div id="modeView" class="view">
            <div class="mode-selection">
                <button class="mode-btn online" onclick="selectMode('online')">🌐 ئۆنلاین</button>
                <button class="mode-btn offline" onclick="selectMode('offline')">📱 ئۆفلاین</button>
                <button class="mode-btn reset" onclick="openResetModal()">🔄 ریسێت</button>
                <button class="mode-btn import" onclick="openImportModal()">📥 Import JSON</button>
                <button class="mode-btn delete-all" onclick="openDeleteAllModal()">🗑️ سڕینەوەی هەموو پرسیارەکان</button>
            </div>
        </div>
        
        <div id="categoryView" class="view hidden">
            <div class="category-grid" id="categoryGrid"></div>
        </div>
        
        <div id="questionGridView" class="view hidden">
            <div class="question-grid" id="questionGrid"></div>
        </div>
        
        <div id="questionDisplayView" class="view hidden">
            <div class="question-display">
                <div class="timer-circle">
                    <div class="timer" id="timer">30</div>
                </div>
                <div class="question-text" id="displayQuestion"></div>
                <div class="options-grid" id="displayOptions"></div>
            </div>
        </div>
        
        <div id="groupsView" class="view hidden">
            <div class="groups-container" id="groupsContainer"></div>
        </div>
    </div>
    
    <!-- Import Modal -->
    <div id="importModal" class="modal">
        <div class="modal-content">
            <h3>📥 فایلی JSON هەڵبژێرە</h3>
            <input type="file" id="jsonFile" accept=".json">
            <div class="modal-buttons">
                <button class="confirm-btn" onclick="importQuestions()">Import</button>
                <button class="cancel-btn" onclick="closeImportModal()">پەشیمان بووم</button>
            </div>
        </div>
    </div>
    
    <!-- Delete All Modal -->
    <div id="deleteAllModal" class="modal">
        <div class="modal-content">
            <h3>⚠️ دڵنیای دەتەوێت هەموو پرسیارەکان بسڕیتەوە؟</h3>
            <p style="font-size: 18px; margin-bottom: 20px;">ئاگاداربە! ئەم کارە هەموو پرسیارەکان لە هەموو کەتەگۆرییەکان دەسڕێتەوە و ناتوانرێت بگەڕێنرێتەوە!</p>
            <div class="modal-buttons">
                <button class="confirm-btn" onclick="deleteAllQuestions()">بەڵێ، بسڕەوە</button>
                <button class="cancel-btn" onclick="closeDeleteAllModal()">نەخێر، پەشیمان بووم</button>
            </div>
        </div>
    </div>
    
    <!-- Reset Modal -->
    <div id="resetModal" class="modal">
        <div class="modal-content">
            <h3>⚠️ دڵنیای دەتەوێت بگەڕێیتەوە سەرەتایی یاری؟</h3>
            <div class="modal-buttons">
                <button class="confirm-btn" onclick="resetGame()">بەڵێ</button>
                <button class="cancel-btn" onclick="closeResetModal()">نەخێر</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { db, ref, get, set, update, remove } from './firebase-config.js';
        
        document.addEventListener('contextmenu', (e) => e.preventDefault());
        document.addEventListener('selectstart', (e) => e.preventDefault());
        document.addEventListener('keydown', (e) => {
            if (e.key === 'F5' || ((e.ctrlKey || e.metaKey) && e.key === 'r')) {
                e.preventDefault();
                return false;
            }
        });
        
        let currentMode = null;
        let currentCategory = null;
        let timerInterval = null;
        let timerSeconds = 30;
        let isWaitingForEnter = false;
        let selectedQuestionBox = null;
        
        const categories = [
            { key: 'history', name: 'مێژوو' },
            { key: 'science', name: 'زانست' },
            { key: 'literature', name: 'ئەدەبییات' },
            { key: 'art', name: 'هونەر' },
            { key: 'sports', name: 'وەرزش' },
            { key: 'technology', name: 'تەکنەلۆژیا' },
            { key: 'health', name: 'تەندروستی' },
            { key: 'geography', name: 'جوگرافیا' },
            { key: 'religion', name: 'ئایینی' }
        ];
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' || e.key === 'Escape') {
                e.preventDefault();
                if (!document.getElementById('modeView').classList.contains('hidden')) {
                } else if (!document.getElementById('categoryView').classList.contains('hidden')) {
                    document.getElementById('categoryView').classList.add('hidden');
                    document.getElementById('modeView').classList.remove('hidden');
                } else if (!document.getElementById('questionGridView').classList.contains('hidden')) {
                    goBackToCategories();
                } else if (!document.getElementById('questionDisplayView').classList.contains('hidden')) {
                    goBackToQuestions();
                } else if (!document.getElementById('groupsView').classList.contains('hidden')) {
                    showQuestionGrid();
                }
            } else if (e.key === 'Enter' && isWaitingForEnter && selectedQuestionBox) {
                e.preventDefault();
                const questionId = selectedQuestionBox.dataset.questionId;
                const questionData = JSON.parse(selectedQuestionBox.dataset.questionData);
                executeSelectQuestion(questionId, questionData);
            } else if (e.key === 'Enter' && isWaitingForEnter && !selectedQuestionBox) {
                e.preventDefault();
                showGroupsAndPlayers();
            }
        });
        
        window.openImportModal = () => {
            document.getElementById('importModal').style.display = 'flex';
        };
        
        window.closeImportModal = () => {
            document.getElementById('importModal').style.display = 'none';
        };
        
        window.importQuestions = async () => {
            const fileInput = document.getElementById('jsonFile');
            const file = fileInput.files[0];
            
            if (!file) {
                alert('تکایە فایلێکی JSON هەڵبژێرە');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const importedData = JSON.parse(e.target.result);
                    
                    for (let catKey in importedData) {
                        if (importedData.hasOwnProperty(catKey)) {
                            const categoryRef = ref(db, `categories/${catKey}/questions`);
                            const questions = importedData[catKey];
                            
                            for (let qId in questions) {
                                if (questions.hasOwnProperty(qId)) {
                                    const newQuestionRef = ref(db, `categories/${catKey}/questions/${qId}`);
                                    await set(newQuestionRef, questions[qId]);
                                }
                            }
                        }
                    }
                    
                    alert('پرسیارەکان بە سەرکەوتوویی import کرا');
                    closeImportModal();
                    
                    if (currentMode) {
                        loadCategories();
                    }
                } catch (error) {
                    alert('هەڵە لە خوێندنەوەی فایلەکەدا: ' + error.message);
                }
            };
            reader.readAsText(file);
        };
        
        window.openDeleteAllModal = () => {
            document.getElementById('deleteAllModal').style.display = 'flex';
        };
        
        window.closeDeleteAllModal = () => {
            document.getElementById('deleteAllModal').style.display = 'none';
        };
        
        window.deleteAllQuestions = async () => {
            for (let cat of categories) {
                const questionsRef = ref(db, `categories/${cat.key}/questions`);
                await remove(questionsRef);
                // Re-create empty questions object
                await set(ref(db, `categories/${cat.key}/questions`), {});
            }
            alert('هەموو پرسیارەکان سڕاینەوە');
            closeDeleteAllModal();
            
            if (currentMode) {
                loadCategories();
            }
        };
        
        window.openResetModal = () => {
            document.getElementById('resetModal').style.display = 'flex';
        };
        
        window.closeResetModal = () => {
            document.getElementById('resetModal').style.display = 'none';
        };
        
        window.resetGame = async () => {
            closeResetModal();
            
            for (let cat of categories) {
                const questionsRef = ref(db, `categories/${cat.key}/questions`);
                const snapshot = await get(questionsRef);
                if (snapshot.exists()) {
                    const questions = snapshot.val();
                    for (let qId in questions) {
                        await update(ref(db, `categories/${cat.key}/questions/${qId}`), { used: false });
                    }
                }
            }
            
            const usersRef = ref(db, 'users');
            const snapshot = await get(usersRef);
            if (snapshot.exists()) {
                const users = snapshot.val();
                for (let userId in users) {
                    if (users[userId].role === 'player') {
                        await update(ref(db, `users/${userId}`), { score: 5, isEliminated: false, isActive: true });
                    }
                }
            }
            
            await set(ref(db, 'game/currentQuestion'), null);
            await set(ref(db, 'game/questionActive'), false);
            await set(ref(db, 'game/showAnswer'), false);
            
            alert('یاریەکە بە سەرکەوتوویی ریسێت کرا');
            
            if (currentMode) {
                document.getElementById('categoryView').classList.add('hidden');
                document.getElementById('modeView').classList.remove('hidden');
                currentMode = null;
            }
        };
        
        window.selectMode = function(mode) {
            currentMode = mode;
            document.getElementById('modeView').classList.add('hidden');
            document.getElementById('categoryView').classList.remove('hidden');
            
            if (mode === 'online') {
                set(ref(db, 'game/presenterOnline'), true);
                set(ref(db, 'game/gameActive'), true);
            }
            
            loadCategories();
        };
        
        async function loadCategories() {
            const container = document.getElementById('categoryGrid');
            container.innerHTML = '';
            
            for (let cat of categories) {
                const questionsRef = ref(db, `categories/${cat.key}/questions`);
                const snapshot = await get(questionsRef);
                let allUsed = false;
                let hasQuestions = false;
                
                if (snapshot.exists()) {
                    hasQuestions = true;
                    const questions = snapshot.val();
                    const total = Object.keys(questions).length;
                    let usedCount = 0;
                    
                    for (let qId in questions) {
                        if (questions[qId].used === true) usedCount++;
                    }
                    allUsed = (usedCount === total && total > 0);
                }
                
                const card = document.createElement('div');
                card.className = `category-card ${allUsed ? 'used' : ''}`;
                card.textContent = `${cat.name} ${hasQuestions ? '' : '(پرسیار نییە)'}`;
                
                if (!allUsed && hasQuestions) {
                    card.onclick = () => selectCategory(cat.key);
                } else if (!hasQuestions) {
                    card.style.opacity = '0.5';
                    card.style.cursor = 'not-allowed';
                }
                
                container.appendChild(card);
            }
        }
        
        async function selectCategory(categoryKey) {
            currentCategory = categoryKey;
            
            const cards = document.querySelectorAll('.category-card');
            for (let card of cards) {
                if (card.textContent.includes(categories.find(c => c.key === categoryKey)?.name || '')) {
                    card.classList.add('selected');
                    setTimeout(() => card.classList.remove('selected'), 400);
                    break;
                }
            }
            
            setTimeout(async () => {
                document.getElementById('categoryView').classList.add('hidden');
                document.getElementById('questionGridView').classList.remove('hidden');
                await loadQuestionsForCategory(categoryKey);
            }, 200);
        }
        
        async function loadQuestionsForCategory(categoryKey) {
            const questionsRef = ref(db, `categories/${categoryKey}/questions`);
            const snapshot = await get(questionsRef);
            const container = document.getElementById('questionGrid');
            container.innerHTML = '';
            
            if (snapshot.exists()) {
                const questions = snapshot.val();
                const questionIds = Object.keys(questions);
                
                for (let i = 1; i <= 36; i++) {
                    const qId = questionIds[i-1];
                    const question = questions[qId];
                    const isUsed = question?.used === true;
                    const exists = qId !== undefined;
                    
                    const box = document.createElement('div');
                    box.className = `question-number ${isUsed ? 'used' : ''}`;
                    box.textContent = i;
                    
                    if (exists && !isUsed) {
                        box.style.cursor = 'pointer';
                        box.onclick = () => {
                            if (selectedQuestionBox) {
                                selectedQuestionBox.classList.remove('waiting-for-enter');
                            }
                            box.classList.add('waiting-for-enter');
                            selectedQuestionBox = box;
                            selectedQuestionBox.dataset.questionId = qId;
                            selectedQuestionBox.dataset.questionData = JSON.stringify(question);
                            isWaitingForEnter = true;
                        };
                    } else if (isUsed) {
                        box.style.cursor = 'not-allowed';
                    }
                    
                    container.appendChild(box);
                }
            } else {
                for (let i = 1; i <= 36; i++) {
                    const box = document.createElement('div');
                    box.className = 'question-number';
                    box.textContent = i;
                    box.style.opacity = '0.3';
                    container.appendChild(box);
                }
            }
        }
        
        async function executeSelectQuestion(questionId, question) {
            if (selectedQuestionBox) {
                selectedQuestionBox.classList.remove('waiting-for-enter');
                selectedQuestionBox.classList.add('used');
                selectedQuestionBox.style.cursor = 'not-allowed';
            }
            selectedQuestionBox = null;
            isWaitingForEnter = false;
            
            await update(ref(db, `categories/${currentCategory}/questions/${questionId}`), { used: true });
            
            if (currentMode === 'online') {
                await set(ref(db, 'game/currentQuestion'), {
                    id: questionId,
                    category: currentCategory,
                    text: question.text,
                    options: question.options,
                    correct: question.correct,
                    timestamp: Date.now()
                });
                await set(ref(db, 'game/questionActive'), true);
                await set(ref(db, 'game/timerStart'), Date.now());
            }
            
            document.getElementById('questionGridView').classList.add('hidden');
            document.getElementById('questionDisplayView').classList.remove('hidden');
            
            document.getElementById('displayQuestion').textContent = question.text;
            const optionsContainer = document.getElementById('displayOptions');
            optionsContainer.innerHTML = '';
            
            const letters = ['A', 'B', 'C', 'D'];
            question.options.forEach((opt, idx) => {
                const div = document.createElement('div');
                div.className = 'option-card';
                div.innerHTML = `
                    <div class="option-letter">${letters[idx]}</div>
                    <div class="option-text">${opt}</div>
                `;
                optionsContainer.appendChild(div);
            });
            
            startTimer(question);
        }
        
        function startTimer(question) {
            timerSeconds = 30;
            const timerElement = document.getElementById('timer');
            timerElement.textContent = timerSeconds;
            
            if (timerInterval) clearInterval(timerInterval);
            
            setTimeout(() => {
                timerInterval = setInterval(() => {
                    timerSeconds--;
                    timerElement.textContent = timerSeconds;
                    
                    if (timerSeconds <= 0) {
                        clearInterval(timerInterval);
                        const options = document.querySelectorAll('.option-card');
                        options.forEach((opt, idx) => {
                            if (idx === question.correct) {
                                opt.classList.add('correct');
                            }
                        });
                        isWaitingForEnter = true;
                        selectedQuestionBox = null;
                        
                        if (currentMode === 'online') {
                            set(ref(db, 'game/questionActive'), false);
                            set(ref(db, 'game/showAnswer'), true);
                        }
                    }
                }, 1000);
            }, 3000);
        }
        
        function showGroupsAndPlayers() {
            clearInterval(timerInterval);
            document.getElementById('questionDisplayView').classList.add('hidden');
            document.getElementById('groupsView').classList.remove('hidden');
            isWaitingForEnter = false;
            loadPlayersAndGroups();
        }
        
        async function loadPlayersAndGroups() {
            const usersRef = ref(db, 'users');
            const snapshot = await get(usersRef);
            const group1 = [];
            const group2 = [];
            
            if (snapshot.exists()) {
                const users = snapshot.val();
                for (let userId in users) {
                    const user = users[userId];
                    if (user.role === 'player' && user.isActive !== false) {
                        if (user.group === 'group1') {
                            group1.push({ id: userId, ...user });
                        } else if (user.group === 'group2') {
                            group2.push({ id: userId, ...user });
                        }
                    }
                }
            }
            
            const container = document.getElementById('groupsContainer');
            container.innerHTML = `
                <div class="group-card">
                    <div class="group-title">👥 گروپی یەکەم</div>
                    <div class="players-list" id="group1List"></div>
                </div>
                <div class="group-card">
                    <div class="group-title">👥 گروپی دووەم</div>
                    <div class="players-list" id="group2List"></div>
                </div>
            `;
            
            const group1List = document.getElementById('group1List');
            const group2List = document.getElementById('group2List');
            
            group1.forEach(p => {
                const li = document.createElement('li');
                li.className = `player-item ${p.isEliminated ? 'player-eliminated' : ''}`;
                li.innerHTML = `<span class="player-name">${p.name || p.username}</span><span class="player-score">⭐ ${p.score || 5}</span>`;
                group1List.appendChild(li);
            });
            
            group2.forEach(p => {
                const li = document.createElement('li');
                li.className = `player-item ${p.isEliminated ? 'player-eliminated' : ''}`;
                li.innerHTML = `<span class="player-name">${p.name || p.username}</span><span class="player-score">⭐ ${p.score || 5}</span>`;
                group2List.appendChild(li);
            });
        }
        
        window.goBackToCategories = function() {
            if (selectedQuestionBox) {
                selectedQuestionBox.classList.remove('waiting-for-enter');
                selectedQuestionBox = null;
            }
            isWaitingForEnter = false;
            document.getElementById('questionGridView').classList.add('hidden');
            document.getElementById('categoryView').classList.remove('hidden');
            loadCategories();
        };
        
        window.goBackToQuestions = function() {
            if (timerInterval) clearInterval(timerInterval);
            document.getElementById('questionDisplayView').classList.add('hidden');
            document.getElementById('questionGridView').classList.remove('hidden');
            loadQuestionsForCategory(currentCategory);
            isWaitingForEnter = false;
            selectedQuestionBox = null;
        };
        
        window.showQuestionGrid = function() {
            document.getElementById('groupsView').classList.add('hidden');
            document.getElementById('questionGridView').classList.remove('hidden');
            loadQuestionsForCategory(currentCategory);
        };
        
        const currentUser = JSON.parse(localStorage.getItem('currentUser') || '{}');
        if (currentUser.role !== 'presenter' && currentUser.role !== 'admin') {
            alert('تەنها پێشکەشکار دەتوانێت ئەم پەڕەیە ببینێت!');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
