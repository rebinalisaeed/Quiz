<!DOCTYPE html>
<html dir="rtl">
<head>
    <title>پێشکەشکار - هەڵبژاردنی پرسیار</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @font-face { font-family: 'K24Kurdish'; src: url('K24KurdishBold-Bold.ttf') format('truetype'); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'K24Kurdish', 'Segoe UI', sans-serif; user-select: none; }
        body { 
            background: linear-gradient(135deg, #1e3c72, #2a5298); 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 40px;
        }
        .main-container {
            max-width: 900px;
            width: 100%;
            margin: auto;
        }
        
        /* کەتەگۆرییەکان - تۆڕی 3x3 */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            justify-items: center;
            align-items: center;
        }
        .category-card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.2);
            width: 100%;
            max-width: 220px;
        }
        .category-card:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-5px);
        }
        .category-card span {
            font-size: 22px;
            color: white;
        }
        
        /* پرسیارەکان - تۆڕی 6x6 */
        .questions-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            margin-top: 20px;
        }
        .question-box {
            background: rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 15px 5px;
            text-align: center;
            font-size: 18px;
            color: white;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.2);
            transition: all 0.2s;
        }
        .question-box:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.02);
        }
        .question-box-empty {
            background: rgba(255,255,255,0.05);
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* شاشەی پرسیار */
        .question-screen {
            text-align: center;
        }
        .timer {
            font-size: 60px;
            color: #ff6b6b;
            background: rgba(0,0,0,0.6);
            display: inline-block;
            padding: 15px 40px;
            border-radius: 60px;
            margin: 20px 0;
            font-family: monospace;
            font-weight: bold;
        }
        .question-text {
            font-size: 28px;
            color: white;
            margin: 30px 0;
            padding: 25px;
            background: rgba(0,0,0,0.4);
            border-radius: 25px;
            line-height: 1.5;
        }
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        .option-box {
            background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 20px;
            padding: 18px;
            font-size: 18px;
            color: white;
            text-align: center;
            transition: all 0.3s;
        }
        .option-correct {
            background: #4CAF50 !important;
            border-color: #2e7d32 !important;
            animation: pulse 0.5s ease;
        }
        
        /* گروپەکانی یاریکەران */
        .groups-container {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        .group-box {
            flex: 1;
            min-width: 250px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 20px;
        }
        .group-box h3 {
            color: white;
            text-align: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(255,255,255,0.3);
        }
        .players-list {
            list-style: none;
            padding: 0;
        }
        .player-item {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 10px 15px;
            margin-bottom: 8px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }
        .player-item-orange {
            background: #ff9800 !important;
        }
        .player-answer {
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 14px;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        @media (max-width: 700px) {
            .categories-grid { gap: 15px; }
            .category-card { padding: 20px 15px; }
            .category-card span { font-size: 16px; }
            .questions-grid { grid-template-columns: repeat(4, 1fr); }
            .question-text { font-size: 20px; }
            .option-box { font-size: 14px; padding: 12px; }
            .timer { font-size: 40px; padding: 10px 25px; }
        }
    </style>
</head>
<body>
<div class="main-container">
    <!-- کەتەگۆرییەکان - تۆڕی 3x3 -->
    <div id="categoriesSection">
        <div class="categories-grid" id="categoriesGrid"></div>
    </div>
    
    <!-- پرسیارەکان - تۆڕی 6x6 -->
    <div id="questionsSection" style="display:none;">
        <div class="questions-grid" id="questionsGrid"></div>
    </div>
    
    <!-- شاشەی پرسیار -->
    <div id="questionScreenSection" style="display:none;">
        <div id="questionDisplay" class="question-screen"></div>
    </div>
    
    <!-- گروپەکانی یاریکەران -->
    <div id="groupsSection" style="display:none;" class="groups-container"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCtiW-RBMY0emCOFZdQCA7ynPESraUknxI",
        authDomain: "quizgamerebin.firebaseapp.com",
        databaseURL: "https://quizgamerebin-default-rtdb.firebaseio.com",
        projectId: "quizgamerebin",
        storageBucket: "quizgamerebin.firebasestorage.app",
        messagingSenderId: "312376681830",
        appId: "1:312376681830:web:11262fa62cc9246bac14a7"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    const MAX_QS = 36;
    const categoriesList = ["مێژوو", "زانست", "ئەدەبیات", "هونەر", "وەرزش", "تەکنەلۆژیا", "تەندروستی", "جوگرافیا", "ئاینی"];
    let categories = {};
    let currentCategory = "";
    let currentSelectedQuestion = null;
    let roomId = localStorage.getItem("roomId") || "quiz_room_main";
    let currentUser = JSON.parse(localStorage.getItem("loggedInUser") || "{}");
    let activePlayers = {};
    let timerInterval = null;
    let countdownInterval = null;
    let timeLeft = 30;
    let isCountingDown = false;
    
    // ناچالاککردنی reload و refresh
    document.addEventListener('contextmenu', e => e.preventDefault());
    window.addEventListener('keydown', e => {
        if(e.key === 'F5' || (e.ctrlKey && e.key === 'r') || (e.metaKey && e.key === 'r')) {
            e.preventDefault();
            return false;
        }
        // گەڕانەوە بە Backspace
        if(e.key === 'Backspace') {
            e.preventDefault();
            if(document.getElementById("questionsSection").style.display === "block") {
                backToCategories();
            } else if(document.getElementById("questionScreenSection").style.display === "block") {
                backToCategories();
            }
        }
        // نمایش کردنی گروپەکان بە Enter
        if(e.key === 'Enter' && document.getElementById("questionScreenSection").style.display === "block") {
            e.preventDefault();
            showGroups();
        }
    });
    
    if(currentUser.role !== "admin" && currentUser.role !== "super_admin") {
        alert("⚠️ تۆ مافی پێشکەشکاریت نییە!");
        window.location.href = "play.html";
    }
    
    // گوێگرتن لە یاریکەران
    database.ref(`${roomId}/activePlayers`).on('value', (snapshot) => {
        activePlayers = snapshot.val() || {};
    });
    
    // بارکردنی کەتەگۆرییەکان
    database.ref(`${roomId}/categories`).on('value', (snapshot) => {
        categories = snapshot.val() || {};
        categoriesList.forEach(c => { if(!categories[c]) categories[c] = []; });
        renderCategories();
    });
    
    function renderCategories() {
        const container = document.getElementById("categoriesGrid");
        container.innerHTML = "";
        categoriesList.forEach(cat => {
            const card = document.createElement("div");
            card.className = "category-card";
            card.innerHTML = `<span>${cat}</span>`;
            card.onclick = () => {
                currentCategory = cat;
                document.getElementById("categoriesSection").style.display = "none";
                document.getElementById("questionsSection").style.display = "block";
                renderQuestions();
            };
            container.appendChild(card);
        });
    }
    
    function renderQuestions() {
        const container = document.getElementById("questionsGrid");
        const questions = categories[currentCategory] || [];
        let html = "";
        for(let i = 0; i < MAX_QS; i++) {
            if(i < questions.length) {
                html += `<div class="question-box" onclick="selectQuestion(${i})">${i+1}</div>`;
            } else {
                html += `<div class="question-box question-box-empty">${i+1}</div>`;
            }
        }
        container.innerHTML = html;
    }
    
    function selectQuestion(index) {
        const questions = categories[currentCategory];
        if(!questions || index >= questions.length) {
            alert("⚠️ ئەم پرسیارە بوونی نییە! تکایە یەکەم پرسیار زیاد بکە.");
            return;
        }
        
        currentSelectedQuestion = questions[index];
        
        // پاککردنەوەی وەڵامەکانی پێشووی یاریکەران
        database.ref(`${roomId}/activePlayers`).once('value', (snapshot) => {
            const players = snapshot.val() || {};
            Object.keys(players).forEach(playerId => {
                database.ref(`${roomId}/activePlayers/${playerId}/currentAnswer`).remove();
            });
        });
        
        // ناردنی پرسیار بۆ یاریکەران
        database.ref(`${roomId}/activeQuestion`).set({
            question: currentSelectedQuestion,
            correct: currentSelectedQuestion.correct,
            category: currentCategory,
            index: index,
            timestamp: Date.now()
        });
        
        document.getElementById("questionsSection").style.display = "none";
        document.getElementById("questionScreenSection").style.display = "block";
        
        displayQuestionWithAnimation(currentSelectedQuestion);
    }
    
    function displayQuestionWithAnimation(question) {
        const letters = ["A", "B", "C", "D"];
        const container = document.getElementById("questionDisplay");
        
        // ئەنیمەیشنی پرسیار (1 چرکە)
        container.innerHTML = `<div class="question-text" style="animation: fadeIn 1s ease;">${question.text}</div>`;
        
        // دوای 1 چرکە، هەڵبژاردنەکان زیاد بکە (2.5 چرکە)
        setTimeout(() => {
            const optionsHtml = `
                <div class="options-grid" style="animation: fadeIn 1s ease;">
                    ${question.options.map((opt, idx) => `
                        <div class="option-box" data-opt="${letters[idx]}">${letters[idx]}. ${opt}</div>
                    `).join('')}
                </div>
            `;
            container.innerHTML = `<div class="question-text" style="animation: fadeIn 1s ease;">${question.text}</div>${optionsHtml}`;
        }, 1000);
        
        // دوای 2.5 چرکە، چرکەکە زیاد بکە
        setTimeout(() => {
            const timerHtml = `<div class="timer" id="presenterTimer">30</div>`;
            container.innerHTML = timerHtml + container.innerHTML;
            startCountdown();
        }, 2500);
    }
    
    function startCountdown() {
        let waitTime = 6; // 6 چرکە چاوەڕوانی
        let displayTime = 30;
        
        const timerDiv = document.getElementById("presenterTimer");
        if(!timerDiv) return;
        
        timerDiv.innerText = `${waitTime}`;
        
        const waitInterval = setInterval(() => {
            if(waitTime > 1) {
                waitTime--;
                timerDiv.innerText = `${waitTime}`;
            } else {
                clearInterval(waitInterval);
                // دەستپێکردنی کاتژمێرەکە لە 30 چرکەوە
                timerDiv.innerText = `${displayTime}`;
                startTimer(displayTime, timerDiv);
            }
        }, 1000);
    }
    
    function startTimer(displayTime, timerDiv) {
        if(timerInterval) clearInterval(timerInterval);
        
        timerInterval = setInterval(() => {
            if(displayTime > 0) {
                displayTime--;
                timerDiv.innerText = `${displayTime}`;
                
                if(displayTime === 0) {
                    clearInterval(timerInterval);
                    showCorrectAnswer();
                }
            }
        }, 1000);
    }
    
    function showCorrectAnswer() {
        const letters = ["A", "B", "C", "D"];
        const correctLetter = currentSelectedQuestion.correct;
        const correctIndex = letters.indexOf(correctLetter);
        
        const optionBoxes = document.querySelectorAll(".option-box");
        if(optionBoxes[correctIndex]) {
            optionBoxes[correctIndex].classList.add("option-correct");
        }
    }
    
    function showGroups() {
        const players = Object.values(activePlayers);
        const group1Players = players.filter(p => p.group === "group1");
        const group2Players = players.filter(p => p.group === "group2");
        
        const groupsContainer = document.getElementById("groupsSection");
        groupsContainer.innerHTML = `
            <div class="group-box">
                <h3>🏆 گروپی یەکەم</h3>
                <div class="players-list" id="group1List"></div>
            </div>
            <div class="group-box">
                <h3>🏆 گروپی دووەم</h3>
                <div class="players-list" id="group2List"></div>
            </div>
        `;
        
        const group1List = document.getElementById("group1List");
        const group2List = document.getElementById("group2List");
        
        group1Players.forEach(player => {
            const answerClass = player.currentAnswer ? "player-item-orange" : "";
            group1List.innerHTML += `
                <div class="player-item ${answerClass}">
                    <span>👤 ${player.username}</span>
                    ${player.currentAnswer ? `<span class="player-answer">${player.currentAnswer}</span>` : '<span class="player-answer">چاوەڕوان</span>'}
                </div>
            `;
        });
        
        group2Players.forEach(player => {
            const answerClass = player.currentAnswer ? "player-item-orange" : "";
            group2List.innerHTML += `
                <div class="player-item ${answerClass}">
                    <span>👤 ${player.username}</span>
                    ${player.currentAnswer ? `<span class="player-answer">${player.currentAnswer}</span>` : '<span class="player-answer">چاوەڕوان</span>'}
                </div>
            `;
        });
        
        groupsContainer.style.display = "flex";
    }
    
    function backToCategories() {
        if(timerInterval) clearInterval(timerInterval);
        document.getElementById("questionsSection").style.display = "none";
        document.getElementById("questionScreenSection").style.display = "none";
        document.getElementById("groupsSection").style.display = "none";
        document.getElementById("categoriesSection").style.display = "block";
        currentSelectedQuestion = null;
    }
</script>
</body>
</html>
