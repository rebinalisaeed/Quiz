<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, shrink-to-fit=no, viewport-fit=cover">
    <title>خاڵەکان - یاری پرسیار و وەڵام</title>
    <style>
        @font-face {
            font-family: 'K24KurdishBold-Bold';
            src: url('fonts/K24KurdishBold-Bold.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        
        @font-face {
            font-family: 'K24KurdishLight-Light';
            src: url('fonts/K24KurdishLight-Light.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }
        
        body {
            font-family: 'K24KurdishBold-Bold', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }
        
        .container {
            width: 100%;
            max-width: 800px;
            height: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            padding: 10px 0;
        }
        
        .container::-webkit-scrollbar {
            width: 5px;
        }
        
        .container::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
        
        .container::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
        }
        
        .page-header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        
        .page-header h1 {
            font-size: 26px;
            color: #333;
            margin-bottom: 8px;
        }
        
        .turn-indicator {
            font-size: 20px;
            color: #667eea;
            margin-top: 5px;
            font-family: 'K24KurdishLight-Light', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .turn-indicator span {
            font-weight: bold;
            color: #4CAF50;
            font-family: 'K24KurdishBold-Bold', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .group-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 25px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }
        
        .group-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }
        
        .group-name {
            font-size: 28px;
            font-weight: bold;
            color: #333;
        }
        
        .group-question-count {
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 22px;
            font-weight: bold;
        }
        
        .players-list {
            list-style: none;
            margin-bottom: 15px;
        }
        
        .player-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 10px;
            margin: 5px 0;
            background: #f5f5f5;
            border-radius: 15px;
        }
        
        .player-name {
            font-size: 22px;
            color: #333;
            font-family: 'K24KurdishLight-Light', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .player-score {
            font-size: 26px;
            font-weight: bold;
            color: #667eea;
        }
        
        .player-eliminated {
            opacity: 0.5;
            text-decoration: line-through;
            background: #e0e0e0;
        }
        
        .group-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            color: white;
        }
        
        .total-label {
            font-size: 22px;
            font-weight: bold;
        }
        
        .total-score {
            font-size: 32px;
            font-weight: bold;
        }
        
        .no-players {
            text-align: center;
            padding: 30px;
            color: #999;
            font-size: 18px;
        }
        
        @media (max-width: 600px) {
            .group-name {
                font-size: 22px;
            }
            
            .group-question-count {
                font-size: 18px;
                padding: 4px 12px;
            }
            
            .player-name {
                font-size: 18px;
            }
            
            .player-score {
                font-size: 22px;
            }
            
            .total-label {
                font-size: 18px;
            }
            
            .total-score {
                font-size: 26px;
            }
            
            .page-header h1 {
                font-size: 22px;
            }
            
            .turn-indicator {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <div class="page-header">
            <h1>🏆 نمایشی خاڵەکان</h1>
            <div class="turn-indicator" id="turnIndicator">
                👥 ئێستا نۆرەی <span id="currentTurn">گروپی یەکەم</span> ە
            </div>
        </div>
        
        <div id="group1Card" class="group-card">
            <div class="group-header">
                <span class="group-name">👥 گروپی یەکەم</span>
                <span class="group-question-count" id="group1Count">پرسیار: 0</span>
            </div>
            <div id="group1Players" class="players-list"></div>
            <div class="group-total">
                <span class="total-label">📊 کۆی گشتی خاڵەکان</span>
                <span class="total-score" id="group1Total">0</span>
            </div>
        </div>
        
        <div id="group2Card" class="group-card">
            <div class="group-header">
                <span class="group-name">👥 گروپی دووەم</span>
                <span class="group-question-count" id="group2Count">پرسیار: 0</span>
            </div>
            <div id="group2Players" class="players-list"></div>
            <div class="group-total">
                <span class="total-label">📊 کۆی گشتی خاڵەکان</span>
                <span class="total-score" id="group2Total">0</span>
            </div>
        </div>
    </div>
    
    <script type="module">
        import { db, ref, get, onValue } from './firebase-config.js';
        
        document.addEventListener('contextmenu', (e) => e.preventDefault());
        document.addEventListener('selectstart', (e) => e.preventDefault());
        document.addEventListener('keydown', (e) => {
            if (e.key === 'F5' || ((e.ctrlKey || e.metaKey) && e.key === 'r')) {
                e.preventDefault();
                return false;
            }
        });
        
        async function loadData() {
            // Load players and scores
            const usersRef = ref(db, 'users');
            const usersSnapshot = await get(usersRef);
            
            let group1Players = [];
            let group2Players = [];
            let group1Total = 0;
            let group2Total = 0;
            
            if (usersSnapshot.exists()) {
                const users = usersSnapshot.val();
                for (let userId in users) {
                    const user = users[userId];
                    if (user.role === 'player') {
                        const playerScore = user.score || 5;
                        if (user.group === 'group1') {
                            group1Players.push({
                                name: user.name || user.username,
                                score: playerScore,
                                isEliminated: user.isEliminated === true || playerScore <= 0
                            });
                            if (!(user.isEliminated === true || playerScore <= 0)) {
                                group1Total += playerScore;
                            }
                        } else if (user.group === 'group2') {
                            group2Players.push({
                                name: user.name || user.username,
                                score: playerScore,
                                isEliminated: user.isEliminated === true || playerScore <= 0
                            });
                            if (!(user.isEliminated === true || playerScore <= 0)) {
                                group2Total += playerScore;
                            }
                        }
                    }
                }
            }
            
            // Sort players (eliminated at bottom)
            group1Players.sort((a, b) => {
                if (a.isEliminated === b.isEliminated) return 0;
                return a.isEliminated ? 1 : -1;
            });
            group2Players.sort((a, b) => {
                if (a.isEliminated === b.isEliminated) return 0;
                return a.isEliminated ? 1 : -1;
            });
            
            // Display group 1 players
            const group1Container = document.getElementById('group1Players');
            if (group1Players.length === 0) {
                group1Container.innerHTML = '<div class="no-players">هیچ یاریزانێک نییە</div>';
            } else {
                group1Container.innerHTML = group1Players.map(p => `
                    <li class="player-item ${p.isEliminated ? 'player-eliminated' : ''}">
                        <span class="player-name">${escapeHtml(p.name)}</span>
                        <span class="player-score">⭐ ${p.score}</span>
                    </li>
                `).join('');
            }
            document.getElementById('group1Total').textContent = group1Total;
            
            // Display group 2 players
            const group2Container = document.getElementById('group2Players');
            if (group2Players.length === 0) {
                group2Container.innerHTML = '<div class="no-players">هیچ یاریزانێک نییە</div>';
            } else {
                group2Container.innerHTML = group2Players.map(p => `
                    <li class="player-item ${p.isEliminated ? 'player-eliminated' : ''}">
                        <span class="player-name">${escapeHtml(p.name)}</span>
                        <span class="player-score">⭐ ${p.score}</span>
                    </li>
                `).join('');
            }
            document.getElementById('group2Total').textContent = group2Total;
            
            // Load question counts
            const gameRef = ref(db, 'game');
            const gameSnapshot = await get(gameRef);
            if (gameSnapshot.exists()) {
                const game = gameSnapshot.val();
                document.getElementById('group1Count').textContent = `پرسیار: ${game.group1Count || 0}`;
                document.getElementById('group2Count').textContent = `پرسیار: ${game.group2Count || 0}`;
                
                // Update turn indicator
                const currentTurn = game.currentTurn || 'group1';
                const turnText = currentTurn === 'group1' ? 'گروپی یەکەم' : 'گروپی دووەم';
                document.getElementById('currentTurn').textContent = turnText;
            } else {
                document.getElementById('group1Count').textContent = 'پرسیار: 0';
                document.getElementById('group2Count').textContent = 'پرسیار: 0';
                document.getElementById('currentTurn').textContent = 'گروپی یەکەم';
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Listen for real-time updates
        function listenForUpdates() {
            const usersRef = ref(db, 'users');
            onValue(usersRef, () => {
                loadData();
            });
            
            const gameRef = ref(db, 'game');
            onValue(gameRef, () => {
                loadData();
            });
        }
        
        const currentUser = JSON.parse(localStorage.getItem('currentUser') || '{}');
        if (currentUser.role !== 'point_viewer' && currentUser.role !== 'admin' && currentUser.role !== 'presenter') {
            alert('تەنها بەڕێوەبەر و پێشکەشکار و بینەری خاڵ دەتوانن ئەم پەڕەیە ببینن!');
            window.location.href = 'login.html';
        }
        
        loadData();
        listenForUpdates();
        
        // Auto refresh every 2 seconds
        setInterval(() => {
            loadData();
        }, 2000);
    </script>
</body>
</html>
