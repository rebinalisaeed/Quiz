<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, shrink-to-fit=no, viewport-fit=cover">
    <title>یاریکەر - یاری پرسیار و وەڵام</title>
    <style>
        @font-face {
            font-family: 'K24KurdishBold-Bold';
            src: url('fonts/K24KurdishBold-Bold.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        
        @font-face {
            font-family: 'K24KurdishLight-Light';
            src: url('fonts/K24KurdishLight-Light.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }
        
        body {
            font-family: 'K24KurdishBold-Bold', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            font-size: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 600px;
            height: 100%;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .score-header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 15px 25px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            width: 100%;
            margin-bottom: 30px;
        }
        
        .score-title {
            font-size: 22px;
            color: #666;
            margin-bottom: 8px;
            font-family: 'K24KurdishLight-Light', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .score-value {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            font-family: 'K24KurdishBold-Bold', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .waiting-screen {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 50px 30px;
            text-align: center;
            width: 100%;
            backdrop-filter: blur(10px);
        }
        
        .waiting-spinner {
            width: 70px;
            height: 70px;
            border: 4px solid #f0f0f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 25px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .waiting-text {
            font-size: 28px;
            color: #555;
            font-family: 'K24KurdishBold-Bold', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .question-screen {
            background: transparent;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .question-screen .score-header {
            display: none;
        }
        
        .timer-circle {
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px auto;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }
        
        .timer {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            font-family: 'K24KurdishBold-Bold', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .question-box {
            background: rgba(180, 160, 120, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .question-text {
            font-size: 26px;
            color: #fff;
            line-height: 1.5;
            text-align: center;
            font-family: 'K24KurdishBold-Bold', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }
        
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }
        
        .option-card {
            background: rgba(180, 160, 120, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 18px 20px;
            text-align: center;
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            width: 100%;
        }
        
        .option-card:active {
            transform: scale(0.98);
        }
        
        .option-card .option-letter {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            left: 15px;
            right: auto;
            background: #2196F3;
            color: white;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            font-family: 'K24KurdishBold-Bold', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .option-text {
            font-size: 22px;
            color: #fff;
            padding: 10px 50px 10px 20px;
            font-family: 'K24KurdishLight-Light', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.1);
            text-align: right;
            display: block;
            width: 100%;
        }
        
        .option-card.selected {
            background: #FF9800;
        }
        
        .option-card.correct {
            background: #4CAF50;
        }
        
        .option-card.wrong {
            background: #f44336;
        }
        
        .option-card.correct .option-letter,
        .option-card.wrong .option-letter {
            background: white;
        }
        
        .option-card.correct .option-letter {
            color: #4CAF50;
        }
        
        .option-card.wrong .option-letter {
            color: #f44336;
        }
        
        .result-screen {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 40px 25px;
            text-align: center;
            width: 100%;
        }
        
        .result-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
        
        .result-text {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 15px;
            font-family: 'K24KurdishBold-Bold', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .result-points {
            font-size: 24px;
            color: #666;
            font-family: 'K24KurdishLight-Light', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .result-points span {
            font-weight: bold;
            color: #667eea;
            font-size: 32px;
            font-family: 'K24KurdishBold-Bold', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .eliminated-screen {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 50px 25px;
            text-align: center;
            width: 100%;
        }
        
        .eliminated-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        
        .eliminated-text {
            font-size: 32px;
            color: #f44336;
            margin-bottom: 20px;
            font-family: 'K24KurdishBold-Bold', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .eliminated-subtext {
            font-size: 20px;
            color: #666;
            font-family: 'K24KurdishLight-Light', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .hidden {
            display: none !important;
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 15px;
            }
            
            .score-title {
                font-size: 18px;
            }
            
            .score-value {
                font-size: 40px;
            }
            
            .waiting-text {
                font-size: 24px;
            }
            
            .waiting-spinner {
                width: 55px;
                height: 55px;
            }
            
            .timer-circle {
                width: 80px;
                height: 80px;
            }
            
            .timer {
                font-size: 40px;
            }
            
            .question-text {
                font-size: 22px;
            }
            
            .question-box {
                padding: 22px 15px;
            }
            
            .option-text {
                font-size: 18px;
                padding: 8px 45px 8px 15px;
            }
            
            .option-card {
                padding: 14px 15px;
            }
            
            .option-card .option-letter {
                width: 32px;
                height: 32px;
                font-size: 16px;
                left: 12px;
            }
            
            .result-text {
                font-size: 24px;
            }
            
            .result-points {
                font-size: 20px;
            }
            
            .result-points span {
                font-size: 28px;
            }
            
            .eliminated-text {
                font-size: 26px;
            }
            
            .eliminated-subtext {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div id="scoreHeader" class="score-header">
            <div class="score-title">🌟 خاڵەکانی تۆ</div>
            <div class="score-value" id="playerScore">5</div>
        </div>
        
        <div id="waitingScreen" class="waiting-screen">
            <div class="waiting-spinner"></div>
            <div class="waiting-text">⏳ چاوەڕوانی پرسیاری داهاتوو...</div>
        </div>
        
        <div id="questionScreen" class="question-screen hidden">
            <div class="timer-circle">
                <div class="timer" id="timer">30</div>
            </div>
            <div class="question-box">
                <div class="question-text" id="questionText"></div>
            </div>
            <div class="options-grid" id="optionsList"></div>
        </div>
        
        <div id="resultScreen" class="result-screen hidden">
            <div class="result-icon" id="resultIcon"></div>
            <div class="result-text" id="resultText"></div>
            <div class="result-points" id="resultPoints"></div>
        </div>
        
        <div id="eliminatedScreen" class="eliminated-screen hidden">
            <div class="eliminated-icon">😢</div>
            <div class="eliminated-text">تۆ لە یاریەکە دەرکرایت</div>
            <div class="eliminated-subtext">خاڵەکانت بە سفر گەیشتن</div>
        </div>
    </div>
    
    <script type="module">
        import { db, ref, get, set, update, onValue } from './firebase-config.js';
        
        document.addEventListener('contextmenu', (e) => e.preventDefault());
        document.addEventListener('selectstart', (e) => e.preventDefault());
        document.addEventListener('keydown', (e) => {
            if (e.key === 'F5' || ((e.ctrlKey || e.metaKey) && e.key === 'r')) {
                e.preventDefault();
                return false;
            }
        });
        
        const currentUser = JSON.parse(localStorage.getItem('currentUser') || '{}');
        let currentQuestion = null;
        let hasAnswered = false;
        let hasShownResult = false;
        let timerInterval = null;
        let isEliminated = false;
        let currentScore = 5;
        let selectedOptionIndex = null;
        let resultTimeout = null;
        
        async function checkEliminated() {
            if (!currentUser.userId) return false;
            
            const userRef = ref(db, `users/${currentUser.userId}`);
            const snapshot = await get(userRef);
            if (snapshot.exists()) {
                const user = snapshot.val();
                if (user.isEliminated === true || (user.score !== undefined && user.score <= 0)) {
                    isEliminated = true;
                    showEliminatedScreen();
                    return true;
                }
                currentScore = user.score || 5;
                updateScoreDisplay();
            }
            return false;
        }
        
        function updateScoreDisplay() {
            document.getElementById('playerScore').textContent = currentScore;
        }
        
        function listenForQuestions() {
            const gameRef = ref(db, 'game');
            onValue(gameRef, async (snapshot) => {
                if (isEliminated) return;
                
                const eliminated = await checkEliminated();
                if (eliminated) return;
                
                const game = snapshot.val();
                
                if (game && game.questionActive === true && game.currentQuestion) {
                    if (!currentQuestion || game.currentQuestion.timestamp !== currentQuestion.timestamp) {
                        currentQuestion = game.currentQuestion;
                        hasAnswered = false;
                        hasShownResult = false;
                        selectedOptionIndex = null;
                        showQuestion(game.currentQuestion);
                    }
                } else if (game && game.showAnswer === true && currentQuestion && !hasAnswered && !hasShownResult) {
                    showAnswerAndResult();
                } else if ((!game || game.questionActive === false) && !game?.showAnswer && currentQuestion) {
                    if (resultTimeout) clearTimeout(resultTimeout);
                    hideQuestionScreen();
                    showWaitingScreen();
                    currentQuestion = null;
                    await checkEliminated();
                    updateScoreDisplay();
                }
            });
        }
        
        function showQuestion(question) {
            document.getElementById('scoreHeader').classList.add('hidden');
            document.getElementById('waitingScreen').classList.add('hidden');
            document.getElementById('resultScreen').classList.add('hidden');
            document.getElementById('questionScreen').classList.remove('hidden');
            
            document.getElementById('questionText').textContent = question.text;
            
            const optionsContainer = document.getElementById('optionsList');
            optionsContainer.innerHTML = '';
            
            const letters = ['A', 'B', 'C', 'D'];
            question.options.forEach((opt, idx) => {
                const div = document.createElement('div');
                div.className = 'option-card';
                div.innerHTML = `
                    <div class="option-letter">${letters[idx]}</div>
                    <div class="option-text">${opt}</div>
                `;
                div.onclick = () => selectOption(idx);
                optionsContainer.appendChild(div);
            });
            
            startTimer();
        }
        
        function selectOption(selectedIndex) {
            if (hasAnswered) return;
            
            const options = document.querySelectorAll('.option-card');
            options.forEach(opt => {
                opt.classList.remove('selected');
            });
            
            options[selectedIndex].classList.add('selected');
            selectedOptionIndex = selectedIndex;
        }
        
        function startTimer() {
            let seconds = 30;
            const timerElement = document.getElementById('timer');
            timerElement.textContent = seconds;
            
            if (timerInterval) clearInterval(timerInterval);
            
            setTimeout(() => {
                timerInterval = setInterval(() => {
                    seconds--;
                    timerElement.textContent = seconds;
                    
                    if (seconds <= 0) {
                        clearInterval(timerInterval);
                        if (!hasAnswered) {
                            showAnswerAndResult();
                        }
                    }
                }, 1000);
            }, 3000);
        }
        
        async function showAnswerAndResult() {
            if (hasAnswered || hasShownResult) return;
            hasAnswered = true;
            hasShownResult = true;
            clearInterval(timerInterval);
            
            const options = document.querySelectorAll('.option-card');
            let isCorrect = false;
            let pointsChange = 0;
            
            if (selectedOptionIndex !== null && selectedOptionIndex === currentQuestion.correct) {
                isCorrect = true;
                pointsChange = 3;
                currentScore += 3;
                options[selectedOptionIndex].classList.add('correct');
            } else {
                pointsChange = -1;
                currentScore -= 1;
                
                if (selectedOptionIndex !== null) {
                    options[selectedOptionIndex].classList.add('wrong');
                }
                options[currentQuestion.correct].classList.add('correct');
            }
            
            const userRef = ref(db, `users/${currentUser.userId}`);
            const snapshot = await get(userRef);
            if (snapshot.exists()) {
                const user = snapshot.val();
                const newScore = (user.score || 5) + pointsChange;
                await update(userRef, { score: newScore });
                
                if (newScore <= 0) {
                    await update(userRef, { isEliminated: true, isActive: false });
                    
                    const group = user.group;
                    const usersRef = ref(db, 'users');
                    const usersSnapshot = await get(usersRef);
                    if (usersSnapshot.exists()) {
                        const users = usersSnapshot.val();
                        let eliminatedCount = 0;
                        
                        for (let uid in users) {
                            if (users[uid].role === 'player' && users[uid].group === group && users[uid].isEliminated === true) {
                                eliminatedCount++;
                            }
                        }
                        
                        if (eliminatedCount === 1) {
                            for (let uid in users) {
                                if (users[uid].role === 'player' && users[uid].group === group && users[uid].isEliminated !== true) {
                                    const currentGroupScore = users[uid].score || 5;
                                    await update(ref(db, `users/${uid}`), { score: currentGroupScore - 2 });
                                }
                            }
                        }
                    }
                    
                    isEliminated = true;
                }
            }
            
            currentScore = Math.max(0, currentScore);
            updateScoreDisplay();
            
            showResultScreen(isCorrect, pointsChange);
            
            resultTimeout = setTimeout(() => {
                set(ref(db, 'game/showAnswer'), false);
                hideQuestionScreen();
                showWaitingScreen();
                currentQuestion = null;
                
                if (isEliminated) {
                    checkEliminated();
                } else {
                    checkEliminated();
                    updateScoreDisplay();
                }
            }, 10000);
        }
        
        function showResultScreen(isCorrect, pointsChange) {
            document.getElementById('questionScreen').classList.add('hidden');
            document.getElementById('resultScreen').classList.remove('hidden');
            
            const icon = document.getElementById('resultIcon');
            const text = document.getElementById('resultText');
            const pointsEl = document.getElementById('resultPoints');
            
            if (isCorrect) {
                icon.innerHTML = '✅';
                text.innerHTML = 'وەڵامەکەت ڕاست بوو!';
                pointsEl.innerHTML = `+${pointsChange} خاڵ`;
                pointsEl.style.color = '#4CAF50';
            } else if (selectedOptionIndex !== null) {
                icon.innerHTML = '❌';
                text.innerHTML = 'وەڵامەکەت هەڵە بوو!';
                pointsEl.innerHTML = `${pointsChange} خاڵ`;
                pointsEl.style.color = '#f44336';
            } else {
                icon.innerHTML = '⏰';
                text.innerHTML = 'کاتی وەڵامدان تەواو بوو!';
                pointsEl.innerHTML = `${pointsChange} خاڵ`;
                pointsEl.style.color = '#f44336';
            }
        }
        
        function hideQuestionScreen() {
            document.getElementById('questionScreen').classList.add('hidden');
            document.getElementById('resultScreen').classList.add('hidden');
            document.getElementById('scoreHeader').classList.remove('hidden');
        }
        
        function showWaitingScreen() {
            document.getElementById('waitingScreen').classList.remove('hidden');
        }
        
        function showEliminatedScreen() {
            document.getElementById('scoreHeader').classList.add('hidden');
            document.getElementById('waitingScreen').classList.add('hidden');
            document.getElementById('questionScreen').classList.add('hidden');
            document.getElementById('resultScreen').classList.add('hidden');
            document.getElementById('eliminatedScreen').classList.remove('hidden');
        }
        
        function listenForScoreUpdates() {
            if (!currentUser.userId) return;
            
            const userRef = ref(db, `users/${currentUser.userId}`);
            onValue(userRef, (snapshot) => {
                if (snapshot.exists() && !isEliminated && !hasAnswered) {
                    const user = snapshot.val();
                    currentScore = user.score || 5;
                    document.getElementById('playerScore').textContent = currentScore;
                    
                    if (user.isEliminated === true || currentScore <= 0) {
                        isEliminated = true;
                        showEliminatedScreen();
                    }
                }
            });
        }
        
        async function init() {
            if (!currentUser.userId || currentUser.userId === 'undefined') {
                alert('تکایە بچۆرە ژوورەوە!');
                window.location.href = 'login.html';
                return;
            }
            
            if (currentUser.role !== 'player') {
                alert('ئەم پەڕەیە تەنها بۆ یاریکەرە!');
                window.location.href = 'login.html';
                return;
            }
            
            const eliminated = await checkEliminated();
            if (!eliminated) {
                listenForQuestions();
                listenForScoreUpdates();
            }
        }
        
        init();
    </script>
</body>
</html>
