<!DOCTYPE html>
<html dir="rtl">
<head>
    <title>یاری پرسیار و وەڵام - یاریکەر</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @font-face { font-family: 'K24Kurdish'; src: url('K24KurdishBold-Bold.ttf') format('truetype'); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'K24Kurdish', 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .waiting-container { text-align: center; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 30px; padding: 50px; max-width: 500px; }
        .waiting-message { color: #ff9800; font-size: 28px; margin-bottom: 20px; }
        .waiting-sub { color: rgba(255,255,255,0.7); font-size: 18px; }
        .question-screen { text-align: center; max-width: 900px; margin: auto; }
        .timer { font-size: 52px; color: #ff6b6b; background: rgba(0,0,0,0.6); display: inline-block; padding: 10px 35px; border-radius: 60px; margin: 20px 0; font-family: monospace; }
        .question-text { font-size: 28px; color: white; margin: 30px 0; padding: 25px; background: rgba(0,0,0,0.4); border-radius: 25px; line-height: 1.5; }
        .options-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin: 30px 0; }
        .option-btn { background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3); border-radius: 20px; padding: 18px; font-size: 18px; color: white; cursor: pointer; text-align: center; transition: all 0.2s; }
        .option-btn-orange { background: #ff9800 !important; border-color: #e68900 !important; transform: scale(1.02); }
        .option-correct { background: #4CAF50 !important; border-color: #2e7d32 !important; }
        .option-wrong { background: #f44336 !important; border-color: #c62828 !important; }
        @media (max-width: 600px) { .question-text { font-size: 20px; } .option-btn { font-size: 14px; padding: 12px; } .timer { font-size: 36px; } .waiting-message { font-size: 22px; } }
    </style>
</head>
<body>
<div id="waitingContainer" class="waiting-container">
    <div class="waiting-message">⏳ چاوەڕوان بە...</div>
    <div class="waiting-sub">پێشکەشکار پرسیاری داهاتوو هەڵدەبژێرێت</div>
</div>
<div id="questionContainer" style="display:none;" class="question-screen"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCtiW-RBMY0emCOFZdQCA7ynPESraUknxI",
        authDomain: "quizgamerebin.firebaseapp.com",
        databaseURL: "https://quizgamerebin-default-rtdb.firebaseio.com",
        projectId: "quizgamerebin",
        storageBucket: "quizgamerebin.firebasestorage.app",
        messagingSenderId: "312376681830",
        appId: "1:312376681830:web:11262fa62cc9246bac14a7"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    const ROOM_ID = "quiz_room_main";
    let timerInterval = null;
    let timeLeft = 40;
    let isAnswered = false;
    let currentCorrectAnswer = null;
    let selectedAnswerBtn = null;
    let currentUser = JSON.parse(localStorage.getItem("loggedInUser") || "{}");
    let playerId = currentUser.username + "_" + Date.now();
    
    if(!currentUser.username) {
        window.location.href = "index.html";
    }
    
    // تۆمارکردنی یاریکەر وەک چالاک
    function registerPlayer() {
        database.ref(`${ROOM_ID}/activePlayers/${playerId}`).set({
            username: currentUser.username,
            joinedAt: Date.now(),
            currentAnswer: null
        });
    }
    
    // لابردنی یاریکەر کە پەڕەکە دادەخرێت
    window.addEventListener("beforeunload", () => {
        database.ref(`${ROOM_ID}/activePlayers/${playerId}`).remove();
    });
    
    // گوێگرتن لە پرسیاری نوێ
    database.ref(`${ROOM_ID}/activeQuestion`).on('value', (snapshot) => {
        const data = snapshot.val();
        if(data && data.question) {
            // پاککردنەوەی وەڵامی پێشووی ئەم یاریکەرە
            database.ref(`${ROOM_ID}/activePlayers/${playerId}/currentAnswer`).remove();
            showQuestion(data.question, data.correct);
        }
    });
    
    function showQuestion(question, correctAnswer) {
        if(timerInterval) clearInterval(timerInterval);
        
        currentCorrectAnswer = correctAnswer;
        isAnswered = false;
        selectedAnswerBtn = null;
        timeLeft = 40;
        
        document.getElementById("waitingContainer").style.display = "none";
        const container = document.getElementById("questionContainer");
        container.style.display = "block";
        
        renderQuestion(question);
        startTimer();
    }
    
    function renderQuestion(question) {
        const letters = ["A", "B", "C", "D"];
        const container = document.getElementById("questionContainer");
        container.innerHTML = `
            <div class="timer" id="timerDisplay">40 چرکە</div>
            <div class="question-text">${question.text}</div>
            <div class="options-grid" id="optionsGrid">
                ${question.options.map((opt, idx) => `
                    <div class="option-btn" data-opt="${letters[idx]}" onclick="selectAnswer('${letters[idx]}')">
                        ${letters[idx]}. ${opt}
                    </div>
                `).join('')}
            </div>
        `;
    }
    
    function selectAnswer(letter) {
        if(isAnswered) return;
        if(selectedAnswerBtn) selectedAnswerBtn.classList.remove("option-btn-orange");
        const btns = document.querySelectorAll(".option-btn");
        for(let btn of btns) {
            if(btn.getAttribute("data-opt") === letter) {
                btn.classList.add("option-btn-orange");
                selectedAnswerBtn = btn;
                break;
            }
        }
    }
    
    function submitAnswer(selectedLetter) {
        if(isAnswered) return;
        const isCorrect = (selectedLetter === currentCorrectAnswer);
        isAnswered = true;
        clearInterval(timerInterval);
        
        // ناردنی وەڵام بۆ پێشکەشکار
        database.ref(`${ROOM_ID}/activePlayers/${playerId}/currentAnswer`).set(selectedLetter);
        
        const btns = document.querySelectorAll(".option-btn");
        btns.forEach(btn => {
            btn.style.pointerEvents = "none";
            if(btn.getAttribute("data-opt") === currentCorrectAnswer) {
                btn.classList.add("option-correct");
            }
            if(btn.getAttribute("data-opt") === selectedLetter && !isCorrect) {
                btn.classList.add("option-wrong");
            }
            btn.classList.remove("option-btn-orange");
        });
        
        setTimeout(() => {
            document.getElementById("questionContainer").style.display = "none";
            document.getElementById("waitingContainer").style.display = "block";
            isAnswered = false;
            selectedAnswerBtn = null;
        }, 3000);
    }
    
    function startTimer() {
        timerInterval = setInterval(() => {
            if(!isAnswered && timeLeft > 0) {
                timeLeft--;
                let td = document.getElementById("timerDisplay");
                if(td) td.innerText = `${timeLeft} چرکە`;
                if(timeLeft === 0 && !isAnswered) {
                    clearInterval(timerInterval);
                    database.ref(`${ROOM_ID}/activePlayers/${playerId}/currentAnswer`).set("کات تەواو بوو");
                    const btns = document.querySelectorAll(".option-btn");
                    btns.forEach(btn => {
                        btn.style.pointerEvents = "none";
                        if(btn.getAttribute("data-opt") === currentCorrectAnswer) {
                            btn.classList.add("option-correct");
                        }
                    });
                    setTimeout(() => {
                        document.getElementById("questionContainer").style.display = "none";
                        document.getElementById("waitingContainer").style.display = "block";
                    }, 3000);
                }
            } else if(timeLeft <= 0) {
                clearInterval(timerInterval);
            }
        }, 1000);
    }
    
    document.addEventListener('keydown', (e) => {
        if(document.getElementById("questionContainer").style.display === "block") {
            const key = e.key.toUpperCase();
            if(['A','B','C','D'].includes(key) && !isAnswered) {
                e.preventDefault();
                selectAnswer(key);
            }
            if(e.key === 'Enter' && selectedAnswerBtn && !isAnswered) {
                e.preventDefault();
                submitAnswer(selectedAnswerBtn.getAttribute("data-opt"));
            }
        }
    });
    
    registerPlayer();
</script>
</body>
</html>
