<!DOCTYPE html>
<html dir="rtl">
<head>
    <title>یاری پرسیار و وەڵام</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        @font-face { font-family: 'K24Kurdish'; src: url('K24KurdishBold-Bold.ttf') format('truetype'); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'K24Kurdish', 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); min-height: 100vh; padding: 30px 20px; display: flex; justify-content: center; align-items: center; position: relative; }
        .container { max-width: 900px; width: 100%; margin: auto; }
        .import-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 999; display: none; flex-direction: column; gap: 10px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 60px; backdrop-filter: blur(10px); }
        .import-btn, .manual-import-btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 50px; padding: 12px 25px; font-size: 16px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); margin: 5px; }
        .manual-import-btn { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .manual-import-area { display: none; margin-top: 10px; }
        .manual-import-area textarea { width: 300px; height: 150px; border-radius: 20px; padding: 10px; font-size: 12px; direction: ltr; text-align: left; }
        .row { display: flex; justify-content: center; gap: 25px; margin-bottom: 30px; flex-wrap: wrap; }
        .category-btn { background: rgba(255,255,255,0.1); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.25); border-radius: 20px; padding: 18px 25px; width: 180px; text-align: center; cursor: pointer; transition: all 0.3s ease; }
        .category-btn span { font-size: 24px; color: white; }
        .category-btn-green { background: #4CAF50 !important; border-color: #2e7d32 !important; transform: scale(1.02); }
        @keyframes greenFlash { 0% { background: rgba(255,255,255,0.1); transform: scale(1); } 30% { background: #4CAF50; transform: scale(1.05); } 100% { background: rgba(255,255,255,0.1); transform: scale(1); } }
        .category-btn-animate { animation: greenFlash 0.6s ease forwards; }
        @media (max-width: 700px) { .category-btn { width: 100px; padding: 12px 10px; } .category-btn span { font-size: 18px; } }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; overflow-y: auto; padding: 20px; }
        .modal-content { max-width: 900px; margin: 20px auto; background: rgba(30,30,50,0.95); backdrop-filter: blur(15px); border-radius: 30px; padding: 30px; }
        .questions-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 30px 0; }
        .question-number { background: rgba(255,255,255,0.15); border-radius: 20px; padding: 25px 10px; text-align: center; font-size: 32px; color: white; cursor: pointer; border: 2px solid rgba(255,255,255,0.2); transition: all 0.2s; }
        .question-number-green { background: #4CAF50 !important; border-color: #2e7d32 !important; transform: scale(1.02); }
        .question-screen { text-align: center; }
        .timer { font-size: 52px; color: #ff6b6b; background: rgba(0,0,0,0.6); display: inline-block; padding: 10px 35px; border-radius: 60px; margin: 20px 0; }
        .question-text { font-size: 28px; color: white; margin: 30px 0; padding: 25px; background: rgba(0,0,0,0.4); border-radius: 25px; }
        .options-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin: 30px 0; }
        .option-btn { background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3); border-radius: 20px; padding: 18px; font-size: 18px; color: white; cursor: pointer; text-align: center; }
        .option-correct { background: #4CAF50 !important; }
        .option-wrong { background: #f44336 !important; }
        .close-btn, .back-btn { background: #ff6b6b; color: white; border: none; padding: 12px 30px; border-radius: 30px; cursor: pointer; margin: 10px; }
        .back-btn { background: #4CAF50; }
        @media (max-width: 700px) { .question-number { font-size: 22px; } .question-text { font-size: 18px; } .option-btn { font-size: 13px; } .timer { font-size: 36px; } }
    </style>
</head>
<body>
<div class="import-container" id="importContainer">
    <div style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;">
        <button class="import-btn" onclick="importFromFile()">📁 Import لە فایل</button>
        <button class="manual-import-btn" onclick="toggleManualImport()">📋 کۆپی/پەیست (JSON)</button>
    </div>
    <div class="manual-import-area" id="manualImportArea">
        <textarea id="jsonText" placeholder="JSONی پاشەکەوتکراوی لێرە بلێکە (کۆپی بکە و پیست بکە)"></textarea>
        <button class="import-btn" onclick="importFromText()">✅ پەیستی بکە</button>
    </div>
</div>
<div class="container">
    <div class="row"><div class="category-btn" data-cat="مێژوو" data-key="1"><span>مێژوو</span></div><div class="category-btn" data-cat="زانست" data-key="2"><span>زانست</span></div><div class="category-btn" data-cat="ئەدەبیات" data-key="3"><span>ئەدەبیات</span></div></div>
    <div class="row"><div class="category-btn" data-cat="هونەر" data-key="4"><span>هونەر</span></div><div class="category-btn" data-cat="وەرزش" data-key="5"><span>وەرزش</span></div><div class="category-btn" data-cat="بیرکاری" data-key="6"><span>بیرکاری</span></div></div>
    <div class="row"><div class="category-btn" data-cat="تەکنەلۆژیا" data-key="7"><span>تەکنەلۆژیا</span></div><div class="category-btn" data-cat="تەندروستی" data-key="8"><span>تەندروستی</span></div><div class="category-btn" data-cat="جوگرافیا" data-key="9"><span>جوگرافیا</span></div></div>
    <div class="row"><div class="category-btn" data-cat="ئاینی" data-key="q"><span>ئاینی</span></div><div class="category-btn" data-cat="کوردستان" data-key="w"><span>کوردستان</span></div><div class="category-btn" data-cat="فیلم و دراما" data-key="e"><span>فیلم و دراما</span></div></div>
</div>
<div id="questionModal" class="modal"><div class="modal-content"><div id="questionsListDiv"></div><div id="questionScreenDiv" style="display:none;"></div><div style="text-align:center;"></div></div></div>

<script>
    let categories = {};
    let currentCategory = "";
    let currentQuestionIndex = null, timerInterval = null, timeLeft = 60, isAnswered = false;
    let selectedCategoryBtn = null;
    let selectedQuestionDiv = null;
    let isModalOpen = false;
    let isInQuestionScreen = false;
    
    // ========== فووڵ سکرین ==========
    function toggleFullScreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(err => { console.log(`Error: ${err.message}`); });
        } else {
            // بە R دەردەچیت، نەک لێرە
        }
    }
    
    function exitFullScreen() {
        if(document.fullscreenElement) {
            document.exitFullscreen();
        }
    }
    
    // چوونە ناو فووڵ سکرین بە F11
    document.addEventListener('keydown', (e) => {
        if(e.key === 'F11') {
            e.preventDefault();
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            }
        }
        // دەرچوون لە فووڵ سکرین بە دوگمەی R (نهێنی)
        if(e.key === 'r' || e.key === 'R') {
            e.preventDefault();
            if(document.fullscreenElement) exitFullScreen();
        }
        // ناچالاککردنی ESC بۆ دەرچوون لە فووڵ سکرین
        if(e.key === 'Escape') {
            if(isModalOpen) { 
                // نەهێڵێت فووڵ سکرین بە ESC بڕوات
                e.preventDefault();
            }
        }
    });
    
    // ناچالاککردنی راستکلیک و reload
    document.addEventListener('contextmenu', e => e.preventDefault());
    window.addEventListener('keydown', e => {
        if(e.key === 'F5' || (e.ctrlKey && e.key === 'r') || (e.ctrlKey && e.shiftKey && e.key === 'R') || (e.metaKey && e.key === 'r'))
            e.preventDefault();
    });
    
    // ========== گەڕانەوە بە Backspace ==========
    document.addEventListener('keydown', (e) => {
        if(e.key === 'Backspace') {
            e.preventDefault();
            // ئەگەر لە شاشەی پرسیارداین، بچینەوە بۆ لیستی پرسیارەکان
            if(isModalOpen && isInQuestionScreen) {
                backToQuestions();
            }
            // ئەگەر لە لیستی پرسیارەکانداین (مۆدال کراوە و پرسیارەکان نمایش کراوە)، بچینەوە بۆ کەتەگۆرییەکان
            else if(isModalOpen && !isInQuestionScreen && document.getElementById("questionsListDiv").style.display === "block") {
                closeModal();
            }
        }
    });
    
    // ========== کیبۆرد بۆ هەڵبژاردنی کەتەگۆری ==========
    const keyToCategory = {
        '1': 'مێژوو', '2': 'زانست', '3': 'ئەدەبیات',
        '4': 'هونەر', '5': 'وەرزش', '6': 'بیرکاری',
        '7': 'تەکنەلۆژیا', '8': 'تەندروستی', '9': 'جوگرافیا',
        'q': 'ئاینی', 'Q': 'ئاینی',
        'w': 'کوردستان', 'W': 'کوردستان',
        'e': 'فیلم و دراما', 'E': 'فیلم و دراما'
    };
    
    function getCategoryButtonByCatName(catName) {
        const btns = document.querySelectorAll(".category-btn");
        for(let btn of btns) {
            if(btn.getAttribute("data-cat") === catName) return btn;
        }
        return null;
    }
    
    function clearAllCategoryGreen() {
        document.querySelectorAll(".category-btn").forEach(btn => {
            btn.classList.remove("category-btn-green");
        });
        selectedCategoryBtn = null;
    }
    
    document.addEventListener('keydown', (e) => {
        // ئەگەر مۆدال کراوە بێت، ڕێگە بە کیبۆردی پرسیارەکان بدە
        if(isModalOpen && document.getElementById("questionsListDiv").style.display === "block") {
            handleQuestionKeyboard(e);
            return;
        }
        // ئەگەر شاشەی پرسیار کراوە بێت
        if(isModalOpen && document.getElementById("questionScreenDiv").style.display === "block") {
            handleAnswerKeyboard(e);
            return;
        }
        
        // هەڵبژاردنی کەتەگۆری
        const key = e.key;
        const catName = keyToCategory[key];
        if(catName) {
            e.preventDefault();
            clearAllCategoryGreen();
            const btn = getCategoryButtonByCatName(catName);
            if(btn) {
                btn.classList.add("category-btn-green");
                selectedCategoryBtn = btn;
            }
        }
        
        // چوونە ژوورەوە بە Enter
        if(e.key === 'Enter' && selectedCategoryBtn) {
            e.preventDefault();
            const catName = selectedCategoryBtn.getAttribute("data-cat");
            clearAllCategoryGreen();
            openCategory(catName);
        }
    });
    
    // ========== کیبۆرد بۆ پرسیارەکان (ژمارە 1-8) ==========
    function handleQuestionKeyboard(e) {
        const key = e.key;
        const num = parseInt(key);
        if(num >= 1 && num <= 8) {
            e.preventDefault();
            const questions = categories[currentCategory] || [];
            const questionDivs = document.querySelectorAll(".question-number");
            if(questionDivs.length >= num) {
                // لابردنی هەموو سەوزی پێشوو
                questionDivs.forEach(div => div.classList.remove("question-number-green"));
                const targetDiv = questionDivs[num-1];
                targetDiv.classList.add("question-number-green");
                selectedQuestionDiv = targetDiv;
            }
        }
        
        // چوونە ژوورەوە بە Enter
        if(e.key === 'Enter' && selectedQuestionDiv) {
            e.preventDefault();
            const index = Array.from(document.querySelectorAll(".question-number")).indexOf(selectedQuestionDiv);
            if(index !== -1) {
                const questions = categories[currentCategory] || [];
                if(questions.length > index) {
                    selectedQuestionDiv.classList.remove("question-number-green");
                    selectQuestion(index);
                } else {
                    alert("⚠️ هیچ پرسیارێک لەم ژمارەیەدا نییە!");
                    selectedQuestionDiv.classList.remove("question-number-green");
                    selectedQuestionDiv = null;
                }
            }
        }
    }
    
    // ========== کیبۆرد بۆ وەڵامدان (A,B,C,D) ==========
    function handleAnswerKeyboard(e) {
        const key = e.key.toUpperCase();
        const validKeys = ['A', 'B', 'C', 'D'];
        if(validKeys.includes(key)) {
            e.preventDefault();
            const buttons = document.querySelectorAll(".option-btn");
            const index = validKeys.indexOf(key);
            if(buttons[index]) {
                buttons[index].click();
            }
        }
    }
    
    // ========== فەنکشنە سەرەکییەکان ==========
    function loadCategories() {
        const stored = localStorage.getItem("categories");
        if(stored) {
            try {
                categories = JSON.parse(stored);
                console.log("داتا لە Local Storage خوێندرا:", categories);
            } catch(e) { console.error("هەڵە لە خوێندنەوەی داتا", e); categories = {}; }
        } else {
            console.log("هیچ داتایەک نەدۆزرایەوە!");
            categories = {};
        }
        const allCatNames = ["مێژوو","زانست","ئەدەبیات","هونەر","وەرزش","بیرکاری","تەکنەلۆژیا","تەندروستی","جوگرافیا","ئاینی","کوردستان","فیلم و دراما"];
        allCatNames.forEach(cat => { if(!categories[cat]) categories[cat] = []; });
        attachCategoryEvents();
        showImportButtonFor5Seconds();
    }
    
    function showImportButtonFor5Seconds() {
        const importContainer = document.getElementById("importContainer");
        importContainer.style.display = "flex";
        setTimeout(() => {
            importContainer.style.display = "none";
            document.getElementById("manualImportArea").style.display = "none";
        }, 5000);
    }
    
    function toggleManualImport() {
        const area = document.getElementById("manualImportArea");
        area.style.display = area.style.display === "none" ? "block" : "none";
    }
    
    function importFromFile() {
        const input = document.createElement("input");
        input.type = "file";
        input.accept = "application/json";
        input.onchange = function(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(evt) {
                try {
                    const imported = JSON.parse(evt.target.result);
                    applyImportedData(imported);
                } catch(err) { alert("❌ فایلەکە JSONی نادروستە! هەڵە: " + err.message); }
            };
            reader.readAsText(file);
        };
        input.click();
    }
    
    function importFromText() {
        const text = document.getElementById("jsonText").value.trim();
        if(!text) { alert("تکایە JSON ی پاشەکەوتکراو بلێکە!"); return; }
        try {
            const imported = JSON.parse(text);
            applyImportedData(imported);
        } catch(err) { alert("❌ دەقەکە JSONی نادروستە! هەڵە: " + err.message); }
    }
    
    function applyImportedData(imported) {
        const allCatNames = ["مێژوو","زانست","ئەدەبیات","هونەر","وەرزش","بیرکاری","تەکنەلۆژیا","تەندروستی","جوگرافیا","ئاینی","کوردستان","فیلم و دراما"];
        let success = false;
        for(let cat of allCatNames) {
            if(imported[cat] && Array.isArray(imported[cat])) {
                categories[cat] = imported[cat].slice(0,8);
                success = true;
            } else if(!categories[cat]) {
                categories[cat] = [];
            }
        }
        if(success) {
            localStorage.setItem("categories", JSON.stringify(categories));
            alert("✅ Import سەرکەوتوو بوو! لاپەڕە نوێ دەبێتەوە.");
            location.reload();
        } else {
            alert("❌ فایلەکە هیچ کەتەگۆرییەکی ناسراو تێدا نییە! پێکهاتەی JSON: " + Object.keys(imported).join(", "));
        }
    }
    
    function attachCategoryEvents() {
        document.querySelectorAll(".category-btn").forEach(btn => {
            btn.removeEventListener("click", handleCategoryClick);
            btn.addEventListener("click", handleCategoryClick);
        });
    }
    
    function handleCategoryClick(e) {
        const btn = e.currentTarget;
        const catName = btn.getAttribute("data-cat");
        clearAllCategoryGreen();
        btn.classList.add("category-btn-green");
        selectedCategoryBtn = btn;
    }
    
    function openCategory(catName) {
        currentCategory = catName;
        const questions = categories[catName] || [];
        let qHtml = "";
        for(let i=0;i<8;i++) {
            if(i < questions.length) qHtml += `<div class="question-number" onclick="selectQuestionWithMouse(${i})">${i+1}</div>`;
            else qHtml += `<div class="question-number" style="opacity:0.6; cursor:pointer;" onclick="alert('هیچ پرسیارێک نییە!')">${i+1}</div>`;
        }
        document.getElementById("questionsListDiv").innerHTML = `<h2 style="color:white;text-align:center;">${catName}</h2><div class="questions-grid">${qHtml}</div>`;
        document.getElementById("questionScreenDiv").style.display = "none";
        document.getElementById("questionsListDiv").style.display = "block";
        document.getElementById("questionModal").style.display = "block";
        isModalOpen = true;
        isInQuestionScreen = false;
        selectedQuestionDiv = null;
    }
    
    function selectQuestionWithMouse(index) {
        const questions = categories[currentCategory];
        if(!questions || index >= questions.length) { alert("هیچ پرسیارێک نییە!"); return; }
        selectQuestion(index);
    }
    
    function selectQuestion(index) {
        const questions = categories[currentCategory];
        if(!questions || index >= questions.length) { alert("هیچ پرسیارێک نییە!"); return; }
        if(timerInterval) clearInterval(timerInterval);
        currentQuestionIndex = index;
        timeLeft = 60; isAnswered = false;
        document.getElementById("questionsListDiv").style.display = "none";
        document.getElementById("questionScreenDiv").style.display = "block";
        isInQuestionScreen = true;
        startTimer();
        renderQuestion(questions[index]);
    }
    
    function startTimer() {
        if(timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if(!isAnswered && timeLeft>0) {
                timeLeft--;
                let td = document.getElementById("timerDisplay");
                if(td) td.innerText = `${timeLeft} چرکە`;
                if(timeLeft===0 && !isAnswered) {
                    clearInterval(timerInterval);
                    alert("کات تەواو بوو!");
                    showCorrectAnswer();
                    isAnswered=true;
                }
            } else if(timeLeft<=0) clearInterval(timerInterval);
        },1000);
    }
    
    function renderQuestion(q) {
        const letters=["A","B","C","D"];
        document.getElementById("questionScreenDiv").innerHTML = `
            <div class="question-screen">
                <div class="timer" id="timerDisplay">60 چرکە</div>
                <div class="question-text">${q.text}</div>
                <div class="options-grid" id="optionsGrid">
                    ${q.options.map((opt,idx)=>`<div class="option-btn" data-opt="${letters[idx]}" onclick="checkAnswer('${letters[idx]}','${q.correct}')">${letters[idx]}. ${opt}</div>`).join('')}
                </div>
            </div>`;
    }
    
    function checkAnswer(selected,correct) {
        if(isAnswered || timeLeft<=0) { alert("ناتوانیت وەڵام بدەیتەوە"); return; }
        isAnswered=true; clearInterval(timerInterval);
        const btns = document.querySelectorAll(".option-btn");
        btns.forEach(btn=>{ btn.style.pointerEvents="none"; if(btn.dataset.opt===correct) btn.classList.add("option-correct"); if(btn.dataset.opt===selected && selected!==correct) btn.classList.add("option-wrong"); });
        const question=categories[currentCategory][currentQuestionIndex];
        const correctText=question.options[correct.charCodeAt(0)-65];
        alert(selected===correct ? `✅ ڕاستە! ${correctText}` : `❌ هەڵەیە! وەڵامی ڕاست: ${correctText}`);
    }
    
    function showCorrectAnswer() {
        const q=categories[currentCategory][currentQuestionIndex];
        document.querySelectorAll(".option-btn").forEach(btn=>{ if(btn.dataset.opt===q.correct) btn.classList.add("option-correct"); });
        alert(`وەڵامی ڕاست: ${q.options[q.correct.charCodeAt(0)-65]}`);
    }
    
    function backToQuestions() {
        clearInterval(timerInterval);
        document.getElementById("questionScreenDiv").style.display="none";
        document.getElementById("questionsListDiv").style.display="block";
        currentQuestionIndex=null; isAnswered=false;
        isInQuestionScreen = false;
        selectedQuestionDiv = null;
    }
    
    function closeModal() {
        clearInterval(timerInterval);
        document.getElementById("questionModal").style.display="none";
        currentQuestionIndex=null; isAnswered=false;
        isModalOpen = false;
        isInQuestionScreen = false;
        selectedQuestionDiv = null;
        clearAllCategoryGreen();
    }
    
    loadCategories();
</script>
</body>
</html>
