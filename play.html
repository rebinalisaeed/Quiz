<!DOCTYPE html>
<html dir="rtl">
<head>
    <title>یاری پرسیار و وەڵام</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        @font-face { font-family: 'K24Kurdish'; src: url('K24KurdishBold-Bold.ttf') format('truetype'); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'K24Kurdish', 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); min-height: 100vh; padding: 30px 20px; display: flex; justify-content: center; align-items: center; position: relative; }
        .container { max-width: 900px; width: 100%; margin: auto; }
        .import-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 999; display: none; }
        .import-btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 50px; padding: 12px 25px; font-size: 16px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .row { display: flex; justify-content: center; gap: 25px; margin-bottom: 30px; flex-wrap: wrap; }
        .category-btn { background: rgba(255,255,255,0.1); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.25); border-radius: 20px; padding: 18px 25px; width: 180px; text-align: center; cursor: pointer; transition: all 0.3s ease; }
        .category-btn span { font-size: 24px; color: white; }
        @keyframes greenFlash { 0% { background: rgba(255,255,255,0.1); transform: scale(1); } 30% { background: #4CAF50; transform: scale(1.05); } 100% { background: rgba(255,255,255,0.1); transform: scale(1); } }
        .category-btn-animate { animation: greenFlash 0.6s ease forwards; }
        @media (max-width: 700px) { .category-btn { width: 100px; padding: 12px 10px; } .category-btn span { font-size: 18px; } }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; overflow-y: auto; padding: 20px; }
        .modal-content { max-width: 900px; margin: 20px auto; background: rgba(30,30,50,0.95); backdrop-filter: blur(15px); border-radius: 30px; padding: 30px; }
        .questions-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 30px 0; }
        .question-number { background: rgba(255,255,255,0.15); border-radius: 20px; padding: 25px 10px; text-align: center; font-size: 32px; color: white; cursor: pointer; border: 2px solid rgba(255,255,255,0.2); }
        .question-screen { text-align: center; }
        .timer { font-size: 52px; color: #ff6b6b; background: rgba(0,0,0,0.6); display: inline-block; padding: 10px 35px; border-radius: 60px; margin: 20px 0; }
        .question-text { font-size: 28px; color: white; margin: 30px 0; padding: 25px; background: rgba(0,0,0,0.4); border-radius: 25px; }
        .options-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin: 30px 0; }
        .option-btn { background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3); border-radius: 20px; padding: 18px; font-size: 18px; color: white; cursor: pointer; text-align: center; }
        .option-correct { background: #4CAF50 !important; }
        .option-wrong { background: #f44336 !important; }
        .close-btn, .back-btn { background: #ff6b6b; color: white; border: none; padding: 12px 30px; border-radius: 30px; cursor: pointer; margin: 10px; }
        .back-btn { background: #4CAF50; }
        @media (max-width: 700px) { .question-number { font-size: 22px; } .question-text { font-size: 18px; } .option-btn { font-size: 13px; } .timer { font-size: 36px; } }
    </style>
</head>
<body>
<div class="import-container" id="importContainer"><button class="import-btn" onclick="importData()">📥 Import کردن پرسیارەکان</button></div>
<div class="container">
    <div class="row"><div class="category-btn" data-cat="مێژوو"><span>مێژوو</span></div><div class="category-btn" data-cat="زانست"><span>زانست</span></div><div class="category-btn" data-cat="ئەدەبیات"><span>ئەدەبیات</span></div></div>
    <div class="row"><div class="category-btn" data-cat="هونەر"><span>هونەر</span></div><div class="category-btn" data-cat="وەرزش"><span>وەرزش</span></div><div class="category-btn" data-cat="بیرکاری"><span>بیرکاری</span></div></div>
    <div class="row"><div class="category-btn" data-cat="تەکنەلۆژیا"><span>تەکنەلۆژیا</span></div><div class="category-btn" data-cat="تەندروستی"><span>تەندروستی</span></div><div class="category-btn" data-cat="جوگرافیا"><span>جوگرافیا</span></div></div>
    <div class="row"><div class="category-btn" data-cat="ئاینی"><span>ئاینی</span></div><div class="category-btn" data-cat="کوردستان"><span>کوردستان</span></div><div class="category-btn" data-cat="فیلم و دراما"><span>فیلم و دراما</span></div></div>
</div>
<div id="questionModal" class="modal"><div class="modal-content"><div id="questionsListDiv"></div><div id="questionScreenDiv" style="display:none;"></div><div style="text-align:center;"><button class="close-btn" onclick="closeModal()">🔙 گەڕانەوە</button></div></div></div>

<script>
    let categories = {};
    let currentCategory = "";
    let currentQuestionIndex = null, timerInterval = null, timeLeft = 60, isAnswered = false;
    
    document.addEventListener('contextmenu', e => e.preventDefault());
    window.addEventListener('keydown', e => { if(e.key === 'F5' || (e.ctrlKey && e.key === 'r') || (e.metaKey && e.key === 'r')) e.preventDefault(); });
    
    function loadCategories() {
        const stored = localStorage.getItem("categories");
        if(stored) {
            categories = JSON.parse(stored);
            console.log("داتا لە Local Storage خوێندرا:", categories);
        } else {
            console.log("هیچ داتایەک نەدۆزرایەوە!");
            categories = {};
        }
        const allCatNames = ["مێژوو","زانست","ئەدەبیات","هونەر","وەرزش","بیرکاری","تەکنەلۆژیا","تەندروستی","جوگرافیا","ئاینی","کوردستان","فیلم و دراما"];
        allCatNames.forEach(cat => { if(!categories[cat]) categories[cat] = []; });
        attachCategoryEvents();
        showImportButtonFor30Seconds();
    }
    
    function showImportButtonFor30Seconds() {
        const importContainer = document.getElementById("importContainer");
        importContainer.style.display = "block";
        let seconds = 30;
        const btn = document.querySelector(".import-btn");
        const originalText = btn.innerText;
        const interval = setInterval(() => {
            seconds--;
            if(seconds <= 0) { clearInterval(interval); importContainer.style.display = "none"; btn.innerText = originalText; }
            else btn.innerText = `📥 Import (${seconds})`;
        }, 1000);
    }
    
    function importData() {
        const input = document.createElement("input");
        input.type = "file";
        input.accept = "application/json";
        input.onchange = function(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(evt) {
                try {
                    const imported = JSON.parse(evt.target.result);
                    const allCatNames = ["مێژوو","زانست","ئەدەبیات","هونەر","وەرزش","بیرکاری","تەکنەلۆژیا","تەندروستی","جوگرافیا","ئاینی","کوردستان","فیلم و دراما"];
                    allCatNames.forEach(cat => {
                        if(imported[cat] && Array.isArray(imported[cat])) categories[cat] = imported[cat].slice(0,8);
                        else if(!categories[cat]) categories[cat] = [];
                    });
                    localStorage.setItem("categories", JSON.stringify(categories));
                    alert("✅ Import سەرکەوتوو بوو!");
                    location.reload();
                } catch(err) { alert("❌ فایلەکە نادروستە"); }
            };
            reader.readAsText(file);
        };
        input.click();
    }
    
    function attachCategoryEvents() {
        document.querySelectorAll(".category-btn").forEach(btn => {
            btn.removeEventListener("click", handleCategoryClick);
            btn.addEventListener("click", handleCategoryClick);
        });
    }
    
    function handleCategoryClick(e) {
        const btn = e.currentTarget;
        const catName = btn.getAttribute("data-cat");
        btn.classList.add("category-btn-animate");
        setTimeout(() => {
            btn.classList.remove("category-btn-animate");
            openCategory(catName);
        }, 600);
    }
    
    function openCategory(catName) {
        currentCategory = catName;
        const questions = categories[catName] || [];
        let qHtml = "";
        for(let i=0;i<8;i++) {
            if(i < questions.length) qHtml += `<div class="question-number" onclick="selectQuestion(${i})">${i+1}</div>`;
            else qHtml += `<div class="question-number" style="opacity:0.6; cursor:pointer;" onclick="alert('هیچ پرسیارێک نییە!')">${i+1}</div>`;
        }
        document.getElementById("questionsListDiv").innerHTML = `<h2 style="color:white;text-align:center;">${catName}</h2><div class="questions-grid">${qHtml}</div>`;
        document.getElementById("questionScreenDiv").style.display = "none";
        document.getElementById("questionsListDiv").style.display = "block";
        document.getElementById("questionModal").style.display = "block";
    }
    
    function selectQuestion(index) {
        const questions = categories[currentCategory];
        if(!questions || index >= questions.length) { alert("هیچ پرسیارێک نییە!"); return; }
        if(timerInterval) clearInterval(timerInterval);
        currentQuestionIndex = index;
        timeLeft = 60; isAnswered = false;
        document.getElementById("questionsListDiv").style.display = "none";
        document.getElementById("questionScreenDiv").style.display = "block";
        startTimer();
        renderQuestion(questions[index]);
    }
    
    function startTimer() {
        if(timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if(!isAnswered && timeLeft>0) {
                timeLeft--;
                let td = document.getElementById("timerDisplay");
                if(td) td.innerText = `${timeLeft} چرکە`;
                if(timeLeft===0 && !isAnswered) {
                    clearInterval(timerInterval);
                    alert("کات تەواو بوو!");
                    showCorrectAnswer();
                    isAnswered=true;
                }
            } else if(timeLeft<=0) clearInterval(timerInterval);
        },1000);
    }
    
    function renderQuestion(q) {
        const letters=["A","B","C","D"];
        document.getElementById("questionScreenDiv").innerHTML = `
            <div class="question-screen">
                <div class="timer" id="timerDisplay">60 چرکە</div>
                <div class="question-text">${q.text}</div>
                <div class="options-grid" id="optionsGrid">
                    ${q.options.map((opt,idx)=>`<div class="option-btn" data-opt="${letters[idx]}" onclick="checkAnswer('${letters[idx]}','${q.correct}')">${letters[idx]}. ${opt}</div>`).join('')}
                </div>
                <button class="back-btn" onclick="backToQuestions()">🔙 گەڕانەوە</button>
            </div>`;
    }
    
    function checkAnswer(selected,correct) {
        if(isAnswered || timeLeft<=0) { alert("ناتوانیت وەڵام بدەیتەوە"); return; }
        isAnswered=true; clearInterval(timerInterval);
        const btns = document.querySelectorAll(".option-btn");
        btns.forEach(btn=>{ btn.style.pointerEvents="none"; if(btn.dataset.opt===correct) btn.classList.add("option-correct"); if(btn.dataset.opt===selected && selected!==correct) btn.classList.add("option-wrong"); });
        const question=categories[currentCategory][currentQuestionIndex];
        const correctText=question.options[correct.charCodeAt(0)-65];
        alert(selected===correct ? `✅ ڕاستە! ${correctText}` : `❌ هەڵەیە! وەڵامی ڕاست: ${correctText}`);
    }
    
    function showCorrectAnswer() {
        const q=categories[currentCategory][currentQuestionIndex];
        document.querySelectorAll(".option-btn").forEach(btn=>{ if(btn.dataset.opt===q.correct) btn.classList.add("option-correct"); });
        alert(`وەڵامی ڕاست: ${q.options[q.correct.charCodeAt(0)-65]}`);
    }
    
    function backToQuestions() { clearInterval(timerInterval); document.getElementById("questionScreenDiv").style.display="none"; document.getElementById("questionsListDiv").style.display="block"; currentQuestionIndex=null; isAnswered=false; }
    function closeModal() { clearInterval(timerInterval); document.getElementById("questionModal").style.display="none"; currentQuestionIndex=null; isAnswered=false; }
    
    loadCategories();
</script>
</body>
</html>
