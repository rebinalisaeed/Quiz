<!DOCTYPE html>
<html dir="rtl">
<head>
    <title>یاری پرسیار و وەڵام - یاریکەر</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @font-face { font-family: 'K24Kurdish'; src: url('K24KurdishBold-Bold.ttf') format('truetype'); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'K24Kurdish', 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .waiting-container { text-align: center; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 30px; padding: 40px 20px; width: 100%; max-width: 400px; }
        .waiting-message { color: #ff9800; font-size: 24px; margin-bottom: 20px; }
        .waiting-sub { color: rgba(255,255,255,0.7); font-size: 16px; }
        .question-container { width: 100%; max-width: 500px; margin: auto; }
        .timer { font-size: 48px; color: #ff6b6b; background: rgba(0,0,0,0.6); display: inline-block; padding: 8px 25px; border-radius: 50px; margin: 10px 0; font-family: monospace; text-align: center; width: 100%; }
        .question-text { font-size: 22px; color: white; margin: 20px 0; padding: 20px; background: rgba(0,0,0,0.4); border-radius: 20px; text-align: center; }
        .options-container { display: flex; flex-direction: column; gap: 12px; margin: 20px 0; }
        .option-btn { background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3); border-radius: 15px; padding: 14px 18px; font-size: 18px; color: white; cursor: pointer; text-align: center; width: 100%; }
        .option-btn-orange { background: #ff9800 !important; }
        .option-correct { background: #4CAF50 !important; }
        .option-wrong { background: #f44336 !important; }
        @media (max-width: 600px) { .timer { font-size: 40px; } .question-text { font-size: 18px; } .option-btn { font-size: 16px; padding: 12px 16px; } }
    </style>
</head>
<body>
<div id="waitingContainer" class="waiting-container">
    <div class="waiting-message">⏳ چاوەڕوان بە...</div>
    <div class="waiting-sub">پێشکەشکار پرسیاری داهاتوو هەڵدەبژێرێت</div>
</div>
<div id="questionContainer" class="question-container" style="display:none;"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCtiW-RBMY0emCOFZdQCA7ynPESraUknxI",
        authDomain: "quizgamerebin.firebaseapp.com",
        databaseURL: "https://quizgamerebin-default-rtdb.firebaseio.com",
        projectId: "quizgamerebin",
        storageBucket: "quizgamerebin.firebasestorage.app",
        messagingSenderId: "312376681830",
        appId: "1:312376681830:web:11262fa62cc9246bac14a7"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    const ROOM_ID = "quiz_room_main";
    let timerInterval = null;
    let timeLeft = 30;
    let isAnswered = false;
    let currentCorrectAnswer = null;
    let selectedAnswerBtn = null;
    let currentUser = JSON.parse(localStorage.getItem("loggedInUser") || "{}");
    let playerId = currentUser.username;
    let isReady = false;
    let myEliminated = false;
    let hasAnswered = false;
    
    if(!currentUser.username) window.location.href = "index.html";
    
    async function registerPlayer() {
        const userSnapshot = await database.ref(`${ROOM_ID}/users/${currentUser.username}`).once('value');
        const userData = userSnapshot.val();
        const group = userData?.group || "group1";
        
        await database.ref(`${ROOM_ID}/activePlayers/${playerId}`).set({
            username: currentUser.username,
            group: group,
            joinedAt: Date.now(),
            currentAnswer: null,
            score: 5,
            eliminated: false
        });
        isReady = true;
        console.log("✅ یاریکەر تۆمار کرا:", playerId);
    }
    
    database.ref(`${ROOM_ID}/activePlayers/${playerId}/eliminated`).on('value', (snapshot) => {
        myEliminated = snapshot.val() === true;
        if(myEliminated) {
            if(timerInterval) clearInterval(timerInterval);
            document.getElementById("questionContainer").style.display = "none";
            document.getElementById("waitingContainer").style.display = "block";
            document.querySelector(".waiting-message").innerHTML = "❌ دەرکرایت!";
            document.querySelector(".waiting-sub").innerHTML = "خاڵەکانت بە 0 گەیشتن";
        }
    });
    
    window.addEventListener("beforeunload", () => {
        database.ref(`${ROOM_ID}/activePlayers/${playerId}`).remove();
    });
    
    database.ref(`${ROOM_ID}/activeQuestion`).on('value', (snapshot) => {
        if(myEliminated) return;
        const data = snapshot.val();
        if(isReady && data && data.question) {
            // ڕێگەدان بە پرسیاری نوێ تەنها ئەگەر وەڵام نەدرابێت
            hasAnswered = false;
            database.ref(`${ROOM_ID}/activePlayers/${playerId}/currentAnswer`).remove();
            showQuestion(data.question, data.correct);
        }
    });
    
    function showQuestion(question, correctAnswer) {
        if(myEliminated) return;
        if(timerInterval) clearInterval(timerInterval);
        
        currentCorrectAnswer = correctAnswer;
        isAnswered = false;
        selectedAnswerBtn = null;
        
        document.getElementById("waitingContainer").style.display = "none";
        document.getElementById("questionContainer").style.display = "block";
        
        const container = document.getElementById("questionContainer");
        container.innerHTML = `
            <div class="timer" id="timerDisplay">30</div>
            <div class="question-text">${question.text}</div>
            <div class="options-container">
                ${question.options.map((opt, idx) => `
                    <div class="option-btn" data-opt="${String.fromCharCode(65+idx)}" onclick="selectAnswer('${String.fromCharCode(65+idx)}')">
                        ${String.fromCharCode(65+idx)}. ${opt}
                    </div>
                `).join('')}
            </div>
        `;
        startTimer();
    }
    
    function startTimer() {
        timeLeft = 30;
        timerInterval = setInterval(() => {
            if(!isAnswered && timeLeft > 0) {
                timeLeft--;
                let td = document.getElementById("timerDisplay");
                if(td) td.innerText = `${timeLeft}`;
                if(timeLeft === 0 && !isAnswered && !hasAnswered) {
                    clearInterval(timerInterval);
                    // تەنها ئەگەر وەڵام نەدرابێت، NO_ANSWER بنێرە
                    database.ref(`${ROOM_ID}/activePlayers/${playerId}/currentAnswer`).set("NO_ANSWER");
                    const btns = document.querySelectorAll(".option-btn");
                    btns.forEach(btn => btn.style.pointerEvents = "none");
                    setTimeout(() => {
                        document.getElementById("questionContainer").style.display = "none";
                        document.getElementById("waitingContainer").style.display = "block";
                    }, 2000);
                }
            }
        }, 1000);
    }
    
    function selectAnswer(letter) {
        if(isAnswered || myEliminated) return;
        if(selectedAnswerBtn) selectedAnswerBtn.classList.remove("option-btn-orange");
        const btns = document.querySelectorAll(".option-btn");
        for(let btn of btns) {
            if(btn.getAttribute("data-opt") === letter) {
                btn.classList.add("option-btn-orange");
                selectedAnswerBtn = btn;
                break;
            }
        }
    }
    
    function submitAnswer(selectedLetter) {
        if(isAnswered || myEliminated || hasAnswered) return;
        isAnswered = true;
        hasAnswered = true;
        clearInterval(timerInterval);
        
        console.log("📤 ناردنی وەڵام:", selectedLetter, "بۆ یاریکەر:", playerId);
        database.ref(`${ROOM_ID}/activePlayers/${playerId}/currentAnswer`).set(selectedLetter);
        
        const btns = document.querySelectorAll(".option-btn");
        btns.forEach(btn => {
            btn.style.pointerEvents = "none";
            if(btn.getAttribute("data-opt") === currentCorrectAnswer) btn.classList.add("option-correct");
            if(btn.getAttribute("data-opt") === selectedLetter && selectedLetter !== currentCorrectAnswer) btn.classList.add("option-wrong");
            btn.classList.remove("option-btn-orange");
        });
        
        setTimeout(() => {
            document.getElementById("questionContainer").style.display = "none";
            document.getElementById("waitingContainer").style.display = "block";
        }, 2000);
    }
    
    document.addEventListener('keydown', (e) => {
        if(myEliminated) return;
        if(document.getElementById("questionContainer").style.display === "block") {
            const key = e.key.toUpperCase();
            if(['A','B','C','D'].includes(key) && !isAnswered && !hasAnswered) {
                e.preventDefault();
                selectAnswer(key);
            }
            if(e.key === 'Enter' && selectedAnswerBtn && !isAnswered && !hasAnswered) {
                e.preventDefault();
                submitAnswer(selectedAnswerBtn.getAttribute("data-opt"));
            }
        }
    });
    
    registerPlayer();
</script>
</body>
</html>
