<!DOCTYPE html>
<html dir="rtl">
<head>
    <title>یاری پرسیار و وەڵام - گروپەکان</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: auto;
        }
        
        /* سەرنووسە */
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        /* کەتەگۆرییەکان */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }
        
        .category-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border-radius: 25px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
        }
        
        .category-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .category-card h2 {
            color: white;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .category-card p {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
        }
        
        /* پەڕەی پرسیارەکان (شێوەی مۆدال) */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            overflow-y: auto;
            padding: 20px;
        }
        
        .modal-content {
            max-width: 900px;
            margin: 20px auto;
            background: rgba(30,30,50,0.95);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .questions-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin: 30px 0;
        }
        
        .question-number {
            background: rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 25px 10px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid rgba(255,255,255,0.2);
        }
        
        .question-number:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.05);
        }
        
        /* شاشەی پرسیار */
        .question-screen {
            text-align: center;
        }
        
        .timer {
            font-size: 48px;
            font-weight: bold;
            color: #ff6b6b;
            background: rgba(0,0,0,0.5);
            display: inline-block;
            padding: 10px 30px;
            border-radius: 50px;
            margin: 20px 0;
        }
        
        .question-text {
            font-size: 28px;
            color: white;
            margin: 30px 0;
            padding: 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
        }
        
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 30px 0;
        }
        
        .option-btn {
            background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 20px;
            padding: 20px;
            font-size: 18px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        
        .option-btn:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .option-correct {
            background: #4CAF50 !important;
            border-color: #2e7d32 !important;
        }
        
        .option-wrong {
            background: #f44336 !important;
            border-color: #c62828 !important;
        }
        
        .close-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
        
        .back-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
        }
        
        @media (max-width: 700px) {
            .questions-grid { grid-template-columns: repeat(4, 1fr); gap: 10px; }
            .question-number { padding: 15px 5px; font-size: 20px; }
            .question-text { font-size: 20px; }
            .option-btn { padding: 12px; font-size: 14px; }
            .options-grid { gap: 10px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🎯 یاری پرسیار و وڵام 🎯</h1>
        <p>کەتەگۆریەکە هەڵبژێرە بۆ دەستپێکردن</p>
    </div>
    
    <div class="categories-grid" id="categoriesGrid"></div>
</div>

<div id="questionModal" class="modal">
    <div class="modal-content">
        <div id="questionsListDiv"></div>
        <div id="questionScreenDiv" style="display:none;"></div>
        <button class="close-btn" onclick="closeModal()">🔙 گەڕانەوە بۆ کەتەگۆرییەکان</button>
    </div>
</div>

<script>
    let categories = {};
    let currentCategory = "";
    let currentQuestionIndex = null;
    let timerInterval = null;
    let timeLeft = 60;
    let isAnswered = false;
    
    function loadCategories() {
        const stored = localStorage.getItem("categories");
        if(stored) {
            categories = JSON.parse(stored);
        } else {
            // پرسیاری نموونەیی بۆ دەستپێک ئەگەر هیچ پرسیارێک نەبێت
            categories = {
                "وەرزش": [
                    { text: "کام یانە نازناوی خولی ئینگلیزی بردووە؟", options: ["ڕیال مەدرید", "بایەرن میونشن", "لیڤەرپوول", "ئەرسینال"], correct: "C" }
                ],
                "جوگرافیا": [
                    { text: "پایتەختی فەرەنسا کام شارەیە؟", options: ["بەرلین", "مەدرید", "پاریس", "ڕۆما"], correct: "C" }
                ]
            };
        }
        renderCategories();
    }
    
    function renderCategories() {
        const grid = document.getElementById("categoriesGrid");
        grid.innerHTML = "";
        for(let cat in categories) {
            const card = document.createElement("div");
            card.className = "category-card";
            card.onclick = () => openCategory(cat);
            card.innerHTML = `<h2>📁 ${cat}</h2><p>${categories[cat].length} پرسیار</p>`;
            grid.appendChild(card);
        }
        if(Object.keys(categories).length === 0) {
            grid.innerHTML = "<p style='color:white;text-align:center'>هیچ کەتەگۆرییەک نییە. تکایە لە پەڕەی بەڕێوەبردن پرسیارەکان زیاد بکە.</p>";
        }
    }
    
    function openCategory(catName) {
        currentCategory = catName;
        const questions = categories[catName];
        if(!questions || questions.length === 0) {
            alert("هیچ پرسیارێک لەم کەتەگۆرییەدا نییە!");
            return;
        }
        
        document.getElementById("questionsListDiv").innerHTML = `
            <h2 style="color:white;text-align:center">📂 ${catName}</h2>
            <div class="questions-grid">
                ${questions.map((q, idx) => `<div class="question-number" onclick="selectQuestion(${idx})">${idx+1}</div>`).join('')}
            </div>
        `;
        document.getElementById("questionScreenDiv").style.display = "none";
        document.getElementById("questionsListDiv").style.display = "block";
        document.getElementById("questionModal").style.display = "block";
    }
    
    function selectQuestion(index) {
        if(timerInterval) clearInterval(timerInterval);
        currentQuestionIndex = index;
        const question = categories[currentCategory][index];
        timeLeft = 60;
        isAnswered = false;
        
        document.getElementById("questionsListDiv").style.display = "none";
        document.getElementById("questionScreenDiv").style.display = "block";
        
        startTimer();
        renderQuestion(question);
    }
    
    function startTimer() {
        const timerDiv = document.getElementById("timerDisplay");
        if(timerInterval) clearInterval(timerInterval);
        
        timerInterval = setInterval(() => {
            if(!isAnswered && timeLeft > 0) {
                timeLeft--;
                if(timerDiv) timerDiv.innerText = `${timeLeft} چرکە`;
                
                if(timeLeft === 0) {
                    clearInterval(timerInterval);
                    if(!isAnswered) {
                        alert("کات تەواو بوو! وەڵامە ڕاستەکە ئاشکرا دەکرێت");
                        showCorrectAnswer();
                        isAnswered = true;
                    }
                }
            } else if(timeLeft <= 0) {
                clearInterval(timerInterval);
            }
        }, 1000);
    }
    
    function renderQuestion(question) {
        const letters = ["A", "B", "C", "D"];
        const screenDiv = document.getElementById("questionScreenDiv");
        screenDiv.innerHTML = `
            <div class="question-screen">
                <div class="timer" id="timerDisplay">60 چرکە</div>
                <div class="question-text">❓ ${question.text}</div>
                <div class="options-grid" id="optionsGrid">
                    ${question.options.map((opt, idx) => `
                        <div class="option-btn" data-opt="${letters[idx]}" onclick="checkAnswer('${letters[idx]}', '${question.correct}')">
                            ${letters[idx]}. ${opt}
                        </div>
                    `).join('')}
                </div>
                <button class="back-btn" onclick="backToQuestions()">🔙 گەڕانەوە بۆ لیستی پرسیارەکان</button>
            </div>
        `;
    }
    
    function checkAnswer(selected, correct) {
        if(isAnswered) {
            alert("پێشتر وەڵامت داوەتەوە!");
            return;
        }
        if(timeLeft <= 0) {
            alert("کات تەواو بووە!");
            return;
        }
        
        isAnswered = true;
        if(timerInterval) clearInterval(timerInterval);
        
        const buttons = document.querySelectorAll(".option-btn");
        buttons.forEach(btn => {
            btn.style.pointerEvents = "none";
            if(btn.getAttribute("data-opt") === correct) {
                btn.classList.add("option-correct");
            }
            if(btn.getAttribute("data-opt") === selected && selected !== correct) {
                btn.classList.add("option-wrong");
            }
        });
        
        if(selected === correct) {
            alert("✅ وەڵامەکە ڕاستە! +1 خاڵ بۆ گروپەکەت");
        } else {
            const correctText = categories[currentCategory][currentQuestionIndex].options[correct.charCodeAt(0)-65];
            alert(`❌ وەڵامەکە هەڵەیە! وەڵامی ڕاست: ${correctText}`);
        }
    }
    
    function showCorrectAnswer() {
        const question = categories[currentCategory][currentQuestionIndex];
        const buttons = document.querySelectorAll(".option-btn");
        buttons.forEach(btn => {
            btn.style.pointerEvents = "none";
            if(btn.getAttribute("data-opt") === question.correct) {
                btn.classList.add("option-correct");
            }
        });
        alert(`کات تەواو بوو! وەڵامی ڕاست: ${question.options[question.correct.charCodeAt(0)-65]}`);
    }
    
    function backToQuestions() {
        if(timerInterval) clearInterval(timerInterval);
        document.getElementById("questionScreenDiv").style.display = "none";
        document.getElementById("questionsListDiv").style.display = "block";
        currentQuestionIndex = null;
        isAnswered = false;
    }
    
    function closeModal() {
        if(timerInterval) clearInterval(timerInterval);
        document.getElementById("questionModal").style.display = "none";
        currentQuestionIndex = null;
        isAnswered = false;
    }
    
    loadCategories();
</script>
</body>
</html>
