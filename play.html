<!DOCTYPE html>
<html dir="rtl">
<head>
    <title>یاری پرسیار و وەڵام - هەڵبژاردنی کەتەگۆری</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        @font-face {
            font-family: 'K24Kurdish';
            src: url('K24KurdishBold-Bold.ttf') format('truetype');
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'K24Kurdish', 'Segoe UI', Tahoma, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            max-width: 900px;
            width: 100%;
            margin: auto;
        }
        
        /* ڕیزەکانی دوگمەکان */
        .row {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        /* دوگمەی کەتەگۆری */
        .category-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 20px;
            padding: 18px 25px;
            width: 180px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .category-btn span {
            font-size: 20px;
            font-weight: normal;
            color: white;
            letter-spacing: 1px;
        }
        
        .category-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        
        /* وەڵامدانەوە بۆ مۆبایل */
        @media (max-width: 700px) {
            .row {
                gap: 15px;
                margin-bottom: 20px;
            }
            .category-btn {
                width: 100px;
                padding: 12px 10px;
            }
            .category-btn span {
                font-size: 14px;
            }
        }
        
        @media (max-width: 480px) {
            .category-btn {
                width: 85px;
                padding: 10px 5px;
            }
            .category-btn span {
                font-size: 12px;
            }
        }
        
        /* مۆدالی پرسیارەکان (هەمان شێوەی پێشوو) */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            overflow-y: auto;
            padding: 20px;
        }
        
        .modal-content {
            max-width: 900px;
            margin: 20px auto;
            background: rgba(30,30,50,0.95);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .questions-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin: 30px 0;
        }
        
        .question-number {
            background: rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 25px 10px;
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid rgba(255,255,255,0.2);
        }
        
        .question-number:hover {
            background: rgba(255,255,255,0.35);
            transform: scale(1.05);
        }
        
        .question-screen {
            text-align: center;
        }
        
        .timer {
            font-size: 52px;
            font-weight: bold;
            color: #ff6b6b;
            background: rgba(0,0,0,0.6);
            display: inline-block;
            padding: 10px 35px;
            border-radius: 60px;
            margin: 20px 0;
            font-family: monospace;
        }
        
        .question-text {
            font-size: 28px;
            color: white;
            margin: 30px 0;
            padding: 25px;
            background: rgba(0,0,0,0.4);
            border-radius: 25px;
            line-height: 1.5;
        }
        
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 30px 0;
        }
        
        .option-btn {
            background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 20px;
            padding: 18px;
            font-size: 18px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        
        .option-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.02);
        }
        
        .option-correct {
            background: #4CAF50 !important;
            border-color: #2e7d32 !important;
            animation: pulse 0.5s;
        }
        
        .option-wrong {
            background: #f44336 !important;
            border-color: #c62828 !important;
            animation: shake 0.3s;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .close-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }
        
        .close-btn:hover {
            background: #ff5252;
            transform: scale(1.02);
        }
        
        .back-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
            transition: 0.3s;
        }
        
        .back-btn:hover {
            background: #45a049;
            transform: scale(1.02);
        }
        
        @media (max-width: 700px) {
            .questions-grid { grid-template-columns: repeat(4, 1fr); gap: 10px; }
            .question-number { padding: 15px 5px; font-size: 22px; }
            .question-text { font-size: 18px; padding: 15px; }
            .option-btn { padding: 12px; font-size: 13px; }
            .options-grid { gap: 10px; }
            .timer { font-size: 36px; padding: 5px 25px; }
        }
        
        .empty-state {
            text-align: center;
            color: white;
            padding: 50px;
            background: rgba(255,255,255,0.1);
            border-radius: 30px;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- ڕیزی یەکەم: مێژوو، زانست، ئەدەبیات -->
    <div class="row">
        <div class="category-btn" data-cat="مێژوو">
            <span>مێژوو</span>
        </div>
        <div class="category-btn" data-cat="زانست">
            <span>زانست</span>
        </div>
        <div class="category-btn" data-cat="ئەدەبیات">
            <span>ئەدەبیات</span>
        </div>
    </div>
    
    <!-- ڕیزی دووەم: هونەر، وەرزش، بیرکاری -->
    <div class="row">
        <div class="category-btn" data-cat="هونەر">
            <span>هونەر</span>
        </div>
        <div class="category-btn" data-cat="وەرزش">
            <span>وەرزش</span>
        </div>
        <div class="category-btn" data-cat="بیرکاری">
            <span>بیرکاری</span>
        </div>
    </div>
    
    <!-- ڕیزی سێیەم: تەکنەلۆژیا، تەندروستی، جوگرافیا -->
    <div class="row">
        <div class="category-btn" data-cat="تەکنەلۆژیا">
            <span>تەکنەلۆژیا</span>
        </div>
        <div class="category-btn" data-cat="تەندروستی">
            <span>تەندروستی</span>
        </div>
        <div class="category-btn" data-cat="جوگرافیا">
            <span>جوگرافیا</span>
        </div>
    </div>
    
    <!-- ڕیزی چوارەم: ئاینی، کوردستان، فیلم و دراما -->
    <div class="row">
        <div class="category-btn" data-cat="ئاینی">
            <span>ئاینی</span>
        </div>
        <div class="category-btn" data-cat="کوردستان">
            <span>کوردستان</span>
        </div>
        <div class="category-btn" data-cat="فیلم و دراما">
            <span>فیلم و دراما</span>
        </div>
    </div>
</div>

<!-- مۆدالی پرسیارەکان -->
<div id="questionModal" class="modal">
    <div class="modal-content">
        <div id="questionsListDiv"></div>
        <div id="questionScreenDiv" style="display:none;"></div>
        <div style="text-align:center;">
            <button class="close-btn" onclick="closeModal()">🔙 گەڕانەوە بۆ کەتەگۆرییەکان</button>
        </div>
    </div>
</div>

<script>
    let categories = {};
    let currentCategory = "";
    let currentQuestionIndex = null;
    let timerInterval = null;
    let timeLeft = 60;
    let isAnswered = false;
    
    // بارکردنی کەتەگۆری و پرسیارەکان لە Local Storage
    function loadCategories() {
        const stored = localStorage.getItem("categories");
        if(stored) {
            categories = JSON.parse(stored);
        } else {
            // داتای بەتاڵ
            categories = {};
        }
        
        // زیادکردنی کەتەگۆریەکان ئەگەر بوونیان نەبوو (بەتاڵ)
        const allCatNames = ["مێژوو", "زانست", "ئەدەبیات", "هونەر", "وەرزش", "بیرکاری", "تەکنەلۆژیا", "تەندروستی", "جوگرافیا", "ئاینی", "کوردستان", "فیلم و دراما"];
        allCatNames.forEach(cat => {
            if(!categories[cat]) {
                categories[cat] = [];
            }
        });
        
        // ئەگەر هیچ پرسیارێک نەبوو، پەیامێک نیشان بدە (بەڵام بە دوگمەکانەوە)
        attachCategoryEvents();
    }
    
    // بەستنەوەی ڕووداوەکان بۆ هەموو دوگمەکانی کەتەگۆری
    function attachCategoryEvents() {
        const btns = document.querySelectorAll(".category-btn");
        btns.forEach(btn => {
            btn.removeEventListener("click", handleCategoryClick);
            btn.addEventListener("click", handleCategoryClick);
        });
    }
    
    function handleCategoryClick(e) {
        const catName = e.currentTarget.getAttribute("data-cat");
        openCategory(catName);
    }
    
    // کردنەوەی کەتەگۆری و نمایشکردنی ژمارە 1 تا 8
    function openCategory(catName) {
        currentCategory = catName;
        const questions = categories[catName];
        
        if(!questions || questions.length === 0) {
            alert(`هیچ پرسیارێک لە کەتەگۆری ${catName} دا نییە! تکایە یەکەم پرسیار زیاد بکە.`);
            return;
        }
        
        let questionsHtml = "";
        for(let i = 0; i < 8; i++) {
            if(i < questions.length) {
                questionsHtml += `<div class="question-number" onclick="selectQuestion(${i})">${i+1}</div>`;
            } else {
                questionsHtml += `<div class="question-number" style="opacity:0.4; cursor:not-allowed;">${i+1}</div>`;
            }
        }
        
        document.getElementById("questionsListDiv").innerHTML = `
            <h2 style="color:white;text-align:center;margin-bottom:20px;">📂 ${catName}</h2>
            <p style="color:rgba(255,255,255,0.7);text-align:center;margin-bottom:15px;">ژمارەیەک هەڵبژێرە بۆ بینینی پرسیارەکە</p>
            <div class="questions-grid">
                ${questionsHtml}
            </div>
        `;
        
        document.getElementById("questionScreenDiv").style.display = "none";
        document.getElementById("questionsListDiv").style.display = "block";
        document.getElementById("questionModal").style.display = "block";
    }
    
    function selectQuestion(index) {
        if(timerInterval) clearInterval(timerInterval);
        
        const questions = categories[currentCategory];
        if(index >= questions.length) return;
        
        currentQuestionIndex = index;
        const question = questions[index];
        timeLeft = 60;
        isAnswered = false;
        
        document.getElementById("questionsListDiv").style.display = "none";
        document.getElementById("questionScreenDiv").style.display = "block";
        
        startTimer();
        renderQuestion(question);
    }
    
    function startTimer() {
        const timerDiv = document.getElementById("timerDisplay");
        if(timerInterval) clearInterval(timerInterval);
        
        timerInterval = setInterval(() => {
            if(!isAnswered && timeLeft > 0) {
                timeLeft--;
                if(timerDiv) timerDiv.innerText = `${timeLeft} چرکە`;
                
                if(timeLeft === 0) {
                    clearInterval(timerInterval);
                    if(!isAnswered) {
                        alert("⏰ کات تەواو بوو! وەڵامە ڕاستەکە ئاشکرا دەکرێت");
                        showCorrectAnswer();
                        isAnswered = true;
                    }
                }
            } else if(timeLeft <= 0) {
                clearInterval(timerInterval);
            }
        }, 1000);
    }
    
    function renderQuestion(question) {
        const letters = ["A", "B", "C", "D"];
        const screenDiv = document.getElementById("questionScreenDiv");
        screenDiv.innerHTML = `
            <div class="question-screen">
                <div class="timer" id="timerDisplay">60 چرکە</div>
                <div class="question-text">❓ ${question.text}</div>
                <div class="options-grid" id="optionsGrid">
                    ${question.options.map((opt, idx) => `
                        <div class="option-btn" data-opt="${letters[idx]}" onclick="checkAnswer('${letters[idx]}', '${question.correct}')">
                            ${letters[idx]}. ${opt}
                        </div>
                    `).join('')}
                </div>
                <button class="back-btn" onclick="backToQuestions()">🔙 گەڕانەوە بۆ لیستی پرسیارەکان</button>
            </div>
        `;
    }
    
    function checkAnswer(selected, correct) {
        if(isAnswered) {
            alert("پێشتر وەڵامت داوەتەوە!");
            return;
        }
        if(timeLeft <= 0) {
            alert("کات تەواو بووە!");
            return;
        }
        
        isAnswered = true;
        if(timerInterval) clearInterval(timerInterval);
        
        const buttons = document.querySelectorAll(".option-btn");
        buttons.forEach(btn => {
            btn.style.pointerEvents = "none";
            if(btn.getAttribute("data-opt") === correct) {
                btn.classList.add("option-correct");
            }
            if(btn.getAttribute("data-opt") === selected && selected !== correct) {
                btn.classList.add("option-wrong");
            }
        });
        
        const question = categories[currentCategory][currentQuestionIndex];
        const correctText = question.options[correct.charCodeAt(0) - 65];
        
        if(selected === correct) {
            alert(`✅ وەڵامەکە ڕاستە! وەڵامی ڕاست: ${correctText}`);
        } else {
            alert(`❌ وەڵامەکە هەڵەیە! وەڵامی ڕاست: ${correctText}`);
        }
    }
    
    function showCorrectAnswer() {
        const question = categories[currentCategory][currentQuestionIndex];
        const buttons = document.querySelectorAll(".option-btn");
        buttons.forEach(btn => {
            btn.style.pointerEvents = "none";
            if(btn.getAttribute("data-opt") === question.correct) {
                btn.classList.add("option-correct");
            }
        });
        const correctText = question.options[question.correct.charCodeAt(0) - 65];
        alert(`⏰ کات تەواو بوو! وەڵامی ڕاست: ${correctText}`);
    }
    
    function backToQuestions() {
        if(timerInterval) clearInterval(timerInterval);
        document.getElementById("questionScreenDiv").style.display = "none";
        document.getElementById("questionsListDiv").style.display = "block";
        currentQuestionIndex = null;
        isAnswered = false;
    }
    
    function closeModal() {
        if(timerInterval) clearInterval(timerInterval);
        document.getElementById("questionModal").style.display = "none";
        currentQuestionIndex = null;
        isAnswered = false;
    }
    
    // دەستپێکردن
    loadCategories();
</script>
</body>
</html>
