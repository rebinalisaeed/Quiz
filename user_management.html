<!DOCTYPE html>
<html dir="rtl" lang="ckb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>بەڕێوەبردنی یوزەرەکان - یاری پرسیار و وەڵام</title>
    <style>
        @font-face {
            font-family: 'K24KurdishBold';
            src: url('K24KurdishBold-Bold.ttf') format('truetype');
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'K24KurdishBold', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            padding: 30px;
        }
        
        h1 {
            text-align: center;
            color: #4a5568;
            margin-bottom: 30px;
            font-size: 28px;
            border-bottom: 3px solid #667eea;
            display: inline-block;
            width: 100%;
            padding-bottom: 15px;
        }
        
        .form-section {
            background: #f7fafc;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #2d3748;
            font-weight: bold;
            font-size: 16px;
        }
        
        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
            background: white;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        
        .row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            width: 100%;
        }
        
        .btn:hover {
            background: #5a67d8;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.3);
        }
        
        .btn-danger {
            background: #e53e3e;
        }
        
        .btn-danger:hover {
            background: #c53030;
        }
        
        .btn-success {
            background: #48bb78;
        }
        
        .btn-success:hover {
            background: #38a169;
        }
        
        .btn-warning {
            background: #ed8936;
        }
        
        .btn-warning:hover {
            background: #dd6b20;
        }
        
        .table-container {
            overflow-x: auto;
            margin-top: 20px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }
        
        th {
            background: #667eea;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 14px;
        }
        
        td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #e2e8f0;
        }
        
        tr:hover {
            background: #f7fafc;
        }
        
        .action-btns {
            display: flex;
            gap: 8px;
            justify-content: center;
        }
        
        .action-btns button {
            padding: 6px 12px;
            font-size: 12px;
            margin: 0;
            width: auto;
        }
        
        .logout-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: auto;
            padding: 12px 24px;
            background: #e53e3e;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .logout-btn:hover {
            background: #c53030;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            
            th, td {
                font-size: 12px;
                padding: 8px;
            }
            
            .action-btns button {
                padding: 4px 8px;
                font-size: 10px;
            }
        }
        
        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .message.success {
            background: #c6f6d5;
            color: #22543d;
            border: 1px solid #9ae6b4;
            display: block;
        }
        
        .message.error {
            background: #fed7d7;
            color: #742a2a;
            border: 1px solid #fc8181;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 بەڕێوەبردنی یوزەرەکان</h1>
        
        <div id="message" class="message"></div>
        
        <div class="form-section">
            <div class="row">
                <div class="form-group">
                    <label>👤 ناوی بەکارهێنەر (Username):</label>
                    <input type="text" id="username" placeholder="مێهرەبان" autocomplete="off">
                </div>
                
                <div class="form-group">
                    <label>🔒 پاسوۆرد (Password):</label>
                    <input type="password" id="password" placeholder="********" autocomplete="off">
                </div>
            </div>
            
            <div class="row">
                <div class="form-group">
                    <label>📛 ناو بە کوردی (Display Name):</label>
                    <input type="text" id="displayName" placeholder="مێهرەبان محەمەد" autocomplete="off">
                </div>
                
                <div class="form-group">
                    <label>👔 پلە/ڕۆڵ (Role):</label>
                    <select id="role">
                        <option value="player">یاریکەر</option>
                        <option value="question_creator">دروستکەری پرسیار</option>
                        <option value="admin">بەڕێوەبەر ئەدمین</option>
                        <option value="presenter">پێشکەشکار</option>
                    </select>
                </div>
            </div>
            
            <div class="row">
                <div class="form-group">
                    <label>👥 گروپ (Group):</label>
                    <select id="group">
                        <option value="group1">گروپی یەکەم</option>
                        <option value="group2">گروپی دووەم</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label> </label>
                    <button class="btn btn-success" onclick="createUser()">➕ دروستکردنی یوزەر</button>
                </div>
            </div>
        </div>
        
        <div class="table-container">
            <h3 style="margin-bottom: 15px;">📋 لیستی یوزەرەکان</h3>
            <table id="usersTable">
                <thead>
                    <tr>
                        <th>ناوی بەکارهێنەر</th>
                        <th>ناو بە کوردی</th>
                        <th>پلە/ڕۆڵ</th>
                        <th>گروپ</th>
                        <th>خاڵ</th>
                        <th>چالاک</th>
                        <th>کردارەکان</th>
                    </tr>
                </thead>
                <tbody id="usersList">
                    <tr>
                        <td colspan="7" style="text-align: center;">بارکردن...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <button class="btn btn-danger logout-btn" onclick="logout()">🚪 دەرچوون</button>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <script>
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCtiW-RBMY0emCOFZdQCA7ynPESraUknxI",
            authDomain: "quizgamerebin.firebaseapp.com",
            databaseURL: "https://quizgamerebin-default-rtdb.firebaseio.com",
            projectId: "quizgamerebin",
            storageBucket: "quizgamerebin.firebasestorage.app",
            messagingSenderId: "312376681830",
            appId: "1:312376681830:web:11262fa62cc9246bac14a7",
            measurementId: "G-BJM04Q5X44"
        };
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        // Check login status
        let currentUser = null;
        
        function checkAuth() {
            const loggedInUser = localStorage.getItem('loggedInUser');
            if (!loggedInUser) {
                window.location.href = 'login.html';
                return false;
            }
            
            currentUser = JSON.parse(loggedInUser);
            if (currentUser.role !== 'admin') {
                alert('تەنها ئەدمین دەتوانێت ئەم پەڕەیە بەکاربهێنێت!');
                window.location.href = currentUser.role === 'player' ? 'play.html' : 'presenter.html';
                return false;
            }
            
            return true;
        }
        
        // Create user
        window.createUser = function() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const displayName = document.getElementById('displayName').value.trim();
            const role = document.getElementById('role').value;
            const group = document.getElementById('group').value;
            
            if (!username || !password || !displayName) {
                showMessage('تکایە هەموو خانەکان پڕ بکەوە', 'error');
                return;
            }
            
            const userId = username.toLowerCase().replace(/[^a-z0-9]/g, '');
            
            const userData = {
                username: username,
                password: password,
                displayName: displayName,
                role: role,
                group: group,
                score: role === 'player' ? 5 : 0,
                isActive: true,
                eliminated: false,
                createdAt: Date.now()
            };
            
            database.ref('users/' + userId).set(userData)
                .then(() => {
                    showMessage('✅ یوزەر بە سەرکەوتوویی دروست کرا!', 'success');
                    document.getElementById('username').value = '';
                    document.getElementById('password').value = '';
                    document.getElementById('displayName').value = '';
                    loadUsers();
                })
                .catch(error => {
                    showMessage('❌ هەڵە لە دروستکردنی یوزەر: ' + error.message, 'error');
                });
        };
        
        // Load users
        function loadUsers() {
            database.ref('users').once('value')
                .then(snapshot => {
                    const users = snapshot.val();
                    const tbody = document.getElementById('usersList');
                    
                    if (!users) {
                        tbody.innerHTML = '<tr><td colspan="7" style="text-align: center;">هیچ یوزەرێک نییە</td></tr>';
                        return;
                    }
                    
                    let html = '';
                    for (let id in users) {
                        const user = users[id];
                        html += `
                            <tr>
                                <td>${user.username}</td>
                                <td>${user.displayName}</td>
                                <td>${getRoleName(user.role)}</td>
                                <td>${user.group === 'group1' ? 'گروپی یەکەم' : 'گروپی دووەم'}</td>
                                <td>${user.score || 0}</td>
                                <td>${user.isActive ? '✅ چالاک' : '❌ ناچالاک'}</td>
                                <td class="action-btns">
                                    <button class="btn btn-warning" onclick="editUser('${id}')">✏️ دەستکاری</button>
                                    <button class="btn btn-danger" onclick="deleteUser('${id}')">🗑️ سڕینەوە</button>
                                </td>
                            </tr>
                        `;
                    }
                    tbody.innerHTML = html;
                })
                .catch(error => {
                    console.error('Error loading users:', error);
                });
        }
        
        function getRoleName(role) {
            const roles = {
                'player': 'یاریکەر',
                'question_creator': 'دروستکەری پرسیار',
                'admin': 'بەڕێوەبەر ئەدمین',
                'presenter': 'پێشکەشکار'
            };
            return roles[role] || role;
        }
        
        // Edit user
        window.editUser = function(userId) {
            database.ref('users/' + userId).once('value')
                .then(snapshot => {
                    const user = snapshot.val();
                    if (user) {
                        document.getElementById('username').value = user.username;
                        document.getElementById('password').value = user.password;
                        document.getElementById('displayName').value = user.displayName;
                        document.getElementById('role').value = user.role;
                        document.getElementById('group').value = user.group;
                        
                        // Change button to update
                        const createBtn = document.querySelector('.btn-success');
                        createBtn.textContent = '🔄 نوێکردنەوە';
                        createBtn.onclick = () => updateUser(userId);
                    }
                });
        };
        
        // Update user
        window.updateUser = function(userId) {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const displayName = document.getElementById('displayName').value.trim();
            const role = document.getElementById('role').value;
            const group = document.getElementById('group').value;
            
            if (!username || !password || !displayName) {
                showMessage('تکایە هەموو خانەکان پڕ بکەوە', 'error');
                return;
            }
            
            const userData = {
                username: username,
                password: password,
                displayName: displayName,
                role: role,
                group: group,
                score: role === 'player' ? 5 : 0,
                isActive: true,
                eliminated: false,
                updatedAt: Date.now()
            };
            
            database.ref('users/' + userId).update(userData)
                .then(() => {
                    showMessage('✅ یوزەر نوێ کرایەوە!', 'success');
                    resetForm();
                    loadUsers();
                })
                .catch(error => {
                    showMessage('❌ هەڵە لە نوێکردنەوە: ' + error.message, 'error');
                });
        };
        
        // Delete user
        window.deleteUser = function(userId) {
            if (confirm('دڵنیایت دەتەوێت ئەم یوزەرە بسڕیتەوە؟')) {
                database.ref('users/' + userId).remove()
                    .then(() => {
                        showMessage('✅ یوزەر سڕایەوە!', 'success');
                        loadUsers();
                    })
                    .catch(error => {
                        showMessage('❌ هەڵە لە سڕینەوە: ' + error.message, 'error');
                    });
            }
        };
        
        // Reset form
        function resetForm() {
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('displayName').value = '';
            document.getElementById('role').value = 'player';
            document.getElementById('group').value = 'group1';
            
            const createBtn = document.querySelector('.btn-success');
            createBtn.textContent = '➕ دروستکردنی یوزەر';
            createBtn.onclick = createUser;
        }
        
        // Show message
        function showMessage(msg, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = msg;
            messageDiv.className = 'message ' + type;
            
            setTimeout(() => {
                messageDiv.className = 'message';
            }, 3000);
        }
        
        // Logout
        window.logout = function() {
            localStorage.removeItem('loggedInUser');
            window.location.href = 'login.html';
        };
        
        // Auto-disable group for non-players
        document.getElementById('role').addEventListener('change', function() {
            const groupSelect = document.getElementById('group');
            if (this.value === 'player') {
                groupSelect.disabled = false;
                groupSelect.style.opacity = '1';
            } else {
                groupSelect.disabled = true;
                groupSelect.style.opacity = '0.5';
                groupSelect.value = 'group1';
            }
        });
        
        // Initialize
        if (checkAuth()) {
            loadUsers();
            // Trigger initial group state
            document.getElementById('role').dispatchEvent(new Event('change'));
        }
    </script>
</body>
</html>
