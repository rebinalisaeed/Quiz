<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>بەڕێوەبردنی یوزەرەکان</title>
    <style>
        @font-face {
            font-family: 'K24KurdishBold-Bold';
            src: url('fonts/K24KurdishBold-Bold.ttf') format('truetype');
        }
        
        @font-face {
            font-family: 'K24KurdishLight-Light';
            src: url('fonts/K24KurdishLight-Light.ttf') format('truetype');
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        
        body {
            font-family: 'K24KurdishBold-Bold', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .header h1 {
            color: #667eea;
            font-size: 28px;
        }
        
        .logout-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            font-family: 'K24KurdishBold-Bold', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .logout-btn:hover {
            background: #ff3838;
            transform: translateY(-2px);
        }
        
        .form-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .form-title {
            color: #333;
            margin-bottom: 25px;
            font-size: 24px;
            border-right: 4px solid #667eea;
            padding-right: 15px;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .input-field {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
            font-family: 'K24KurdishLight-Light', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .input-field:focus {
            outline: none;
            border-color: #667eea;
        }
        
        select.input-field {
            cursor: pointer;
            font-family: 'K24KurdishBold-Bold', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .create-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
            font-family: 'K24KurdishBold-Bold', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .create-btn:hover {
            transform: translateY(-2px);
        }
        
        .users-table-container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            overflow-x: auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .users-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .users-table th,
        .users-table td {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .users-table th {
            background: #667eea;
            color: white;
            font-weight: bold;
            font-family: 'K24KurdishBold-Bold', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .users-table td {
            font-family: 'K24KurdishLight-Light', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .users-table tr:hover {
            background: #f5f5f5;
        }
        
        .edit-btn, .delete-btn {
            padding: 6px 12px;
            margin: 0 5px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            font-family: 'K24KurdishBold-Bold', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .edit-btn {
            background: #4CAF50;
            color: white;
        }
        
        .edit-btn:hover {
            background: #45a049;
        }
        
        .delete-btn {
            background: #f44336;
            color: white;
        }
        
        .delete-btn:hover {
            background: #da190b;
        }
        
        .status-active {
            color: #4CAF50;
            font-weight: bold;
        }
        
        .status-inactive {
            color: #f44336;
            font-weight: bold;
        }
        
        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        
        .message.success {
            background: #4CAF50;
        }
        
        .message.error {
            background: #f44336;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        @media (max-width: 768px) {
            .users-table th,
            .users-table td {
                padding: 10px;
                font-size: 12px;
            }
            
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 20px;
                margin-bottom: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👥 بەڕێوەبردنی یوزەرەکان</h1>
            <button class="logout-btn" onclick="logout()">🚪 دەرچوون</button>
        </div>
        
        <div class="form-card">
            <h2 class="form-title">📝 دروستکردنی یوزەری نوێ</h2>
            <div class="form-grid">
                <input type="text" id="newUsername" class="input-field" placeholder="ناوی بەکارهێنەر">
                <input type="text" id="newPassword" class="input-field" placeholder="پاسوۆرد">
                <input type="text" id="newName" class="input-field" placeholder="ناو بە کوردی">
                <select id="newRole" class="input-field" onchange="toggleGroupSelect()">
                    <option value="player">یاریکەر</option>
                    <option value="question_creator">دروستکەری پرسیار</option>
                    <option value="admin">بەڕێوەبەر</option>
                    <option value="presenter">پێشکەشکار</option>
                    <option value="point_viewer">نیشاندانی خاڵ</option>
                </select>
                <select id="newGroup" class="input-field" disabled>
                    <option value="group1">گروپی یەکەم</option>
                    <option value="group2">گروپی دووەم</option>
                </select>
            </div>
            <button class="create-btn" onclick="createUser()">➕ دروستکردنی یوزەر</button>
        </div>
        
        <div class="users-table-container">
            <h2 class="form-title">📋 لیستی یوزەرەکان</h2>
            <table class="users-table" id="usersTable">
                <thead>
                    <tr>
                        <th>ناوی بەکارهێنەر</th>
                        <th>ناو</th>
                        <th>پلە</th>
                        <th>گرووپ</th>
                        <th>خاڵ</th>
                        <th>دۆخ</th>
                        <th>کردارەکان</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <tr>
                        <td colspan="7" style="text-align: center;">بارگیری دەکرێت...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <script type="module">
        import { db, ref, set, get, push, update, remove, onValue } from './firebase-config.js';
        
        let currentEditId = null;
        
        window.toggleGroupSelect = function() {
            const role = document.getElementById('newRole').value;
            const groupSelect = document.getElementById('newGroup');
            if (role === 'player') {
                groupSelect.disabled = false;
            } else {
                groupSelect.disabled = true;
                groupSelect.value = 'group1';
            }
        }
        
        function getRoleName(role) {
            const roles = {
                'player': 'یاریکەر',
                'question_creator': 'دروستکەری پرسیار',
                'admin': 'بەڕێوەبەر',
                'presenter': 'پێشکەشکار',
                'point_viewer': 'نیشاندانی خاڵ'
            };
            return roles[role] || role;
        }
        
        function loadUsers() {
            const usersRef = ref(db, 'users');
            onValue(usersRef, (snapshot) => {
                const tbody = document.getElementById('usersTableBody');
                tbody.innerHTML = '';
                
                if (snapshot.exists()) {
                    const users = snapshot.val();
                    for (let userId in users) {
                        const user = users[userId];
                        if (!user.isSuperAdmin) {
                            const row = tbody.insertRow();
                            row.innerHTML = `
                                <td>${user.username || ''}</td>
                                <td>${user.name || ''}Jsx
                                <td>${getRoleName(user.role)}Jsx
                                <td>${user.group === 'group1' ? 'گروپی یەکەم' : (user.group === 'group2' ? 'گروپی دووەم' : '-')}Jsx
                                <td>${user.score !== undefined ? user.score : 5}Jsx
                                <td class="${user.isActive !== false ? 'status-active' : 'status-inactive'}">
                                    ${user.isActive !== false ? 'چالاکە' : 'ناچالاکە'}
                                 </td>
                                <td>
                                    <button class="edit-btn" onclick='editUser(${JSON.stringify(userId)}, ${JSON.stringify(user)})'>✏️ دەستکاری</button>
                                    <button class="delete-btn" onclick="deleteUser('${userId}')">🗑️ سڕینەوە</button>
                                 </td>
                            `;
                        }
                    }
                } else {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align: center;">هیچ یوزەرێک نییە</td></tr>';
                }
            });
        }
        
        window.createUser = async function() {
            const username = document.getElementById('newUsername').value.trim();
            const password = document.getElementById('newPassword').value.trim();
            const name = document.getElementById('newName').value.trim();
            const role = document.getElementById('newRole').value;
            const group = document.getElementById('newGroup').value;
            
            if (!username || !password || !name) {
                showMessage('تکایە هەموو خانەکان پڕ بکەرەوە', 'error');
                return;
            }
            
            const usersRef = ref(db, 'users');
            const snapshot = await get(usersRef);
            let exists = false;
            
            if (snapshot.exists()) {
                const users = snapshot.val();
                for (let userId in users) {
                    if (users[userId].username === username) {
                        exists = true;
                        break;
                    }
                }
            }
            
            if (exists) {
                showMessage('ئەم ناوی بەکارهێنەرە هەیە!', 'error');
                return;
            }
            
            const newUserRef = push(ref(db, 'users'));
            const userData = {
                username: username,
                password: password,
                name: name,
                role: role,
                group: role === 'player' ? group : null,
                isActive: true,
                score: role === 'player' ? 5 : 0,
                isEliminated: false,
                createdAt: new Date().toISOString()
            };
            
            await set(newUserRef, userData);
            showMessage('یوزەر بە سەرکەوتوویی دروست کرا', 'success');
            
            document.getElementById('newUsername').value = '';
            document.getElementById('newPassword').value = '';
            document.getElementById('newName').value = '';
            document.getElementById('newRole').value = 'player';
            document.getElementById('newGroup').disabled = true;
        }
        
        window.editUser = function(userId, user) {
            document.getElementById('newUsername').value = user.username;
            document.getElementById('newPassword').value = user.password;
            document.getElementById('newName').value = user.name;
            document.getElementById('newRole').value = user.role;
            
            if (user.role === 'player') {
                document.getElementById('newGroup').disabled = false;
                document.getElementById('newGroup').value = user.group || 'group1';
            } else {
                document.getElementById('newGroup').disabled = true;
            }
            
            currentEditId = userId;
            const createBtn = document.querySelector('.create-btn');
            createBtn.textContent = '✏️ نوێکردنەوەی یوزەر';
            createBtn.onclick = () => updateUser(userId);
        }
        
        window.updateUser = async function(userId) {
            const username = document.getElementById('newUsername').value.trim();
            const password = document.getElementById('newPassword').value.trim();
            const name = document.getElementById('newName').value.trim();
            const role = document.getElementById('newRole').value;
            const group = document.getElementById('newGroup').value;
            
            const userRef = ref(db, `users/${userId}`);
            await update(userRef, {
                username: username,
                password: password,
                name: name,
                role: role,
                group: role === 'player' ? group : null
            });
            
            showMessage('یوزەر نوێ کرایەوە', 'success');
            
            document.getElementById('newUsername').value = '';
            document.getElementById('newPassword').value = '';
            document.getElementById('newName').value = '';
            document.getElementById('newRole').value = 'player';
            document.getElementById('newGroup').disabled = true;
            currentEditId = null;
            const createBtn = document.querySelector('.create-btn');
            createBtn.textContent = '➕ دروستکردنی یوزەر';
            createBtn.onclick = createUser;
        }
        
        window.deleteUser = async function(userId) {
            if (confirm('دڵنیایت دەتەوێت ئەم یوزەرە بسڕیتەوە؟')) {
                await remove(ref(db, `users/${userId}`));
                showMessage('یوزەر سڕایەوە', 'success');
            }
        }
        
        window.logout = function() {
            localStorage.removeItem('currentUser');
            window.location.href = 'login.html';
        }
        
        function showMessage(msg, type) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = msg;
            document.body.appendChild(messageDiv);
            setTimeout(() => {
                messageDiv.remove();
            }, 3000);
        }
        
        const currentUser = JSON.parse(localStorage.getItem('currentUser') || '{}');
        if (currentUser.role !== 'admin') {
            alert('تەنها ئەدمین دەتوانێت ئەم پەڕەیە ببینێت!');
            window.location.href = 'login.html';
        }
        
        loadUsers();
    </script>
</body>
</html>
