<!DOCTYPE html>
<html dir="rtl">
<head>
    <title>بەڕێوەبردنی بەکارهێنەران</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @font-face { font-family: 'K24Kurdish'; src: url('K24KurdishBold-Bold.ttf') format('truetype'); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'K24Kurdish', 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #1e3c72, #2a5298); min-height: 100vh; padding: 30px 20px; }
        .container { max-width: 1000px; margin: auto; }
        h1 { color: white; text-align: center; margin-bottom: 30px; font-size: 28px; }
        .glass-card { background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); border-radius: 25px; padding: 25px; margin-bottom: 30px; }
        .glass-card h3 { color: white; margin-bottom: 20px; text-align: center; font-size: 22px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 15px; border: none; background: rgba(255,255,255,0.9); font-size: 14px; }
        button { padding: 12px 25px; border: none; border-radius: 30px; font-size: 16px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-add { background: #4CAF50; color: white; width: 100%; }
        .btn-add:hover { background: #45a049; transform: scale(1.02); }
        .btn-logout { background: #ff6b6b; color: white; margin-top: 20px; display: block; width: 200px; margin-left: auto; margin-right: auto; }
        .btn-logout:hover { background: #ff5252; transform: scale(1.02); }
        .users-list { background: rgba(0,0,0,0.3); border-radius: 20px; padding: 20px; margin-top: 20px; }
        .user-item { background: rgba(255,255,255,0.1); border-radius: 15px; padding: 15px; margin-bottom: 10px; color: white; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .user-info { flex: 1; }
        .role-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; margin-top: 5px; }
        .role-super-admin { background: #9c27b0; }
        .role-admin { background: #f44336; }
        .role-creator { background: #ff9800; }
        .role-player { background: #4CAF50; }
        .delete-user { background: #f44336; color: white; border: none; border-radius: 20px; padding: 5px 15px; cursor: pointer; }
        .delete-user:hover { background: #d32f2f; }
        .row-2cols { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 600px) { .row-2cols { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <h1>👥 بەڕێوەبردنی بەکارهێنەران</h1>
    <div class="glass-card">
        <h3>➕ دروستکردنی بەکارهێنەری نوێ</h3>
        <div class="row-2cols">
            <input type="text" id="newUsername" placeholder="ناوی بەکارهێنەر">
            <input type="password" id="newPassword" placeholder="وشەی نهێنی">
        </div>
        <select id="userRole">
            <option value="player">🎮 یاریکەر (Player) - تەنها یاری</option>
            <option value="question_creator">📝 دروستکری پرسیار - تەنها زیادکردنی پرسیار</option>
            <option value="admin">👑 بەڕێوەبەر (Admin) - هەموو دەسەلاتێک</option>
        </select>
        <div id="groupSelect" style="display:none; margin-top:15px;">
            <select id="playerGroup">
                <option value="group1">🏆 گروپی یەکەم</option>
                <option value="group2">🏆 گروپی دووەم</option>
            </select>
        </div>
        <button class="btn-add" onclick="createUser()">➕ دروستکردنی بەکارهێنەر</button>
    </div>
    <div class="users-list">
        <h3 style="color:white; text-align:center; margin-bottom:15px;">📋 لیستی بەکارهێنەران</h3>
        <div id="usersContainer"></div>
    </div>
    <button class="btn-logout" onclick="logout()">🚪 دەرچوون</button>
</div>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAaKPSq0gBKaFG7Pfe-bGOpgEkz2TLnBS8",
        authDomain: "quizinrebin.firebaseapp.com",
        databaseURL: "https://quizinrebin-default-rtdb.firebaseio.com",
        projectId: "quizinrebin",
        storageBucket: "quizinrebin.firebasestorage.app",
        messagingSenderId: "40466121073",
        appId: "1:40466121073:web:766379012a8846c9d836d0",
        measurementId: "G-1TT4ZDJYCM"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    const ROOM_ID = "quiz_room_main";
    const SUPER_ADMIN_USERNAME = "useradmin";
    const currentUser = JSON.parse(localStorage.getItem("loggedInUser") || "{}");
    
    if(currentUser.username !== SUPER_ADMIN_USERNAME) {
        alert("⚠️ تەنها بەڕێوەبەری سیستەم دەتوانێت بچێتە ئەم پەڕەیە!");
        window.location.href = "index.html";
    }
    
    document.getElementById("userRole").addEventListener("change", function() {
        const groupDiv = document.getElementById("groupSelect");
        if(this.value === "player") {
            groupDiv.style.display = "block";
        } else {
            groupDiv.style.display = "none";
        }
    });
    
    async function createSuperAdminIfNotExists() {
        const snapshot = await database.ref(`${ROOM_ID}/users/${SUPER_ADMIN_USERNAME}`).once('value');
        if(!snapshot.exists()) {
            await database.ref(`${ROOM_ID}/users/${SUPER_ADMIN_USERNAME}`).set({
                username: SUPER_ADMIN_USERNAME,
                password: "userpass1",
                role: "super_admin",
                createdAt: Date.now()
            });
            console.log("✅ Super admin created!");
        }
    }
    
    function loadUsers() {
        database.ref(`${ROOM_ID}/users`).on('value', (snapshot) => {
            const users = snapshot.val() || {};
            const container = document.getElementById("usersContainer");
            container.innerHTML = "";
            for(const [username, userData] of Object.entries(users)) {
                let roleText = "", roleClass = "";
                if(userData.role === "super_admin") { roleText = "⭐ بەڕێوەبەری سیستەم"; roleClass = "role-super-admin"; }
                else if(userData.role === "admin") { roleText = "👑 بەڕێوەبەر"; roleClass = "role-admin"; }
                else if(userData.role === "question_creator") { roleText = "📝 دروستکری پرسیار"; roleClass = "role-creator"; }
                else { 
                    roleText = `🎮 یاریکەر (${userData.group === "group1" ? "گروپی یەکەم" : "گروپی دووەم"})`;
                    roleClass = "role-player";
                }
                const userDiv = document.createElement("div");
                userDiv.className = "user-item";
                userDiv.innerHTML = `
                    <div class="user-info">
                        <strong>👤 ${username}</strong><br>
                        <span class="role-badge ${roleClass}">${roleText}</span>
                    </div>
                    ${username !== SUPER_ADMIN_USERNAME ? `<button class="delete-user" onclick="deleteUser('${username}')">🗑️ سڕینەوە</button>` : '<span style="color:rgba(255,255,255,0.5);">(بەڕێوەبەری سیستەم - ناسڕێتەوە)</span>'}
                `;
                container.appendChild(userDiv);
            }
            if(Object.keys(users).length === 0) {
                container.innerHTML = "<div class='empty-msg' style='color:white;text-align:center;'>هیچ بەکارهێنەرێک نییە</div>";
            }
        });
    }
    
    async function createUser() {
        const username = document.getElementById("newUsername").value.trim();
        const password = document.getElementById("newPassword").value.trim();
        const role = document.getElementById("userRole").value;
        const group = document.getElementById("playerGroup").value;
        
        if(!username || !password) {
            alert("❌ تکایە ناوی بەکارهێنەر و وشەی نهێنی پڕ بکەوە!");
            return;
        }
        if(username === SUPER_ADMIN_USERNAME) {
            alert("❌ ئەم ناوە بۆ بەڕێوەبەری سیستەم تەرخان کراوە!");
            return;
        }
        
        const snapshot = await database.ref(`${ROOM_ID}/users/${username}`).once('value');
        if(snapshot.exists()) {
            alert("❌ ئەم ناوی بەکارهێنەرە پێشتر هەیە!");
            return;
        }
        
        const userData = { username, password, role, createdAt: Date.now() };
        if(role === "player") userData.group = group;
        
        await database.ref(`${ROOM_ID}/users/${username}`).set(userData);
        document.getElementById("newUsername").value = "";
        document.getElementById("newPassword").value = "";
        alert("✅ بەکارهێنەر بە سەرکەوتوویی دروست کرا!");
        loadUsers();
    }
    
    async function deleteUser(username) {
        if(confirm(`دڵنیایت لە سڕینەوەی بەکارهێنەر "${username}"؟`)) {
            await database.ref(`${ROOM_ID}/users/${username}`).remove();
            alert("✅ بەکارهێنەر سڕایەوە!");
            loadUsers();
        }
    }
    
    function logout() {
        localStorage.clear();
        window.location.href = "index.html";
    }
    
    createSuperAdminIfNotExists().then(() => loadUsers());
</script>
</body>
</html>
