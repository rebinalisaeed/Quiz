<!DOCTYPE html>
<html dir="rtl">
<head>
    <title>بەڕێوەبردنی بەکارهێنەران</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @font-face { font-family: 'K24Kurdish'; src: url('K24KurdishBold-Bold.ttf') format('truetype'); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'K24Kurdish', 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #1e3c72, #2a5298); min-height: 100vh; padding: 30px 20px; }
        .container { max-width: 1000px; margin: auto; }
        h1 { color: white; text-align: center; margin-bottom: 30px; }
        .glass-card { background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); border-radius: 25px; padding: 25px; margin-bottom: 30px; }
        .glass-card h3 { color: white; margin-bottom: 20px; text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 15px; border: none; background: rgba(255,255,255,0.9); font-size: 14px; }
        button { padding: 12px 25px; border: none; border-radius: 30px; font-size: 16px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-add { background: #4CAF50; color: white; }
        .btn-add:hover { background: #45a049; }
        .btn-logout { background: #ff6b6b; color: white; margin-top: 20px; display: block; width: 200px; margin-left: auto; margin-right: auto; }
        .users-list { background: rgba(0,0,0,0.3); border-radius: 20px; padding: 20px; margin-top: 20px; }
        .user-item { background: rgba(255,255,255,0.1); border-radius: 15px; padding: 15px; margin-bottom: 10px; color: white; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .user-info { flex: 1; }
        .role-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; margin-top: 5px; }
        .role-admin { background: #f44336; }
        .role-creator { background: #ff9800; }
        .role-player { background: #4CAF50; }
        .delete-user { background: #f44336; color: white; border: none; border-radius: 20px; padding: 5px 15px; cursor: pointer; }
        .delete-user:hover { background: #d32f2f; }
        .row-2cols { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 600px) { .row-2cols { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <h1>👥 بەڕێوەبردنی بەکارهێنەران</h1>
    
    <div class="glass-card">
        <h3>➕ دروستکردنی بەکارهێنەری نوێ</h3>
        <div class="row-2cols">
            <input type="text" id="newUsername" placeholder="ناوی بەکارهێنەر">
            <input type="password" id="newPassword" placeholder="وشەی نهێنی">
        </div>
        <select id="userRole">
            <option value="player">🎮 یاریکەر (Player) - تەنها یاری</option>
            <option value="question_creator">📝 دروستکری پرسیار - تەنها زیادکردنی پرسیار</option>
            <option value="admin">👑 بەڕێوەبەر (Admin) - هەموو دەسەلاتێک</option>
        </select>
        <button class="btn-add" onclick="createUser()" style="width:100%; margin-top:15px;">➕ دروستکردنی بەکارهێنەر</button>
    </div>
    
    <div class="users-list">
        <h3 style="color:white; text-align:center; margin-bottom:15px;">📋 لیستی بەکارهێنەران</h3>
        <div id="usersContainer"></div>
    </div>
    
    <button class="btn-logout" onclick="logout()">🚪 دەرچوون</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCtiW-RBMY0emCOFZdQCA7ynPESraUknxI",
        authDomain: "quizgamerebin.firebaseapp.com",
        databaseURL: "https://quizgamerebin-default-rtdb.firebaseio.com",
        projectId: "quizgamerebin",
        storageBucket: "quizgamerebin.firebasestorage.app",
        messagingSenderId: "312376681830",
        appId: "1:312376681830:web:11262fa62cc9246bac14a7",
        measurementId: "G-BJM04Q5X44"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    const ROOM_ID = "quiz_room_main";
    const ADMIN_USERNAME = "useradmin";
    const ADMIN_PASSWORD = "userpass1";
    
    // پشکنینی ئەگەر بەکارهێنەری ئێستا مافی بەڕێوەبردنی هەیە
    const currentUser = JSON.parse(localStorage.getItem("loggedInUser") || "{}");
    
    if(currentUser.username !== ADMIN_USERNAME || currentUser.password !== ADMIN_PASSWORD) {
        alert("⚠️ تەنها بەڕێوەبەری سیستەم دەتوانێت بچێتە ئەم پەڕەیە!");
        window.location.href = "index.html";
    }
    
    function loadUsers() {
        database.ref(`${ROOM_ID}/users`).on('value', (snapshot) => {
            const users = snapshot.val() || {};
            const container = document.getElementById("usersContainer");
            container.innerHTML = "";
            
            for(const [username, userData] of Object.entries(users)) {
                const roleText = userData.role === "admin" ? "👑 بەڕێوەبەر" : (userData.role === "question_creator" ? "📝 دروستکری پرسیار" : "🎮 یاریکەر");
                const roleClass = userData.role === "admin" ? "role-admin" : (userData.role === "question_creator" ? "role-creator" : "role-player");
                
                const userDiv = document.createElement("div");
                userDiv.className = "user-item";
                userDiv.innerHTML = `
                    <div class="user-info">
                        <strong>👤 ${username}</strong><br>
                        <span class="role-badge ${roleClass}">${roleText}</span>
                    </div>
                    ${username !== ADMIN_USERNAME ? `<button class="delete-user" onclick="deleteUser('${username}')">🗑️ سڕینەوە</button>` : '<span style="color:rgba(255,255,255,0.5);">(بەڕێوەبەری سیستەم - ناسڕێتەوە)</span>'}
                `;
                container.appendChild(userDiv);
            }
            
            if(Object.keys(users).length === 0) {
                container.innerHTML = "<div class='empty-msg' style='color:white;text-align:center;'>هیچ بەکارهێنەرێک نییە</div>";
            }
        });
    }
    
    async function createUser() {
        const username = document.getElementById("newUsername").value.trim();
        const password = document.getElementById("newPassword").value.trim();
        const role = document.getElementById("userRole").value;
        
        if(!username || !password) {
            alert("❌ تکایە ناوی بەکارهێنەر و وشەی نهێنی پڕ بکەوە!");
            return;
        }
        
        if(username === ADMIN_USERNAME) {
            alert("❌ ئەم ناوە بۆ بەڕێوەبەری سیستەم تەرخان کراوە!");
            return;
        }
        
        // پشکنینی ئەگەر بەکارهێنەر پێشتر هەبێت
        const snapshot = await database.ref(`${ROOM_ID}/users/${username}`).once('value');
        if(snapshot.exists()) {
            alert("❌ ئەم ناوی بەکارهێنەرە پێشتر هەیە!");
            return;
        }
        
        // دروستکردنی بەکارهێنەر
        await database.ref(`${ROOM_ID}/users/${username}`).set({
            username: username,
            password: password,
            role: role,
            createdAt: Date.now()
        });
        
        document.getElementById("newUsername").value = "";
        document.getElementById("newPassword").value = "";
        alert("✅ بەکارهێنەر بە سەرکەوتوویی دروست کرا!");
        loadUsers();
    }
    
    async function deleteUser(username) {
        if(confirm(`دڵنیایت لە سڕینەوەی بەکارهێنەر "${username}"؟`)) {
            await database.ref(`${ROOM_ID}/users/${username}`).remove();
            alert("✅ بەکارهێنەر سڕایەوە!");
            loadUsers();
        }
    }
    
    function logout() {
        localStorage.removeItem("loggedInUser");
        localStorage.removeItem("roomId");
        window.location.href = "index.html";
    }
    
    loadUsers();
</script>
</body>
</html>
