<!DOCTYPE html>
<html dir="rtl" lang="ckb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>چوونە ژوورەوە - یاری پرسیار و وەڵام</title>
    <style>
        @font-face {
            font-family: 'K24KurdishBold';
            src: url('K24KurdishBold-Bold.ttf') format('truetype');
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'K24KurdishBold', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .login-container {
            max-width: 450px;
            width: 100%;
            background: white;
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            overflow: hidden;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 30px;
            text-align: center;
        }
        
        .header h1 {
            color: white;
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .header p {
            color: rgba(255,255,255,0.9);
            font-size: 14px;
        }
        
        .login-form {
            padding: 40px 30px;
            background: white;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: #2d3748;
            font-weight: bold;
            font-size: 14px;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 15px;
            font-size: 16px;
            transition: all 0.3s;
            background: #f7fafc;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102,126,234,0.3);
        }
        
        .btn-login:active {
            transform: translateY(0);
        }
        
        .message {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
            font-size: 14px;
        }
        
        .message.error {
            background: #fed7d7;
            color: #742a2a;
            border: 1px solid #fc8181;
            display: block;
        }
        
        .message.success {
            background: #c6f6d5;
            color: #22543d;
            border: 1px solid #9ae6b4;
            display: block;
        }
        
        .demo-accounts {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }
        
        .demo-accounts h3 {
            color: #4a5568;
            font-size: 14px;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .demo-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        
        .demo-item {
            background: #f7fafc;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 12px;
        }
        
        .demo-item:hover {
            background: #e2e8f0;
            transform: scale(1.02);
        }
        
        .demo-item strong {
            color: #667eea;
            display: block;
            margin-bottom: 5px;
        }
        
        @media (max-width: 480px) {
            .login-form {
                padding: 30px 20px;
            }
            
            .header {
                padding: 30px 20px;
            }
            
            .header h1 {
                font-size: 24px;
            }
            
            .demo-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="header">
            <h1>🎮 یاری پرسیار و وەڵام</h1>
            <p>تکایە ناوی بەکارهێنەر و پاسوۆردەکەت بنووسە</p>
        </div>
        
        <div class="login-form">
            <div id="message" class="message"></div>
            
            <div class="form-group">
                <label>👤 ناوی بەکارهێنەر</label>
                <input type="text" id="username" placeholder="username_admin" autocomplete="off">
            </div>
            
            <div class="form-group">
                <label>🔒 پاسوۆرد</label>
                <input type="password" id="password" placeholder="********" autocomplete="off" onkeypress="if(event.key==='Enter') login()">
            </div>
            
            <button class="btn-login" onclick="login()">🚪 چوونە ژوورەوە</button>
            
            <div class="demo-accounts">
                <h3>📝 ئەکاونتە تاقیکاریەکان:</h3>
                <div class="demo-grid">
                    <div class="demo-item" onclick="fillDemo('username_admin', 'userpass11')">
                        <strong>👑 ئەدمین</strong>
                        username_admin / userpass11
                    </div>
                    <div class="demo-item" onclick="fillDemo('presenter1', 'presenter123')">
                        <strong>🎤 پێشکەشکار</strong>
                        presenter1 / presenter123
                    </div>
                    <div class="demo-item" onclick="fillDemo('player1', 'player123')">
                        <strong>👤 یاریکەر 1</strong>
                        player1 / player123
                    </div>
                    <div class="demo-item" onclick="fillDemo('player2', 'player123')">
                        <strong>👥 یاریکەر 2</strong>
                        player2 / player123
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <script>
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCtiW-RBMY0emCOFZdQCA7ynPESraUknxI",
            authDomain: "quizgamerebin.firebaseapp.com",
            databaseURL: "https://quizgamerebin-default-rtdb.firebaseio.com",
            projectId: "quizgamerebin",
            storageBucket: "quizgamerebin.firebasestorage.app",
            messagingSenderId: "312376681830",
            appId: "1:312376681830:web:11262fa62cc9246bac14a7",
            measurementId: "G-BJM04Q5X44"
        };
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        // Default admin account
        function createDefaultAdmin() {
            const adminData = {
                username: "username_admin",
                password: "userpass11",
                displayName: "ئەدمینی سەرەکی",
                role: "admin",
                group: "group1",
                score: 0,
                isActive: true,
                eliminated: false,
                createdAt: Date.now()
            };
            
            database.ref('users/username_admin').once('value')
                .then(snapshot => {
                    if (!snapshot.exists()) {
                        database.ref('users/username_admin').set(adminData);
                    }
                });
        }
        
        // Fill demo account
        window.fillDemo = function(username, password) {
            document.getElementById('username').value = username;
            document.getElementById('password').value = password;
        };
        
        // Login function
        window.login = function() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                showMessage('تکایە ناوی بەکارهێنەر و پاسوۆرد بنووسە', 'error');
                return;
            }
            
            const userId = username.toLowerCase().replace(/[^a-z0-9]/g, '');
            
            database.ref('users/' + userId).once('value')
                .then(snapshot => {
                    const user = snapshot.val();
                    
                    if (!user) {
                        showMessage('❌ ئەم بەکارهێنەرە بوونی نییە!', 'error');
                        return;
                    }
                    
                    if (user.password !== password) {
                        showMessage('❌ پاسوۆرد هەڵەیە!', 'error');
                        return;
                    }
                    
                    if (user.eliminated === true) {
                        showMessage('❌ ئەم یاریکەرە لە یاری دەرکراوە و ناتوانێت بچێتە ژوورەوە!', 'error');
                        return;
                    }
                    
                    // Save to localStorage
                    const loggedInUser = {
                        id: userId,
                        username: user.username,
                        displayName: user.displayName,
                        role: user.role,
                        group: user.group,
                        score: user.score || 0
                    };
                    
                    localStorage.setItem('loggedInUser', JSON.stringify(loggedInUser));
                    
                    showMessage('✅ سەرکەوتوو بوویت! ڕەوانە دەکرێیت...', 'success');
                    
                    // Redirect based on role
                    setTimeout(() => {
                        if (user.role === 'admin') {
                            window.location.href = 'user_management.html';
                        } else if (user.role === 'presenter') {
                            window.location.href = 'presenter.html';
                        } else if (user.role === 'player') {
                            window.location.href = 'play.html';
                        } else if (user.role === 'question_creator') {
                            window.location.href = 'add_question.html';
                        } else {
                            window.location.href = 'play.html';
                        }
                    }, 1000);
                })
                .catch(error => {
                    showMessage('❌ هەڵە لە گەیاندن بە داتابەیس: ' + error.message, 'error');
                });
        };
        
        // Show message
        function showMessage(msg, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = msg;
            messageDiv.className = 'message ' + type;
            
            setTimeout(() => {
                messageDiv.className = 'message';
            }, 3000);
        }
        
        // Check if already logged in
        function checkAlreadyLoggedIn() {
            const loggedInUser = localStorage.getItem('loggedInUser');
            if (loggedInUser) {
                const user = JSON.parse(loggedInUser);
                if (user.role === 'admin') {
                    window.location.href = 'user_management.html';
                } else if (user.role === 'presenter') {
                    window.location.href = 'presenter.html';
                } else if (user.role === 'player') {
                    window.location.href = 'play.html';
                } else if (user.role === 'question_creator') {
                    window.location.href = 'add_question.html';
                }
            }
        }
        
        // Enter key press
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });
        
        // Initialize
        createDefaultAdmin();
        checkAlreadyLoggedIn();
    </script>
</body>
</html>
