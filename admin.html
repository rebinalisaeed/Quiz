<!DOCTYPE html>
<html dir="rtl">
<head>
    <title>دانان و تۆمارکردنی پرسیارەکان</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @font-face { font-family: 'K24Kurdish'; src: url('K24KurdishBold-Bold.ttf') format('truetype'); }
        * { font-family: 'K24Kurdish', 'Segoe UI', sans-serif; box-sizing: border-box; }
        body { background: #1e1e2f; margin: 0; padding: 20px; min-height: 100vh; }
        .container { max-width: 1400px; margin: auto; }
        h1 { color: white; text-align: center; margin-bottom: 30px; font-size: 24px; }
        .category-tabs { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-bottom: 30px; }
        .tab-btn { background: rgba(255,255,255,0.15); backdrop-filter: blur(5px); border: 2px solid rgba(255,255,255,0.2); border-radius: 40px; padding: 10px 20px; font-size: 16px; color: white; cursor: pointer; transition: all 0.2s; }
        .tab-btn.active { background: #4CAF50; border-color: #2e7d32; }
        .glass-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 25px; padding: 25px; margin-bottom: 30px; }
        .glass-card h3 { color: white; text-align: center; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 15px; border: none; background: rgba(255,255,255,0.9); font-size: 14px; }
        .options-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin: 15px 0; }
        .button-group { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin-top: 20px; }
        button { padding: 12px 25px; border: none; border-radius: 30px; font-size: 16px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-add { background: #2196F3; color: white; }
        .btn-export { background: #ff9800; color: white; }
        .btn-logout { background: #ff6b6b; color: white; display: block; width: 200px; margin: 20px auto 0; }
        .btn-user-mgmt { background: #9c27b0; color: white; margin-bottom: 20px; }
        .questions-list { background: rgba(0,0,0,0.3); border-radius: 20px; padding: 20px; margin-top: 20px; max-height: 500px; overflow-y: auto; }
        .question-item { background: rgba(255,255,255,0.1); border-radius: 15px; padding: 12px; margin-bottom: 10px; color: white; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .question-text { flex: 1; font-size: 13px; }
        .delete-question { background: #f44336; border-radius: 20px; padding: 5px 12px; cursor: pointer; color: white; border: none; }
        .progress-bar { background: rgba(255,255,255,0.2); border-radius: 20px; height: 8px; margin-bottom: 15px; }
        .progress-fill { background: #4CAF50; border-radius: 20px; height: 8px; width: 0%; }
        @media (max-width: 600px) { .options-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <div style="display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; flex-wrap: wrap;">
        <button class="btn-user-mgmt" onclick="goToUserManagement()">👥 بەڕێوەبردنی بەکارهێنەران</button>
    </div>
    <h1>📝 دانان و تۆمارکردنی پرسیارەکان (٤٥ پرسیار بۆ هەر کەتەگۆری)</h1>
    
    <div class="category-tabs" id="categoryTabs"></div>
    
    <div class="glass-card">
        <h3>➕ زیادکردنی پرسیاری نوێ</h3>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <input type="text" id="questionText" placeholder="پرسیارەکە لێرە بنووسە">
        <div class="options-row">
            <input type="text" id="optA" placeholder="هەڵبژاردەی A">
            <input type="text" id="optB" placeholder="هەڵبژاردەی B">
            <input type="text" id="optC" placeholder="هەڵبژاردەی C">
            <input type="text" id="optD" placeholder="هەڵبژاردەی D">
        </div>
        <select id="correctOpt">
            <option value="A">وەڵامی ڕاست: A</option>
            <option value="B">وەڵامی ڕاست: B</option>
            <option value="C">وەڵامی ڕاست: C</option>
            <option value="D">وەڵامی ڕاست: D</option>
        </select>
        
        <div class="button-group">
            <button class="btn-add" onclick="addQuestionToCurrent()">➕ زیادکردنی پرسیار</button>
            <button class="btn-export" onclick="exportData()">📤 Export کردن</button>
        </div>
    </div>
    
    <div class="questions-list">
        <h4>📋 پرسیارەکان</h4>
        <div id="questionsContainer"></div>
    </div>
    
    <button class="btn-logout" onclick="logout()">🚪 دەرچوون</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCtiW-RBMY0emCOFZdQCA7ynPESraUknxI",
        authDomain: "quizgamerebin.firebaseapp.com",
        databaseURL: "https://quizgamerebin-default-rtdb.firebaseio.com",
        projectId: "quizgamerebin",
        storageBucket: "quizgamerebin.firebasestorage.app",
        messagingSenderId: "312376681830",
        appId: "1:312376681830:web:11262fa62cc9246bac14a7",
        measurementId: "G-BJM04Q5X44"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    const MAX_QUESTIONS = 45;
    const defaultCategories = ["مێژوو", "زانست", "ئەدەبیات", "هونەر", "وەرزش", "تەکنەلۆژیا", "تەندروستی", "جوگرافیا", "ئاینی"];
    
    let categories = {};
    let currentCategory = "";
    let roomId = localStorage.getItem("roomId") || "quiz_room_main";
    let currentUser = JSON.parse(localStorage.getItem("loggedInUser") || "{}");
    
    if(currentUser.role === "player") {
        alert("⚠️ تۆ مافی زیادکردنی پرسیارت نییە! تەنها یاریکەریت.");
        window.location.href = "play.html";
    }
    
    function goToUserManagement() {
        window.location.href = "user_management.html";
    }
    
    function loadDataFromFirebase() {
        database.ref(`${roomId}/categories`).on('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                categories = data;
            } else {
                categories = {};
                defaultCategories.forEach(cat => { categories[cat] = []; });
            }
            if(!currentCategory && defaultCategories.length > 0) currentCategory = defaultCategories[0];
            renderTabs();
            renderQuestionsList();
            updateProgress();
        });
    }
    
    function saveToFirebase() {
        database.ref(`${roomId}/categories`).set(categories);
    }
    
    function renderTabs() {
        const container = document.getElementById("categoryTabs");
        container.innerHTML = "";
        for(let cat of defaultCategories) {
            const btn = document.createElement("button");
            const count = categories[cat]?.length || 0;
            btn.textContent = `${cat} (${count}/${MAX_QUESTIONS})`;
            btn.className = "tab-btn";
            if(cat === currentCategory) btn.classList.add("active");
            btn.onclick = () => { currentCategory = cat; renderTabs(); renderQuestionsList(); updateProgress(); clearForm(); };
            container.appendChild(btn);
        }
    }
    
    function updateProgress() {
        if(!currentCategory) return;
        const count = categories[currentCategory]?.length || 0;
        document.getElementById("progressFill").style.width = (count / MAX_QUESTIONS) * 100 + "%";
    }
    
    function clearForm() {
        document.getElementById("questionText").value = "";
        document.getElementById("optA").value = "";
        document.getElementById("optB").value = "";
        document.getElementById("optC").value = "";
        document.getElementById("optD").value = "";
        document.getElementById("correctOpt").value = "A";
    }
    
    function addQuestionToCurrent() {
        if(!currentCategory) return alert("کەتەگۆری هەڵبژێرە!");
        
        const qText = document.getElementById("questionText").value.trim();
        const optA = document.getElementById("optA").value.trim();
        const optB = document.getElementById("optB").value.trim();
        const optC = document.getElementById("optC").value.trim();
        const optD = document.getElementById("optD").value.trim();
        const correct = document.getElementById("correctOpt").value;
        
        if(!qText || !optA || !optB || !optC || !optD) return alert("هەموو خانەکان پڕ بکەوە!");
        if(categories[currentCategory].length >= MAX_QUESTIONS) return alert(`پڕە! تەنها ${MAX_QUESTIONS} پرسیار دەگرێت.`);
        
        categories[currentCategory].push({ text: qText, options: [optA, optB, optC, optD], correct: correct });
        saveToFirebase();
        renderQuestionsList();
        clearForm();
        renderTabs();
        updateProgress();
        alert("✅ پرسیار زیاد کرا!");
    }
    
    function exportData() {
        const dataStr = JSON.stringify(categories, null, 2);
        const blob = new Blob([dataStr], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "questions_backup.json";
        a.click();
        URL.revokeObjectURL(url);
        alert("📁 پشتیوانی گیرا!");
    }
    
    function renderQuestionsList() {
        const container = document.getElementById("questionsContainer");
        if(!currentCategory || !categories[currentCategory]) {
            container.innerHTML = "<div class='empty-msg' style='color:white;text-align:center;'>هیچ پرسیارێک نییە</div>";
            return;
        }
        const questions = categories[currentCategory];
        if(questions.length === 0) {
            container.innerHTML = "<div class='empty-msg' style='color:white;text-align:center;'>هیچ پرسیارێک نییە</div>";
            return;
        }
        let html = "";
        questions.forEach((q, idx) => {
            html += `<div class="question-item">
                        <div class="question-text"><strong>${idx+1}.</strong> ${q.text.substring(0, 60)}<br><small>${q.options.map((o,i)=>String.fromCharCode(65+i)+'. '+o.substring(0,20)).join(' | ')}</small><br><span style="color:#4CAF50;">✅ ڕاست: ${q.correct}</span></div>
                        <button class="delete-question" onclick="deleteQuestion(${idx})">🗑️ سڕینەوە</button>
                    </div>`;
        });
        container.innerHTML = html;
    }
    
    function deleteQuestion(index) {
        if(confirm("دڵنیایت لە سڕینەوەی ئەم پرسیارە؟")) {
            categories[currentCategory].splice(index, 1);
            saveToFirebase();
            renderQuestionsList();
            renderTabs();
            updateProgress();
            alert("✅ پرسیار سڕایەوە!");
        }
    }
    
    function logout() {
        localStorage.removeItem("loggedInUser");
        localStorage.removeItem("roomId");
        window.location.href = "index.html";
    }
    
    loadDataFromFirebase();
</script>
</body>
</html>
