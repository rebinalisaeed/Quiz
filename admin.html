<!DOCTYPE html>
<html dir="rtl">
<head>
    <title>بەڕێوەبردن - پرسیارەکان</title>
    <meta charset="UTF-8">
    <style>
        * { font-family: 'Segoe UI', sans-serif; }
        body { background: #1e1e2f; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        h1 { color: white; text-align: center; }
        .glass-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 20px; padding: 20px; margin-bottom: 30px; }
        input, select, textarea { width: 100%; padding: 10px; margin: 8px 0; border-radius: 12px; border: none; }
        button { background: #4CAF50; color: white; padding: 10px 20px; border: none; border-radius: 12px; cursor: pointer; margin: 5px; }
        .category-grid { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px; }
        .category-box { background: rgba(255,255,255,0.15); border-radius: 20px; padding: 15px; width: 250px; backdrop-filter: blur(5px); color: white; }
        .question-item { background: rgba(0,0,0,0.3); margin: 10px 0; padding: 10px; border-radius: 10px; }
        hr { border-color: rgba(255,255,255,0.2); }
    </style>
</head>
<body>
<div class="container">
    <h1>📝 بەڕێوەبردنی کەتەگۆری و پرسیارەکان</h1>
    
    <div class="glass-card">
        <h3>➕ زیادکردنی کەتەگۆری نوێ</h3>
        <input type="text" id="newCatName" placeholder="ناوی کەتەگۆری (وەک: وەرزش، مێژوو، جوگرافیا)">
        <button onclick="addCategory()">زیادکردنی کەتەگۆری</button>
    </div>

    <div class="glass-card">
        <h3>📌 زیادکردنی پرسیار بۆ کەتەگۆری</h3>
        <select id="catSelect"></select>
        <input type="text" id="questionText" placeholder="پرسیارەکە">
        <input type="text" id="optA" placeholder="هەڵبژاردەی 1">
        <input type="text" id="optB" placeholder="هەڵبژاردەی 2">
        <input type="text" id="optC" placeholder="هەڵبژاردەی 3">
        <input type="text" id="optD" placeholder="هەڵبژاردەی 4">
        <select id="correctOpt">
            <option value="A">هەڵبژاردەی A</option>
            <option value="B">هەڵبژاردەی B</option>
            <option value="C">هەڵبژاردەی C</option>
            <option value="D">هەڵبژاردەی D</option>
        </select>
        <button onclick="addQuestion()">زیادکردنی پرسیار</button>
    </div>

    <div id="categoriesList"></div>
    <button onclick="logout()">🚪 دەرچوون</button>
</div>

<script>
    let categories = JSON.parse(localStorage.getItem("categories")) || {};

    function saveCategories() {
        localStorage.setItem("categories", JSON.stringify(categories));
        renderCategories();
        updateCategorySelect();
    }

    function addCategory() {
        let name = document.getElementById("newCatName").value.trim();
        if(name && !categories[name]) {
            categories[name] = [];
            saveCategories();
            document.getElementById("newCatName").value = "";
        } else alert("کەتەگۆری پێشتر هەیە یان ناوەکە بەتاڵە!");
    }

    function addQuestion() {
        let cat = document.getElementById("catSelect").value;
        if(!cat || !categories[cat]) return alert("کەتەگۆری هەڵبژێرە!");
        let qText = document.getElementById("questionText").value;
        let optA = document.getElementById("optA").value;
        let optB = document.getElementById("optB").value;
        let optC = document.getElementById("optC").value;
        let optD = document.getElementById("optD").value;
        let correct = document.getElementById("correctOpt").value;
        if(!qText || !optA || !optB || !optC || !optD) return alert("تکایە هەموو خانەکان پڕ بکەوە!");
        
        if(categories[cat].length >= 8) return alert("کەتەگۆرییەکە پڕە (٨ پرسیار)! دەتوانیت کەتەگۆری نوێ دروست بکەیت.");
        
        categories[cat].push({ text: qText, options: [optA, optB, optC, optD], correct: correct });
        document.getElementById("questionText").value = "";
        document.getElementById("optA").value = "";
        document.getElementById("optB").value = "";
        document.getElementById("optC").value = "";
        document.getElementById("optD").value = "";
        saveCategories();
    }

    function renderCategories() {
        let html = "<div class='category-grid'>";
        for(let cat in categories) {
            html += `<div class='category-box'><h3>📂 ${cat}</h3>`;
            categories[cat].forEach((q, idx) => {
                html += `<div class='question-item'>${idx+1}. ${q.text.substring(0, 30)}...</div>`;
            });
            html += `<button onclick='deleteCategory("${cat}")'>🗑️ سڕینەوەی کەتەگۆری</button></div>`;
        }
        html += "</div>";
        document.getElementById("categoriesList").innerHTML = html;
    }

    function updateCategorySelect() {
        let select = document.getElementById("catSelect");
        select.innerHTML = "";
        for(let cat in categories) {
            let opt = document.createElement("option");
            opt.value = cat;
            opt.textContent = cat;
            select.appendChild(opt);
        }
    }

    function deleteCategory(cat) {
        if(confirm("دڵنیایت لە سڕینەوەی کەتەگۆری و هەموو پرسیارەکانی؟")) {
            delete categories[cat];
            saveCategories();
        }
    }

    function logout() {
        localStorage.removeItem("isAdmin");
        window.location.href = "index.html";
    }

    if(localStorage.getItem("isAdmin") !== "true") window.location.href = "index.html";
    updateCategorySelect();
    renderCategories();
</script>
</body>
</html>
