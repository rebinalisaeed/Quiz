<!DOCTYPE html>
<html dir="rtl">
<head>
    <title>دانان و تۆمارکردنی پرسیارەکان</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @font-face {
            font-family: 'K24Kurdish';
            src: url('K24KurdishBold-Bold.ttf') format('truetype');
        }
        
        * {
            font-family: 'K24Kurdish', 'Segoe UI', sans-serif;
            box-sizing: border-box;
        }
        
        body {
            background: #1e1e2f;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: auto;
        }
        
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .category-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 30px;
        }
        
        .tab-btn {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 40px;
            padding: 10px 20px;
            font-size: 16px;
            font-family: 'K24Kurdish', 'Segoe UI', sans-serif;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .tab-btn.active {
            background: #4CAF50;
            border-color: #2e7d32;
            box-shadow: 0 0 10px rgba(76,175,80,0.5);
        }
        
        .tab-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }
        
        .glass-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 30px;
        }
        
        .glass-card h3 {
            color: white;
            margin-bottom: 20px;
            text-align: center;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 15px;
            border: none;
            font-family: 'K24Kurdish', 'Segoe UI', sans-serif;
            font-size: 14px;
            background: rgba(255,255,255,0.9);
        }
        
        .options-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 15px 0;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        button {
            padding: 12px 25px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-family: 'K24Kurdish', 'Segoe UI', sans-serif;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }
        
        .btn-add {
            background: #2196F3;
            color: white;
        }
        
        .btn-add:hover {
            background: #0b7dda;
            transform: scale(1.02);
        }
        
        .btn-save {
            background: #4CAF50;
            color: white;
        }
        
        .btn-save:hover {
            background: #45a049;
            transform: scale(1.02);
        }
        
        .btn-export {
            background: #ff9800;
            color: white;
        }
        
        .btn-export:hover {
            background: #e68900;
            transform: scale(1.02);
        }
        
        .btn-logout {
            background: #ff6b6b;
            color: white;
            margin-top: 20px;
            display: block;
            width: 200px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .questions-list {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .questions-list h4 {
            color: white;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .question-item {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 12px;
            margin-bottom: 10px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .question-text {
            flex: 1;
            font-size: 14px;
        }
        
        .delete-question {
            background: #f44336;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 5px 12px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .delete-question:hover {
            background: #d32f2f;
        }
        
        .empty-msg {
            color: rgba(255,255,255,0.6);
            text-align: center;
            padding: 20px;
        }
        
        @media (max-width: 600px) {
            .options-row { grid-template-columns: 1fr; }
            .tab-btn { padding: 6px 12px; font-size: 12px; }
            .button-group { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📝 دانان و تۆمار کردنی پرسیارەکان</h1>
    
    <div class="category-tabs" id="categoryTabs"></div>
    
    <div class="glass-card">
        <h3>➕ زیادکردنی پرسیاری نوێ بۆ کەتەگۆری هەڵبژێردراو</h3>
        <input type="text" id="questionText" placeholder="پرسیارەکە لێرە بنووسە">
        <div class="options-row">
            <input type="text" id="optA" placeholder="هەڵبژاردەی A">
            <input type="text" id="optB" placeholder="هەڵبژاردەی B">
            <input type="text" id="optC" placeholder="هەڵبژاردەی C">
            <input type="text" id="optD" placeholder="هەڵبژاردەی D">
        </div>
        <select id="correctOpt">
            <option value="A">وەڵامی ڕاست: A</option>
            <option value="B">وەڵامی ڕاست: B</option>
            <option value="C">وەڵامی ڕاست: C</option>
            <option value="D">وەڵامی ڕاست: D</option>
        </select>
        
        <div class="button-group">
            <button class="btn-add" onclick="addQuestionToCurrent()">➕ زیادکردنی پرسیار</button>
            <button class="btn-save" onclick="saveAllCategories()">💾 سەیڤ کردن بە شێوەی خۆکار</button>
            <button class="btn-export" onclick="exportData()">📤 Export کردن (پاشەکەوتکردن)</button>
        </div>
    </div>
    
    <div class="questions-list" id="questionsList">
        <h4>📋 پرسیارەکانی ئەم کەتەگۆرییە</h4>
        <div id="questionsContainer"></div>
    </div>
    
    <button class="btn-logout" onclick="logout()">🚪 دەرچوون</button>
</div>

<script>
    const defaultCategories = [
        "مێژوو", "زانست", "ئەدەبیات", "هونەر", "وەرزش", 
        "بیرکاری", "تەکنەلۆژیا", "تەندروستی", "جوگرافیا", 
        "ئاینی", "کوردستان", "فیلم و دراما"
    ];
    
    let categories = {};
    let currentCategory = "";
    
    // ناچالاککردنی راستکلیک
    document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        return false;
    });
    
    window.addEventListener('keydown', function(e) {
        if(e.key === 'F5' || 
           (e.ctrlKey && e.key === 'r') || 
           (e.ctrlKey && e.shiftKey && e.key === 'R') ||
           (e.metaKey && e.key === 'r')) {
            e.preventDefault();
            return false;
        }
    });
    
    function loadData() {
        const stored = localStorage.getItem("categories");
        if(stored) {
            categories = JSON.parse(stored);
        } else {
            categories = {};
        }
        
        defaultCategories.forEach(cat => {
            if(!categories[cat]) {
                categories[cat] = [];
            }
        });
        
        if(!currentCategory && defaultCategories.length > 0) {
            currentCategory = defaultCategories[0];
        }
        
        renderTabs();
        renderQuestionsList();
    }
    
    function renderTabs() {
        const container = document.getElementById("categoryTabs");
        container.innerHTML = "";
        for(let cat of defaultCategories) {
            const btn = document.createElement("button");
            btn.textContent = cat;
            btn.className = "tab-btn";
            if(cat === currentCategory) {
                btn.classList.add("active");
            }
            btn.onclick = (function(category) {
                return function() { switchCategory(category); };
            })(cat);
            container.appendChild(btn);
        }
    }
    
    function switchCategory(category) {
        currentCategory = category;
        renderTabs();
        renderQuestionsList();
        clearForm();
    }
    
    function clearForm() {
        document.getElementById("questionText").value = "";
        document.getElementById("optA").value = "";
        document.getElementById("optB").value = "";
        document.getElementById("optC").value = "";
        document.getElementById("optD").value = "";
        document.getElementById("correctOpt").value = "A";
    }
    
    function addQuestionToCurrent() {
        if(!currentCategory) {
            alert("تکایە یەکەم کەتەگۆری هەڵبژێرە!");
            return;
        }
        
        const qText = document.getElementById("questionText").value.trim();
        const optA = document.getElementById("optA").value.trim();
        const optB = document.getElementById("optB").value.trim();
        const optC = document.getElementById("optC").value.trim();
        const optD = document.getElementById("optD").value.trim();
        const correct = document.getElementById("correctOpt").value;
        
        if(!qText || !optA || !optB || !optC || !optD) {
            alert("تکایە هەموو خانەکان پڕ بکەوە (پرسیار و چوار هەڵبژاردە)!");
            return;
        }
        
        if(categories[currentCategory].length >= 8) {
            alert(`کەتەگۆری ${currentCategory} پڕە! تەنها 8 پرسیار دەگرێت.`);
            return;
        }
        
        const newQuestion = {
            text: qText,
            options: [optA, optB, optC, optD],
            correct: correct
        };
        categories[currentCategory].push(newQuestion);
        
        renderQuestionsList();
        clearForm();
        saveAllCategories();
        alert("✅ پرسیار زیاد کرا و خۆکارانە هەڵگیرا!");
    }
    
    function saveAllCategories() {
        localStorage.setItem("categories", JSON.stringify(categories));
    }
    
    function exportData() {
        const dataStr = JSON.stringify(categories, null, 2);
        const blob = new Blob([dataStr], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "questions_backup.json";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        alert("📁 هەموو پرسیارەکان بە سەرکەوتوویی پاشەکەوت کرا!");
    }
    
    function renderQuestionsList() {
        const container = document.getElementById("questionsContainer");
        if(!currentCategory || !categories[currentCategory]) {
            container.innerHTML = "<div class='empty-msg'>هیچ کەتەگۆرییەک هەڵنەبژێراوە</div>";
            return;
        }
        
        const questions = categories[currentCategory];
        if(questions.length === 0) {
            container.innerHTML = "<div class='empty-msg'>هیچ پرسیارێک لەم کەتەگۆرییەدا نییە. سەرەتا پرسیارێک زیاد بکە.</div>";
            return;
        }
        
        let html = "";
        questions.forEach((q, idx) => {
            const optionsText = q.options.map((opt, i) => {
                const letter = String.fromCharCode(65+i);
                return `${letter}. ${opt}`;
            }).join(" | ");
            html += `
                <div class="question-item">
                    <div class="question-text">
                        <strong>${idx+1}.</strong> ${q.text}<br>
                        <small style="opacity:0.7;">${optionsText}</small><br>
                        <span style="color:#4CAF50;">✅ وەڵامی ڕاست: ${q.correct}</span>
                    </div>
                    <button class="delete-question" onclick="deleteQuestion(${idx})">🗑️ سڕینەوە</button>
                </div>
            `;
        });
        container.innerHTML = html;
    }
    
    function deleteQuestion(index) {
        if(confirm("دڵنیایت لە سڕینەوەی ئەم پرسیارە؟")) {
            categories[currentCategory].splice(index, 1);
            renderQuestionsList();
            saveAllCategories();
            alert("پرسیار سڕایەوە و گۆڕانکارییەکان هەڵگیران.");
        }
    }
    
    function logout() {
        localStorage.removeItem("isAdmin");
        window.location.href = "index.html";
    }
    
    if(localStorage.getItem("isAdmin") !== "true") {
        window.location.href = "index.html";
    }
    
    loadData();
</script>
</body>
</html>
