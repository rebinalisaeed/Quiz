<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>زیادکردنی پرسیار</title>
    <style>
        @font-face {
            font-family: 'K24KurdishBold-Bold';
            src: url('fonts/K24KurdishBold-Bold.ttf') format('truetype');
        }
        
        @font-face {
            font-family: 'K24KurdishLight-Light';
            src: url('fonts/K24KurdishLight-Light.ttf') format('truetype');
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        
        body {
            font-family: 'K24KurdishBold-Bold', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .header h1 {
            color: #667eea;
            font-size: 28px;
        }
        
        .header-buttons {
            display: flex;
            gap: 15px;
        }
        
        .logout-btn, .export-btn {
            padding: 10px 25px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            font-family: 'K24KurdishBold-Bold', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .logout-btn {
            background: #ff4757;
            color: white;
        }
        
        .logout-btn:hover {
            background: #ff3838;
            transform: translateY(-2px);
        }
        
        .export-btn {
            background: #4CAF50;
            color: white;
        }
        
        .export-btn:hover {
            background: #45a049;
            transform: translateY(-2px);
        }
        
        .categories-tabs {
            background: white;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        
        .category-tab {
            padding: 12px 20px;
            background: #f0f0f0;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'K24KurdishBold-Bold', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .category-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: scale(1.05);
        }
        
        .category-tab:hover:not(.active) {
            background: #e0e0e0;
            transform: translateY(-2px);
        }
        
        .form-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .form-title {
            color: #333;
            margin-bottom: 25px;
            font-size: 24px;
            border-right: 4px solid #667eea;
            padding-right: 15px;
        }
        
        .question-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 20px;
            font-family: 'K24KurdishLight-Light', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            resize: vertical;
        }
        
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .option-input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            font-family: 'K24KurdishLight-Light', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .correct-select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 20px;
            font-family: 'K24KurdishBold-Bold', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            cursor: pointer;
        }
        
        .add-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
            font-family: 'K24KurdishBold-Bold', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .add-btn:hover {
            transform: translateY(-2px);
        }
        
        .questions-list-container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .question-item {
            background: #f9f9f9;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .question-text {
            flex: 1;
            font-size: 16px;
            color: #333;
            font-family: 'K24KurdishLight-Light', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .question-actions {
            display: flex;
            gap: 10px;
        }
        
        .edit-question-btn, .delete-question-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            font-family: 'K24KurdishBold-Bold', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .edit-question-btn {
            background: #4CAF50;
            color: white;
        }
        
        .delete-question-btn {
            background: #f44336;
            color: white;
        }
        
        .limit-reached {
            background: #ff4757;
            color: white;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            margin-top: 10px;
        }
        
        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        
        .message.success {
            background: #4CAF50;
        }
        
        .message.error {
            background: #f44336;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        @media (max-width: 768px) {
            .category-tab {
                padding: 8px 12px;
                font-size: 14px;
            }
            
            .question-item {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .question-actions {
                align-self: flex-end;
            }
            
            .header {
                flex-direction: column;
                gap: 15px;
            }
            
            .header-buttons {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 زیادکردنی پرسیار</h1>
            <div class="header-buttons">
                <button class="export-btn" onclick="exportQuestions()">📤 Export JSON</button>
                <button class="logout-btn" onclick="logout()">🚪 دەرچوون</button>
            </div>
        </div>
        
        <div class="categories-tabs" id="categoriesTabs"></div>
        
        <div class="form-card">
            <h2 class="form-title">➕ زیادکردنی پرسیاری نوێ</h2>
            <textarea id="questionText" class="question-input" rows="3" placeholder="پرسیارەکە لێرە بنوسە..."></textarea>
            <div class="options-grid">
                <input type="text" id="option0" class="option-input" placeholder="هەڵبژاردەی 1">
                <input type="text" id="option1" class="option-input" placeholder="هەڵبژاردەی 2">
                <input type="text" id="option2" class="option-input" placeholder="هەڵبژاردەی 3">
                <input type="text" id="option3" class="option-input" placeholder="هەڵبژاردەی 4">
            </div>
            <select id="correctAnswer" class="correct-select">
                <option value="0">هەڵبژاردەی 1</option>
                <option value="1">هەڵبژاردەی 2</option>
                <option value="2">هەڵبژاردەی 3</option>
                <option value="3">هەڵبژاردەی 4</option>
            </select>
            <button class="add-btn" onclick="addQuestion()">➕ زیادکردنی پرسیار</button>
            <div id="limitWarning" style="display: none;" class="limit-reached">⚠️ ئەم کەتەگۆریە پڕە! (36 پرسیار)</div>
        </div>
        
        <div class="questions-list-container">
            <h2 class="form-title">📋 پرسیارەکان</h2>
            <div id="questionsList"></div>
        </div>
    </div>
    
    <script type="module">
        import { db, ref, get, set, push, remove, update, onValue } from './firebase-config.js';
        
        const categories = ['مێژوو', 'زانست', 'ئەدەبییات', 'هونەر', 'وەرزش', 'تەکنەلۆژیا', 'تەندروستی', 'جوگرافیا', 'ئایینی'];
        const categoryKeys = ['history', 'science', 'literature', 'art', 'sports', 'technology', 'health', 'geography', 'religion'];
        
        let currentCategory = 'history';
        let editingQuestionId = null;
        let editingCategory = null;
        
        function createTabs() {
            const container = document.getElementById('categoriesTabs');
            container.innerHTML = '';
            categories.forEach((cat, index) => {
                const button = document.createElement('button');
                button.className = `category-tab ${index === 0 ? 'active' : ''}`;
                button.textContent = cat;
                button.onclick = () => {
                    document.querySelectorAll('.category-tab').forEach(btn => btn.classList.remove('active'));
                    button.classList.add('active');
                    currentCategory = categoryKeys[index];
                    loadQuestionsForCategory(currentCategory);
                    clearForm();
                };
                container.appendChild(button);
            });
        }
        
        async function loadQuestionsForCategory(categoryKey) {
            const questionsRef = ref(db, `categories/${categoryKey}/questions`);
            onValue(questionsRef, (snapshot) => {
                const container = document.getElementById('questionsList');
                if (snapshot.exists()) {
                    const questions = snapshot.val();
                    const questionCount = Object.keys(questions).length;
                    
                    if (questionCount >= 36) {
                        document.getElementById('limitWarning').style.display = 'block';
                    } else {
                        document.getElementById('limitWarning').style.display = 'none';
                    }
                    
                    let html = `<div style="margin-bottom: 10px;">📊 ژمارەی پرسیارەکان: ${questionCount}/36</div>`;
                    
                    for (let qId in questions) {
                        const q = questions[qId];
                        html += `
                            <div class="question-item" data-id="${qId}" data-category="${categoryKey}">
                                <div class="question-text">
                                    <strong>📌 پرسیار:</strong> ${q.text}<br>
                                    <small>✅ وەڵامی ڕاست: ${q.options[q.correct]}</small>
                                </div>
                                <div class="question-actions">
                                    <button class="edit-question-btn" onclick='editQuestion("${categoryKey}", "${qId}", ${JSON.stringify(q).replace(/'/g, "&#39;")})'>✏️ دەستکاری</button>
                                    <button class="delete-question-btn" onclick='deleteQuestion("${categoryKey}", "${qId}")'>🗑️ سڕینەوە</button>
                                </div>
                            </div>
                        `;
                    }
                    
                    if (questionCount === 0) {
                        html += '<div style="text-align: center; padding: 40px; color: #999;">هیچ پرسیارێک نییە. تکایە پرسیارێک زیاد بکە</div>';
                    }
                    
                    container.innerHTML = html;
                } else {
                    container.innerHTML = '<div style="text-align: center; padding: 40px; color: #999;">هیچ پرسیارێک نییە. تکایە پرسیارێک زیاد بکە</div>';
                    document.getElementById('limitWarning').style.display = 'none';
                }
            });
        }
        
        window.addQuestion = async function() {
            const questionText = document.getElementById('questionText').value.trim();
            const options = [
                document.getElementById('option0').value.trim(),
                document.getElementById('option1').value.trim(),
                document.getElementById('option2').value.trim(),
                document.getElementById('option3').value.trim()
            ];
            const correct = parseInt(document.getElementById('correctAnswer').value);
            
            if (!questionText) {
                showMessage('تکایە پرسیارەکە بنوسە', 'error');
                return;
            }
            
            for (let i = 0; i < options.length; i++) {
                if (!options[i]) {
                    showMessage(`تکایە هەڵبژاردەی ${i+1} پڕ بکەرەوە`, 'error');
                    return;
                }
            }
            
            const questionsRef = ref(db, `categories/${currentCategory}/questions`);
            const snapshot = await get(questionsRef);
            let currentCount = 0;
            if (snapshot.exists()) {
                currentCount = Object.keys(snapshot.val()).length;
            }
            
            if (currentCount >= 36) {
                showMessage('ئەم کەتەگۆریە پڕە! ناتوانیت زیاتر پرسیار زیاد بکەیت', 'error');
                return;
            }
            
            const questionData = {
                text: questionText,
                options: options,
                correct: correct,
                used: false,
                createdAt: new Date().toISOString()
            };
            
            if (editingQuestionId && editingCategory === currentCategory) {
                await update(ref(db, `categories/${currentCategory}/questions/${editingQuestionId}`), questionData);
                showMessage('پرسیار نوێ کرایەوە', 'success');
                editingQuestionId = null;
                editingCategory = null;
                document.querySelector('.add-btn').innerHTML = '➕ زیادکردنی پرسیار';
            } else {
                const newQuestionRef = push(ref(db, `categories/${currentCategory}/questions`));
                await set(newQuestionRef, questionData);
                showMessage('پرسیار بە سەرکەوتوویی زیاد کرا', 'success');
            }
            
            clearForm();
        }
        
        window.editQuestion = function(categoryKey, questionId, question) {
            editingQuestionId = questionId;
            editingCategory = categoryKey;
            
            const categoryIndex = categoryKeys.indexOf(categoryKey);
            if (categoryIndex !== -1) {
                document.querySelectorAll('.category-tab')[categoryIndex].click();
            }
            
            document.getElementById('questionText').value = question.text;
            document.getElementById('option0').value = question.options[0];
            document.getElementById('option1').value = question.options[1];
            document.getElementById('option2').value = question.options[2];
            document.getElementById('option3').value = question.options[3];
            document.getElementById('correctAnswer').value = question.correct;
            
            document.querySelector('.add-btn').innerHTML = '✏️ نوێکردنەوەی پرسیار';
            document.querySelector('.form-card').scrollIntoView({ behavior: 'smooth' });
        };
        
        window.deleteQuestion = async function(categoryKey, questionId) {
            if (confirm('دڵنیایت دەتەوێت ئەم پرسیارە بسڕیتەوە؟')) {
                await remove(ref(db, `categories/${categoryKey}/questions/${questionId}`));
                showMessage('پرسیار سڕایەوە', 'success');
            }
        };
        
        window.exportQuestions = async function() {
            const exportData = {};
            
            for (let i = 0; i < categoryKeys.length; i++) {
                const categoryKey = categoryKeys[i];
                const questionsRef = ref(db, `categories/${categoryKey}/questions`);
                const snapshot = await get(questionsRef);
                
                if (snapshot.exists()) {
                    const questions = snapshot.val();
                    const cleanQuestions = {};
                    for (let qId in questions) {
                        cleanQuestions[qId] = {
                            text: questions[qId].text,
                            options: questions[qId].options,
                            correct: questions[qId].correct
                        };
                    }
                    exportData[categoryKey] = cleanQuestions;
                } else {
                    exportData[categoryKey] = {};
                }
            }
            
            const jsonStr = JSON.stringify(exportData, null, 2);
            const blob = new Blob([jsonStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `questions_export_${new Date().toISOString().slice(0,19)}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            showMessage('پرسیارەکان بە سەرکەوتوویی export کرا', 'success');
        };
        
        function clearForm() {
            document.getElementById('questionText').value = '';
            document.getElementById('option0').value = '';
            document.getElementById('option1').value = '';
            document.getElementById('option2').value = '';
            document.getElementById('option3').value = '';
            document.getElementById('correctAnswer').value = '0';
            document.querySelector('.add-btn').innerHTML = '➕ زیادکردنی پرسیار';
            editingQuestionId = null;
            editingCategory = null;
        }
        
        window.logout = function() {
            localStorage.removeItem('currentUser');
            window.location.href = 'login.html';
        }
        
        function showMessage(msg, type) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = msg;
            document.body.appendChild(messageDiv);
            setTimeout(() => {
                messageDiv.remove();
            }, 3000);
        }
        
        const currentUser = JSON.parse(localStorage.getItem('currentUser') || '{}');
        if (currentUser.role !== 'admin' && currentUser.role !== 'question_creator') {
            alert('تەنها ئەدمین و دروستکەری پرسیار دەتوانن ئەم پەڕەیە ببینن!');
            window.location.href = 'login.html';
        }
        
        createTabs();
        loadQuestionsForCategory('history');
    </script>
</body>
</html>
