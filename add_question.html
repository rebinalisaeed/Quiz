<!DOCTYPE html>
<html dir="rtl">
<head>
    <title>زیادکردنی پرسیار - دروستکری پرسیار</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @font-face { font-family: 'K24Kurdish'; src: url('K24KurdishBold-Bold.ttf') format('truetype'); }
        * { font-family: 'K24Kurdish', 'Segoe UI', sans-serif; box-sizing: border-box; }
        body { background: #1e1e2f; margin: 0; padding: 20px; min-height: 100vh; }
        .container { max-width: 1400px; margin: auto; }
        h1 { color: white; text-align: center; margin-bottom: 30px; font-size: 24px; }
        .category-tabs { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-bottom: 30px; }
        .tab-btn { background: rgba(255,255,255,0.15); backdrop-filter: blur(5px); border: 2px solid rgba(255,255,255,0.2); border-radius: 40px; padding: 10px 20px; font-size: 16px; color: white; cursor: pointer; transition: all 0.2s; }
        .tab-btn.active { background: #4CAF50; border-color: #2e7d32; box-shadow: 0 0 10px rgba(76,175,80,0.5); }
        .tab-btn:hover { background: rgba(255,255,255,0.3); transform: translateY(-2px); }
        .glass-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 25px; padding: 25px; margin-bottom: 30px; }
        .glass-card h3 { color: white; text-align: center; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 15px; border: none; background: rgba(255,255,255,0.9); font-size: 14px; }
        .options-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin: 15px 0; }
        button { padding: 12px 25px; border: none; border-radius: 30px; font-size: 16px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-add { background: #2196F3; color: white; width: 100%; margin-top: 15px; }
        .btn-add:hover { background: #0b7dda; transform: scale(1.02); }
        .btn-logout { background: #ff6b6b; color: white; display: block; width: 200px; margin: 20px auto 0; }
        .btn-logout:hover { background: #ff5252; transform: scale(1.02); }
        .questions-list { background: rgba(0,0,0,0.3); border-radius: 20px; padding: 20px; margin-top: 20px; max-height: 500px; overflow-y: auto; }
        .question-item { background: rgba(255,255,255,0.1); border-radius: 15px; padding: 12px; margin-bottom: 10px; color: white; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .question-text { flex: 1; font-size: 13px; }
        .delete-question { background: #f44336; color: white; border: none; border-radius: 20px; padding: 5px 12px; cursor: pointer; font-size: 12px; }
        .delete-question:hover { background: #d32f2f; }
        .progress-bar { background: rgba(255,255,255,0.2); border-radius: 20px; height: 8px; margin-bottom: 15px; }
        .progress-fill { background: #4CAF50; border-radius: 20px; height: 8px; width: 0%; transition: width 0.3s ease; }
        @media (max-width: 600px) { .options-row { grid-template-columns: 1fr; } .tab-btn { padding: 6px 12px; font-size: 12px; } }
    </style>
</head>
<body>
<div class="container">
    <h1>📝 زیادکردنی پرسیار (٣٦ پرسیار بۆ هەر کەتەگۆری)</h1>
    
    <div class="category-tabs" id="categoryTabs"></div>
    
    <div class="glass-card">
        <h3>➕ زیادکردنی پرسیاری نوێ</h3>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <input type="text" id="questionText" placeholder="پرسیارەکە لێرە بنووسە">
        <div class="options-row">
            <input type="text" id="optA" placeholder="هەڵبژاردەی A">
            <input type="text" id="optB" placeholder="هەڵبژاردەی B">
            <input type="text" id="optC" placeholder="هەڵبژاردەی C">
            <input type="text" id="optD" placeholder="هەڵبژاردەی D">
        </div>
        <select id="correctOpt">
            <option value="A">وەڵامی ڕاست: A</option>
            <option value="B">وەڵامی ڕاست: B</option>
            <option value="C">وەڵامی ڕاست: C</option>
            <option value="D">وەڵامی ڕاست: D</option>
        </select>
        <button class="btn-add" onclick="addQuestion()">➕ زیادکردنی پرسیار</button>
    </div>
    
    <div class="questions-list">
        <h4>📋 پرسیارەکان</h4>
        <div id="questionsContainer"></div>
    </div>
    
    <button class="btn-logout" onclick="logout()">🚪 دەرچوون</button>
</div>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAaKPSq0gBKaFG7Pfe-bGOpgEkz2TLnBS8",
        authDomain: "quizinrebin.firebaseapp.com",
        databaseURL: "https://quizinrebin-default-rtdb.firebaseio.com",
        projectId: "quizinrebin",
        storageBucket: "quizinrebin.firebasestorage.app",
        messagingSenderId: "40466121073",
        appId: "1:40466121073:web:766379012a8846c9d836d0",
        measurementId: "G-1TT4ZDJYCM"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    const MAX_QS = 36;
    const categoriesList = ["مێژوو", "زانست", "ئەدەبیات", "هونەر", "وەرزش", "تەکنەلۆژیا", "تەندروستی", "جوگرافیا", "ئاینی"];
    let categories = {}, currentCat = "";
    let roomId = localStorage.getItem("roomId") || "quiz_room_main";
    let currentUser = JSON.parse(localStorage.getItem("loggedInUser") || "{}");
    
    if(currentUser.role !== "question_creator" && currentUser.role !== "admin" && currentUser.role !== "super_admin") {
        alert("⚠️ تۆ مافی زیادکردنی پرسیارت نییە!");
        window.location.href = "play.html";
    }
    
    database.ref(`${roomId}/categories`).on('value', (s) => {
        categories = s.val() || {};
        categoriesList.forEach(c => { if(!categories[c]) categories[c] = []; });
        if(!currentCat && categoriesList.length) currentCat = categoriesList[0];
        renderTabs();
        renderQuestions();
        updateProgress();
    });
    
    function renderTabs() {
        const cont = document.getElementById("categoryTabs");
        cont.innerHTML = "";
        categoriesList.forEach(c => {
            const btn = document.createElement("button");
            btn.textContent = `${c} (${categories[c]?.length || 0}/${MAX_QS})`;
            btn.className = "tab-btn" + (c === currentCat ? " active" : "");
            btn.onclick = () => { currentCat = c; renderTabs(); renderQuestions(); updateProgress(); };
            cont.appendChild(btn);
        });
    }
    
    function updateProgress() {
        const count = categories[currentCat]?.length || 0;
        const percent = (count / MAX_QS) * 100;
        document.getElementById("progressFill").style.width = percent + "%";
    }
    
    function addQuestion() {
        const q = document.getElementById("questionText").value.trim();
        const a = document.getElementById("optA").value.trim();
        const b = document.getElementById("optB").value.trim();
        const c = document.getElementById("optC").value.trim();
        const d = document.getElementById("optD").value.trim();
        const cor = document.getElementById("correctOpt").value;
        
        if(!q || !a || !b || !c || !d) {
            alert("تکایە هەموو خانەکان پڕ بکەوە!");
            return;
        }
        if(categories[currentCat].length >= MAX_QS) {
            alert(`کەتەگۆری ${currentCat} پڕە! تەنها ${MAX_QS} پرسیار دەگرێت.`);
            return;
        }
        
        categories[currentCat].push({ text: q, options: [a, b, c, d], correct: cor });
        database.ref(`${roomId}/categories`).set(categories);
        
        document.getElementById("questionText").value = "";
        document.getElementById("optA").value = "";
        document.getElementById("optB").value = "";
        document.getElementById("optC").value = "";
        document.getElementById("optD").value = "";
        
        renderTabs();
        renderQuestions();
        updateProgress();
        alert("✅ پرسیار زیاد کرا!");
    }
    
    function renderQuestions() {
        const cont = document.getElementById("questionsContainer");
        const qs = categories[currentCat] || [];
        if(qs.length === 0) {
            cont.innerHTML = "<div style='color:white;text-align:center;'>هیچ پرسیارێک نییە</div>";
            return;
        }
        let html = "";
        qs.forEach((q, i) => {
            html += `<div class="question-item">
                        <div class="question-text">
                            <strong>${i+1}.</strong> ${q.text.substring(0, 60)}<br>
                            <small>${q.options.map((o,j)=>String.fromCharCode(65+j)+'. '+o.substring(0,20)).join(' | ')}</small><br>
                            <span style="color:#4CAF50;">✅ ڕاست: ${q.correct}</span>
                        </div>
                        <button class="delete-question" onclick="deleteQ(${i})">🗑️ سڕینەوە</button>
                    </div>`;
        });
        cont.innerHTML = html;
    }
    
    function deleteQ(i) {
        if(confirm("دڵنیایت لە سڕینەوەی ئەم پرسیارە؟")) {
            categories[currentCat].splice(i, 1);
            database.ref(`${roomId}/categories`).set(categories);
            renderQuestions();
            renderTabs();
            updateProgress();
            alert("✅ پرسیار سڕایەوە!");
        }
    }
    
    function logout() {
        localStorage.clear();
        window.location.href = "index.html";
    }
</script>
</body>
</html>
